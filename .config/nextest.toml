[profile.default]
default-filter = 'not binary(dind_e2e)'
slow-timeout = { period = "60s", terminate-after = 3, grace-period = "5s" }

[profile.docker-e2e]
default-filter = 'binary(dind_e2e)'
slow-timeout = { period = "60s", terminate-after = 10, grace-period = "5s" }
failure-output = "immediate-final"
retries = { backoff = "fixed", count = 2, delay = "1s" }
final-status-level = "flaky"

[profile.docker-e2e.junit]
path = "junit.xml"

# Detect flakes: a pass-on-retry is reported as FLAKY, never silently absorbed.
# The quarantine ledger is flaky-tests.toml at the repo root; an unquarantined
# flake fails review.
[profile.ci]
retries = { backoff = "fixed", count = 2, delay = "1s" }
failure-output = "immediate-final"
final-status-level = "flaky"

[profile.ci.junit]
path = "junit.xml"

[profile.soak]
default-filter = 'test(/soak/)'
slow-timeout = { period = "60s", terminate-after = 3, grace-period = "5s" }
failure-output = "immediate-final"

[test-groups]
docker-e2e = { max-threads = 1 }
# load_role paths can spend ~50s each (op/env resolution edges); serialise so
# parallel suite load does not push them past the default 180s terminate budget.
load-agent = { max-threads = 2 }

[[profile.default.overrides]]
filter = 'binary(dind_e2e)'
test-group = 'docker-e2e'
slow-timeout = { period = "60s", terminate-after = 10, grace-period = "5s" }
failure-output = "immediate-final"

[[profile.default.overrides]]
filter = 'test(/load_agent_skips|load_agent_cleans_up_when_parallel_sidecar/)'
test-group = 'load-agent'
slow-timeout = { period = "90s", terminate-after = 3, grace-period = "5s" }

[[profile.ci.overrides]]
filter = 'test(/load_agent_skips|load_agent_cleans_up_when_parallel_sidecar/)'
test-group = 'load-agent'
slow-timeout = { period = "90s", terminate-after = 3, grace-period = "5s" }

[[profile.docker-e2e.overrides]]
filter = 'binary(dind_e2e)'
test-group = 'docker-e2e'
