name: Construct Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      lanes:
        description: |
          Which runner(s) to run on. Default github; use both for parity runs.
        type: choice
        default: github
        options: [github, velnor, both]

permissions:
  actions: read
  contents: read

concurrency:
  group: construct-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Single source of truth for the digest directory — `build` writes
  # into it, `publish-manifest` reads from it.
  DIGEST_DIR: /tmp/jackin-construct-digests
  # Single source of truth for the registry coordinate — keeps the
  # two buildcache refs in sync.
  REGISTRY_IMAGE: projectjackin/construct
  # NOTE: BUILDX_BUILDER is set at the `build` job level only, not
  # workflow-wide. Setting it workflow-wide leaks into `publish-manifest`,
  # which has no buildx builder and would then fail with
  # `ERROR: no builder "jackin-construct" found` because docker buildx
  # treats BUILDX_BUILDER as the default-builder selection.

jobs:
  matrix-setup:
    name: Select runner lane
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      build_configs: ${{ steps.set.outputs.build_configs }}
      lane_configs: ${{ steps.set.outputs.lane_configs }}
      has_github: ${{ steps.set.outputs.has_github }}
    steps:
      - id: set
        env:
          LANES: ${{ github.event_name == 'workflow_dispatch' && inputs.lanes || 'github' }}
        run: |
          github='{"lane":"GitHub","runner":"\"ubuntu-24.04\"","runner_os":"Linux","runner_arch":"X64"}'
          velnor='{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","runner_os":"Linux","runner_arch":"X64"}'
          github_amd64='{"lane":"GitHub","runner":"\"ubuntu-24.04\"","runner_os":"Linux","runner_arch":"X64","platform":"amd64"}'
          github_arm64='{"lane":"GitHub","runner":"\"ubuntu-24.04-arm\"","runner_os":"Linux","runner_arch":"ARM64","platform":"arm64"}'
          velnor_amd64='{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","runner_os":"Linux","runner_arch":"X64","platform":"amd64"}'
          case "$LANES" in
            velnor)
              build_configs="[$velnor_amd64]"
              lane_configs="[$velnor]"
              has_github=false
              ;;
            both)
              build_configs="[$github_amd64,$github_arm64,$velnor_amd64]"
              lane_configs="[$github,$velnor]"
              has_github=true
              ;;
            *)
              build_configs="[$github_amd64,$github_arm64]"
              lane_configs="[$github]"
              has_github=true
              ;;
          esac
          {
            echo "build_configs=$build_configs"
            echo "lane_configs=$lane_configs"
            echo "has_github=$has_github"
          } >> "$GITHUB_OUTPUT"

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      construct: ${{ steps.dispatch.outputs.construct || steps.filter.outputs.construct }}
      construct_image: ${{ steps.dispatch.outputs.construct_image || steps.filter.outputs.construct_image }}
      # Single source of truth for "should this run produce / publish
      # registry artifacts" — true on push-to-main and on
      # workflow_dispatch from main, false everywhere else (PRs,
      # dispatch from feature branches). Downstream steps gate on
      # `needs.changes.outputs.is_publish` instead of restating the
      # same boolean five times.
      is_publish: ${{ steps.flags.outputs.is_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Force construct=true on workflow_dispatch
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          echo "construct=true" >> "$GITHUB_OUTPUT"
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "construct_image=true" >> "$GITHUB_OUTPUT"
          else
            echo "construct_image=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          token: ${{ github.token }}
          filters: |
            # Build the construct image when build plumbing changes, even if the
            # change should not publish a new immutable construct tag.
            construct:
              - '.github/workflows/construct.yml'
              - 'docker-bake.hcl'
              - 'docker/construct/**'
              - 'crates/jackin-xtask/**'
            # Require an unpublished docker/construct/VERSION only when inputs
            # baked into the construct image changed.
            construct_image:
              - 'docker-bake.hcl'
              - 'docker/construct/Dockerfile'
              - 'docker/construct/fish-config.fish'
              - 'docker/construct/versions.env'
              - 'docker/construct/zshrc'

      - name: Compute publish flag
        id: flags
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "push" ] || { [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$REF" = "refs/heads/main" ]; }; then
            echo "is_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_publish=false" >> "$GITHUB_OUTPUT"
          fi

  # amd64 and arm64 share every step except runner label and platform
  # string. Matrix collapse keeps the per-platform fail-fast=false
  # behavior (one arch failing must not cancel the other) while
  # eliminating ~60 lines of cross-job copy-paste.
  build:
    name: ${{ matrix.config.platform }} (${{ matrix.config.lane }})
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.construct == 'true'
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      # Scoped to the build job only. Setting it workflow-wide leaks
      # into `publish-manifest`, which has no buildx builder and would
      # then fail with `ERROR: no builder "jackin-construct" found`.
      BUILDX_BUILDER: jackin-construct
      # `mise run` activates the whole mise.toml tool set and, by default,
      # installs every missing one before the task. This job only needs the
      # rust toolchain mise-action already installed to compile `cargo xtask`;
      # without this, an unrelated tool's install (e.g. a flaky rustup
      # component download for cargo-zigbuild) reds the construct build.
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      DOCKERHUB_USERNAME: ${{ matrix.config.lane == 'GitHub' && secrets.DOCKERHUB_USERNAME || '' }}
      DOCKERHUB_TOKEN: ${{ matrix.config.lane == 'GitHub' && secrets.DOCKERHUB_TOKEN || '' }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.build_configs) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: construct-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - name: Prefetch Cargo dependencies
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch --locked --offline
      - name: Resolve construct tool versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          source docker/construct/versions.env
          echo "shellfirm-version=${SHELLFIRM_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Restore prebuilt shellfirm
        id: shellfirm-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: docker/construct/prebuilt
          key: shellfirm-${{ runner.os }}-${{ runner.arch }}-${{ steps.versions.outputs.shellfirm-version }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Log in to Docker Hub
        if: matrix.config.lane == 'GitHub' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          name: ${{ env.BUILDX_BUILDER }}
          driver: docker-container
          # Route docker.io base-image pulls (rust, debian) through Google's
          # pull-through mirror so construct builds don't hit Docker Hub's
          # per-account pull-rate limit (429 Too Many Requests). Bases stay
          # digest-pinned, so the mirror only serves bytes — integrity is still
          # verified against the pinned sha256.
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Bootstrap buildx
        run: mise run construct-init-buildx

      - name: Expose GitHub Actions cache runtime
        if: matrix.config.lane == 'GitHub' && (needs.changes.outputs.is_publish != 'true' || needs.changes.outputs.construct_image != 'true')
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Build ${{ matrix.config.platform }} without push (GitHub)
        if: matrix.config.lane == 'GitHub' && (needs.changes.outputs.is_publish != 'true' || needs.changes.outputs.construct_image != 'true')
        env:
          # Registry buildcache (written by main) is the primary warm source — avoids a cold
          # GHA start when the scope is empty or evicted. GHA scope is secondary: persists
          # layers written by earlier runs of this PR so mid-PR iterations stay warm too.
          CACHE_FROM: |
            type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ matrix.config.platform }}
            type=gha,scope=construct-pr-${{ matrix.config.platform }},repository=${{ github.repository }},ghtoken=${{ github.token }}
          CACHE_TO: type=gha,scope=construct-pr-${{ matrix.config.platform }},repository=${{ github.repository }},ghtoken=${{ github.token }},mode=max
        run: mise run construct-build-platform ${{ matrix.config.platform }}

      - name: Build ${{ matrix.config.platform }} without push (Velnor)
        if: matrix.config.lane == 'Velnor' && (needs.changes.outputs.is_publish != 'true' || needs.changes.outputs.construct_image != 'true')
        env:
          CACHE_FROM: type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ matrix.config.platform }}
        run: mise run construct-build-platform ${{ matrix.config.platform }}

      - name: Push ${{ matrix.config.platform }} image by digest
        if: matrix.config.lane == 'GitHub' && needs.changes.outputs.is_publish == 'true' && needs.changes.outputs.construct_image == 'true'
        env:
          CACHE_FROM: type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ matrix.config.platform }}
          CACHE_TO: type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ matrix.config.platform }},mode=max
        run: mise run construct-push-platform ${{ matrix.config.platform }}

      - name: Upload ${{ matrix.config.platform }} digest
        if: matrix.config.lane == 'GitHub' && needs.changes.outputs.is_publish == 'true' && needs.changes.outputs.construct_image == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: construct-digest-GitHub-${{ matrix.config.platform }}
          path: ${{ env.DIGEST_DIR }}/${{ matrix.config.platform }}.digest
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    name: publish manifest
    if: needs.matrix-setup.outputs.has_github == 'true' && needs.changes.outputs.is_publish == 'true' && needs.changes.outputs.construct_image == 'true'
    needs: [changes, matrix-setup, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      # Keep `mise run` on the rust toolchain mise-action installed instead of
      # installing the whole mise.toml tool set for the rust-only xtask task.
      MISE_TASK_RUN_AUTO_INSTALL: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: construct-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - name: Prefetch Cargo dependencies
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch --locked --offline
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download platform digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: construct-digest-GitHub-*
          path: ${{ env.DIGEST_DIR }}
          merge-multiple: true

      - name: Publish multi-platform manifest
        run: mise run construct-publish-manifest

  # PR-time rehearsal of `publish-manifest`'s setup. Runs the same
  # docker buildx CLI plumbing publish-manifest depends on, without
  # logging in to Docker Hub or writing a manifest to the registry,
  # so a workflow- or job-level env-var leak that breaks
  # `docker buildx` resolution surfaces in PR rather than
  # post-merge on main. Catches the exact failure class from
  # jackin-project/jackin#266 — `docker buildx ls` evaluates
  # BUILDX_BUILDER at startup and exits non-zero on a missing-builder
  # reference, regardless of whether the rest of the command would
  # have hit the network. The rehearsal runs on the events
  # publish-manifest itself skips: PR and feature-branch dispatch
  # that touch construct paths.
  publish-manifest-rehearsal:
    name: publish manifest (rehearsal, ${{ matrix.config.lane }})
    if: needs.changes.outputs.construct == 'true' && needs.changes.outputs.is_publish != 'true'
    needs: [changes, matrix-setup, build]
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      # Keep `mise run` on the rust toolchain mise-action installed instead of
      # installing the whole mise.toml tool set for the rust-only xtask task.
      MISE_TASK_RUN_AUTO_INSTALL: "false"
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.lane_configs) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: construct-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - name: Prefetch Cargo dependencies
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch --locked --offline
      - name: Verify docker buildx CLI resolves under workflow env
        # `docker buildx ls` reads BUILDX_BUILDER (and the rest of
        # buildx's env-driven config) and fails fast on a missing
        # builder reference. This is the exact error shape from
        # jackin-project/jackin#266 — running it on PR + feature-branch
        # dispatch surfaces a leak that publish-manifest would
        # otherwise only hit post-merge on main.
        run: docker buildx ls

      - name: Verify imagetools CLI plugin loads
        # Exercises the same plugin path publish-manifest's
        # `docker buildx imagetools create` / `inspect` commands rely
        # on. Cheap, network-free smoke that the plugin is bundled
        # and loadable on the runner.
        run: docker buildx imagetools --help >/dev/null

      - name: Verify construct VERSION is not already published
        if: needs.changes.outputs.construct_image == 'true'
        # PR-time mirror of publish-manifest's version-bump guard. The
        # build job already ran, so reaching here means docker/construct/**
        # content changed; an anonymous public-registry inspect needs no
        # Docker Hub login, so the "changed the image but didn't bump
        # docker/construct/VERSION" failure surfaces on the PR instead of
        # on main, where publish-manifest is the first job to evaluate it.
        run: mise run construct-assert-version-unpublished

  construct-required:
    if: always()
    needs: [matrix-setup, changes, build, publish-manifest, publish-manifest-rehearsal]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/aggregate-needs
        with:
          needs-json: ${{ toJSON(needs) }}
          workflow-label: construct
