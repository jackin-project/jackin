name: Rust Nextest Packages

on:
  workflow_call:
    inputs:
      runner-configs-json:
        description: JSON array of runner lane configs. Each item has lane and JSON-encoded runner fields.
        required: true
        type: string
      all-features:
        description: Run each package with all Cargo features enabled.
        required: true
        type: boolean
      cache-shared-key:
        description: Shared Rust cache namespace for this nextest lane.
        required: true
        type: string
      save-target-cache:
        description: Save the restored Rust target cache after package or Docker jobs finish.
        required: false
        default: true
        type: boolean
      construct-image-changed:
        description: Download and load the PR-built construct image before Docker E2E.
        required: false
        default: false
        type: boolean
      docker-e2e:
        description: Build and run the real Docker E2E nextest lane.
        required: false
        default: false
        type: boolean
permissions:
  actions: read
  contents: read

jobs:
  packages:
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.runner-configs-json) }}
        group:
          - jackin
          - jackin-capsule
          - jackin-runtime
          - jackin-tui
          - small-crates
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo nextest ${{ matrix.group }} (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_OFFLINE: "true"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          # sccache install: blank wrapper in case binstall source-falls-back
          # to cargo, which would probe rustc through a missing sccache.
          RUSTC_WRAPPER: ""
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "cargo-binstall rust cargo:cargo-nextest cargo:sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ inputs.cache-shared-key }}-package-${{ matrix.group }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
          save-if: ${{ matrix.config.lane == 'GitHub' }}
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback.
          # Each package shard owns its exact artifacts; a single shared key lets
          # the fastest shard permanently seed a narrow graph for every package.
          # Velnor proves parity from persistent local state without writing GHA
          # target archives; GitHub populates the hosted fallback caches.
      - name: Run package tests
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.group }}" in
            jackin|jackin-capsule|jackin-runtime|jackin-tui)
              args=(-p "${{ matrix.group }}")
              ;;
            small-crates)
              args=(
                --workspace
                --exclude jackin
                --exclude jackin-capsule
                --exclude jackin-runtime
                --exclude jackin-tui
              )
              ;;
            *)
              echo "::error::unknown nextest package group: ${{ matrix.group }}"
              exit 1
              ;;
          esac

          args+=(--no-tests=pass --color=always --locked --offline)
          if [ "${{ inputs.all-features }}" = "true" ]; then
            args+=(--all-features)
          fi
          cargo nextest run "${args[@]}"
      - name: Capture sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats
        with:
          artifact-name: sccache-stats-nextest-${{ matrix.group }}-${{ matrix.config.lane }}
          heading: sccache nextest ${{ matrix.group }} (${{ matrix.config.lane }})

  docker-e2e:
    if: inputs.docker-e2e
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.runner-configs-json) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: Docker E2E smoke (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_OFFLINE: "true"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          # sccache install: blank wrapper in case binstall source-falls-back
          # to cargo, which would probe rustc through a missing sccache.
          RUSTC_WRAPPER: ""
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "cargo-binstall rust cargo:cargo-nextest cargo:sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-docker-e2e-dev-workspace-v1
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
          save-if: ${{ matrix.config.lane == 'GitHub' }}
          # Docker E2E owns its exact build/run artifacts. Package shards keep
          # the all-features namespace so the narrower Docker graph cannot seed
          # the shared package-test cache.
      - name: Download construct image for E2E
        if: inputs.construct-image-changed
        shell: bash
        env:
          ARTIFACT_NAME: construct-trixie-image-${{ matrix.config.lane }}
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          artifact_id="$(
            gh api "repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
              --paginate \
              --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\") | .id" \
              | head -n 1
          )"
          if [ -z "$artifact_id" ]; then
            echo "Artifact not found: ${ARTIFACT_NAME}" >&2
            exit 1
          fi
          gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > /tmp/construct-trixie-image.zip
          unzip -o /tmp/construct-trixie-image.zip -d /tmp
      - name: Load construct image for E2E
        if: inputs.construct-image-changed
        run: docker load --input /tmp/construct-trixie.tar
      - name: Build jackin-capsule for nextest
        run: cargo build -p jackin-capsule --bin jackin-capsule --locked --offline
      - name: Point nextest at jackin-capsule
        run: |
          capsule_bin="${CARGO_TARGET_DIR:-target}/debug/jackin-capsule"
          chmod +x "$capsule_bin"
          case "$capsule_bin" in
            /*) echo "JACKIN_CAPSULE_BIN=$capsule_bin" >> "$GITHUB_ENV" ;;
            *) echo "JACKIN_CAPSULE_BIN=$PWD/$capsule_bin" >> "$GITHUB_ENV" ;;
          esac
      - name: Run Docker E2E smoke tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${VELNOR_DOCKER_HOST_TEMP:-}" ]; then
            export TMPDIR="$VELNOR_DOCKER_HOST_TEMP"
          fi
          cargo nextest run -p jackin --features e2e --profile docker-e2e --color=always --locked --offline
      - name: Capture sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats
        with:
          artifact-name: sccache-stats-docker-e2e-${{ matrix.config.lane }}
          heading: sccache docker-e2e (${{ matrix.config.lane }})
