name: Rust Nextest Packages

on:
  workflow_call:
    inputs:
      runner-configs-json:
        description: JSON array of runner lane configs. Each item has lane and JSON-encoded runner fields.
        required: true
        type: string
      packages-json:
        description: JSON array of exact affected workspace crate names.
        required: false
        default: '["jackin","jackin-agent-status","jackin-build-meta","jackin-capsule","jackin-config","jackin-console","jackin-console-oppicker","jackin-core","jackin-dev","jackin-diagnostics","jackin-docker","jackin-env","jackin-host","jackin-image","jackin-instance","jackin-isolation","jackin-launch-tui","jackin-manifest","jackin-pr-trailers","jackin-process","jackin-protocol","jackin-runtime","jackin-term","jackin-test-support","jackin-usage","jackin-xtask"]'
        type: string
      package-cache-keys-json:
        description: JSON object mapping each affected crate to its exact source-closure key.
        required: false
        default: '{}'
        type: string
      all-features:
        description: Run each package with all Cargo features enabled.
        required: true
        type: boolean
      construct-image-changed:
        description: Download and load the PR-built construct image before Docker E2E.
        required: false
        default: false
        type: boolean
      docker-e2e:
        description: Build and run the real Docker E2E nextest lane.
        required: false
        default: false
        type: boolean
permissions:
  actions: read
  contents: read

jobs:
  packages:
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.runner-configs-json) }}
        package: ${{ fromJSON(inputs.packages-json) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo test ${{ matrix.package }} (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_OFFLINE: "true"
      CARGO_TERM_COLOR: always
      JACKIN_TELEMETRY_VOLUME_PATH: target/telemetry-volume-ratchet.json
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Find input-identical successful crate result
        id: crate-result
        shell: bash
        env:
          ALL_FEATURES: ${{ inputs.all-features }}
          CACHE_KEY: ${{ fromJSON(inputs.package-cache-keys-json)[matrix.package] }}
          COMMON_CONTRACT_KEY: ${{ hashFiles('.github/workflows/rust-nextest.yml', '.config/nextest.toml', 'flaky-tests.toml', 'ratchet.toml', 'mise.toml', 'mise.lock', 'scripts/ci/**', 'crates/jackin-xtask/Cargo.toml', 'crates/jackin-xtask/src/**') }}
          CONSTRUCT_IMAGE_CHANGED: ${{ inputs.construct-image-changed }}
          DOCKER_CONTRACT_KEY: ${{ hashFiles('docker/**', 'docker-bake.hcl') }}
          DOCKER_E2E: ${{ inputs.docker-e2e }}
          GH_TOKEN: ${{ github.token }}
          PACKAGE: ${{ matrix.package }}
          REPOSITORY: ${{ github.repository }}
          RUNNER_ARCH: ${{ runner.arch }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          set -euo pipefail
          contract_key=$COMMON_CONTRACT_KEY
          docker_e2e=false
          construct_image_changed=false
          if [ "$PACKAGE" = "jackin" ]; then
            contract_key=$(printf '%s' "${COMMON_CONTRACT_KEY}:${DOCKER_CONTRACT_KEY}" \
              | sha256sum | cut -d ' ' -f 1)
            docker_e2e=$DOCKER_E2E
            construct_image_changed=$CONSTRUCT_IMAGE_CHANGED
          fi
          suffix="af${ALL_FEATURES}-e2e${docker_e2e}-construct${construct_image_changed}"
          sha_name="ci-crate-result-sha-v1-${RUNNER_OS}-${RUNNER_ARCH}-${PACKAGE}-${GITHUB_SHA}-${contract_key}-${suffix}"
          name=$sha_name
          artifact_id=
          if [ -n "$CACHE_KEY" ]; then
            name="ci-crate-result-v1-${RUNNER_OS}-${RUNNER_ARCH}-${PACKAGE}-${CACHE_KEY}-${contract_key}-${suffix}"
            artifact_id=$(
              gh api "repos/${REPOSITORY}/actions/artifacts?name=${name}&per_page=10" \
                --jq '.artifacts[] | select(.expired == false) | .id' \
                | head -n 1
            )
          fi
          if [ -z "$artifact_id" ]; then
            artifact_id=$(
              gh api "repos/${REPOSITORY}/actions/artifacts?name=${sha_name}&per_page=10" \
                --jq '.artifacts[] | select(.expired == false) | .id' \
                | head -n 1
            )
          fi
          {
            echo "name=$name"
            echo "sha-name=$sha_name"
            if [ -n "$artifact_id" ]; then
              echo "hit=true"
              echo "::notice::reusing input-identical successful result for ${PACKAGE}"
            else
              echo "hit=false"
            fi
          } >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/download-ci-xtask
        if: steps.crate-result.outputs.hit != 'true'
        with:
          lane: ${{ matrix.config.lane }}
      - name: Read MSRV
        id: msrv
        if: steps.crate-result.outputs.hit != 'true'
        run: echo "version=$(sed -n 's/^rust-version = \"\(.*\)\"/\1/p' Cargo.toml)" >> "$GITHUB_OUTPUT"
      - name: Cache prepared Rust toolchains
        if: steps.crate-result.outputs.hit != 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-ci-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml') }}
          restore-keys: |
            rustup-ci-v3-${{ runner.os }}-${{ runner.arch }}-
      - id: cargo-registry-cache
        if: steps.crate-result.outputs.hit != 'true'
        uses: ./.github/actions/cache-cargo-registry
      - name: Resolve exact crate target key
        id: crate-target-key
        if: steps.crate-result.outputs.hit != 'true'
        shell: bash
        env:
          PACKAGE: ${{ matrix.package }}
          SUPPLIED_KEY: ${{ fromJSON(inputs.package-cache-keys-json)[matrix.package] }}
        run: |
          set -euo pipefail
          key=$SUPPLIED_KEY
          if [ -z "$key" ]; then
            key=$("$CI_XTASK" affected-crates --metadata "$CI_METADATA" --all --cache-keys \
              | jq -er --arg package "$PACKAGE" '.[$package]')
          fi
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - name: Find input-identical crate target
        id: crate-target
        if: steps.crate-result.outputs.hit != 'true'
        shell: bash
        env:
          ARTIFACT_PREFIX: ci-crate-target-${{ inputs.all-features && 'v4' || 'default-v4' }}-${{ runner.os }}-${{ runner.arch }}-${{ matrix.package }}-${{ steps.crate-target-key.outputs.key }}
          LEGACY_SPLIT_PREFIX: ci-crate-target-${{ inputs.all-features && 'v3' || 'default-v3' }}-${{ runner.os }}-${{ runner.arch }}-${{ matrix.package }}-${{ steps.crate-target-key.outputs.key }}
          LEGACY_ARTIFACT_NAME: ci-crate-target-${{ inputs.all-features && 'v2' || 'default-v2' }}-${{ runner.os }}-${{ runner.arch }}-${{ matrix.package }}-${{ steps.crate-target-key.outputs.key }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          hit=false
          canonical_hit=false
          format=none
          download_prefix=
          legacy_name=
          run_id=$(
            gh api "repos/${REPOSITORY}/actions/artifacts?name=${ARTIFACT_PREFIX}-ready&per_page=10" \
              --jq '.artifacts[] | select(.expired == false) | .workflow_run.id' \
              | head -n 1
          )
          if [ -n "$run_id" ]; then
            hit=true
            canonical_hit=true
            format=v4
            download_prefix=$ARTIFACT_PREFIX
          else
            run_id=$(
              gh api "repos/${REPOSITORY}/actions/artifacts?name=${LEGACY_SPLIT_PREFIX}-ready&per_page=10" \
                --jq '.artifacts[] | select(.expired == false) | .workflow_run.id' \
                | head -n 1
            )
            if [ -n "$run_id" ]; then
              hit=true
              format=v3
              download_prefix=$LEGACY_SPLIT_PREFIX
            else
              run_id=$(
                gh api "repos/${REPOSITORY}/actions/artifacts?name=${LEGACY_ARTIFACT_NAME}&per_page=10" \
                  --jq '.artifacts[] | select(.expired == false) | .workflow_run.id' \
                  | head -n 1
              )
              if [ -n "$run_id" ]; then
                hit=true
                format=v2
                legacy_name=$LEGACY_ARTIFACT_NAME
              fi
            fi
          fi

          {
            echo "prefix=$ARTIFACT_PREFIX"
            echo "hit=$hit"
            echo "canonical-hit=$canonical_hit"
            echo "format=$format"
            echo "download-prefix=$download_prefix"
            echo "legacy-name=$legacy_name"
            echo "run-id=$run_id"
          } >> "$GITHUB_OUTPUT"
      - name: Download partitioned input-identical crate target
        if: steps.crate-target.outputs.format == 'v4' || steps.crate-target.outputs.format == 'v3'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ${{ steps.crate-target.outputs.download-prefix }}-part-*
          path: target/.ci-restore
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.crate-target.outputs.run-id }}
      - name: Download legacy input-identical crate target
        if: steps.crate-target.outputs.format == 'v2'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.crate-target.outputs.legacy-name }}
          path: target/.ci-restore
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.crate-target.outputs.run-id }}
      - name: Restore input-identical crate target
        if: steps.crate-target.outputs.hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.crate-target.outputs.format }}" = "v4" ]; then
            pids=()
            for archive in target/.ci-restore/target.part-*; do
              tar --zstd -xf "$archive" &
              pids+=("$!")
            done
            failed=0
            for pid in "${pids[@]}"; do
              wait "$pid" || failed=1
            done
            [ "$failed" -eq 0 ]
          elif [ "${{ steps.crate-target.outputs.format }}" = "v3" ]; then
            cat target/.ci-restore/target.part-* > target/.ci-restore/target.tar.zst
            tar --zstd -xf target/.ci-restore/target.tar.zst
          else
            tar --zstd -xf target/.ci-restore/target.tar.zst
          fi
          rm -rf target/.ci-restore
          git ls-files -z | xargs -0r touch --date='2000-01-01T00:00:00Z' --
      - name: Run package tests
        if: steps.crate-result.outputs.hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          args=(-p "${{ matrix.package }}" --no-tests=pass --color=always --locked --offline --profile ci)
          if [ "${{ inputs.all-features }}" = "true" ]; then
            args+=(--all-features)
          fi
          cargo nextest run "${args[@]}"
      - name: Run crate doctests
        if: >-
          steps.crate-result.outputs.hit != 'true' &&
          !contains(fromJSON('["jackin-dev","jackin-pr-trailers","jackin-xtask"]'), matrix.package)
        run: cargo test --doc -p "${{ matrix.package }}" --locked --offline
      - name: Check crate default features
        if: steps.crate-result.outputs.hit != 'true'
        run: cargo check -p "${{ matrix.package }}" --all-targets --locked --offline
      - name: Lint crate all features
        if: steps.crate-result.outputs.hit != 'true'
        run: cargo clippy -p "${{ matrix.package }}" --all-targets --all-features --locked --offline -- -D warnings
      - name: Check crate feature powerset
        if: >-
          steps.crate-result.outputs.hit != 'true' &&
          contains(fromJSON('["jackin","jackin-agent-status","jackin-capsule","jackin-diagnostics","jackin-runtime","jackin-term"]'), matrix.package)
        run: cargo hack check -p "${{ matrix.package }}" --feature-powerset --all-targets --locked
      - name: Build crate benchmarks
        if: >-
          steps.crate-result.outputs.hit != 'true' &&
          contains(fromJSON('["jackin","jackin-capsule","jackin-config","jackin-diagnostics","jackin-manifest","jackin-runtime","jackin-term","jackin-usage"]'), matrix.package)
        run: cargo build --benches -p "${{ matrix.package }}" --locked --offline
      - name: Run bounded crate fuzz targets
        if: >-
          steps.crate-result.outputs.hit != 'true' &&
          contains(fromJSON('["jackin-config","jackin-env","jackin-manifest","jackin-protocol","jackin-term"]'), matrix.package)
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
        run: |
          case "${{ matrix.package }}" in
            jackin-config) dir=crates/jackin-config; targets="config_migrate workspace_migrate" ;;
            jackin-env) dir=crates/jackin-env; targets="env_resolve" ;;
            jackin-manifest) dir=crates/jackin-manifest; targets="manifest_migrate manifest_validate" ;;
            jackin-protocol) dir=crates/jackin-protocol; targets="decode_frames" ;;
            jackin-term) dir=crates/jackin-term; targets="damage_grid_process" ;;
          esac
          cd "$dir"
          cargo fetch --locked --offline
          for fuzz_target in $targets; do
            "$CI_CARGO_FUZZ" fuzz run --sanitizer none --target x86_64-unknown-linux-gnu \
              "$fuzz_target" -- -max_total_time=5
          done
      - name: Enforce telemetry volume ratchet
        if: steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin-diagnostics'
        run: |
          "$CI_XTASK" lint ratchet --only export-volume
      - name: Check crate on MSRV
        if: steps.crate-result.outputs.hit != 'true'
        env:
          CARGO_TARGET_DIR: target/msrv
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}
        run: cargo check -p "${{ matrix.package }}" --all-targets --locked --offline
      - name: Upload junit + timing
        if: always() && steps.crate-result.outputs.hit != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-junit-${{ matrix.package }}-${{ matrix.config.lane }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
      # Plan 027: suite-time family enforces when junit exists (skipped locally).
      - name: Suite-time ratchet (scheduled enforce)
        if: >-
          always() && steps.crate-result.outputs.hit != 'true' &&
          hashFiles('target/nextest/ci/junit.xml') != ''
        run: |
          "$CI_XTASK" lint ratchet --only suite-time
      - name: Slowest tests summary
        if: always() && steps.crate-result.outputs.hit != 'true'
        shell: bash
        run: |
          if [ -f target/nextest/ci/junit.xml ]; then
            python3 - "$GITHUB_STEP_SUMMARY" "${{ matrix.package }}" <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          summary_path = Path(sys.argv[1])
          group = sys.argv[2]
          junit_path = Path("target/nextest/ci/junit.xml")
          root = ET.parse(junit_path).getroot()

          cases = []
          for case in root.iter("testcase"):
              name = case.attrib.get("name", "")
              try:
                  seconds = float(case.attrib.get("time", "0") or 0)
              except ValueError:
                  seconds = 0.0
              cases.append((seconds, name))

          with summary_path.open("a", encoding="utf-8") as summary:
              print(f"### Slowest tests ({group})", file=summary)
              for seconds, name in sorted(cases, reverse=True)[:10]:
                  print(f"- {seconds:g}s `{name}`", file=summary)
              print("", file=summary)
              print(
                  f"Crate wall time (sum of testcase times): {sum(seconds for seconds, _ in cases):.3f}s",
                  file=summary,
              )
          PY
          fi
      - name: Fail on unquarantined flakes
        if: always() && steps.crate-result.outputs.hit != 'true'
        shell: bash
        run: |
          [ -f target/nextest/ci/junit.xml ] || exit 0
          if ! grep -q 'flaky="true"' target/nextest/ci/junit.xml; then
            exit 0
          fi
          # Extract testcase names from lines that also carry flaky="true".
          mapfile -t flaky_names < <(
            grep 'flaky="true"' target/nextest/ci/junit.xml \
              | sed -n 's/.*name="\([^"]*\)".*/\1/p'
          )
          unquarantined=()
          for name in "${flaky_names[@]}"; do
            [ -n "$name" ] || continue
            if ! grep -Fq "name = \"$name\"" flaky-tests.toml 2>/dev/null; then
              unquarantined+=("$name")
            fi
          done
          if [ "${#unquarantined[@]}" -gt 0 ]; then
            echo "::error::flaky test(s) detected and not quarantined in flaky-tests.toml"
            printf "%s\n" "${unquarantined[@]}"
            exit 1
          fi

      - name: Download construct image for Docker E2E
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' &&
          inputs.docker-e2e && inputs.construct-image-changed
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: construct-trixie-image-${{ matrix.config.lane }}
          path: target/construct-image
      - name: Recover construct image through the Actions API
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' &&
          inputs.docker-e2e && inputs.construct-image-changed
        shell: bash
        env:
          ARTIFACT_NAME: construct-trixie-image-${{ matrix.config.lane }}
          ARTIFACT_PATH: target/construct-image
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_PATH"
          if [ -f "$ARTIFACT_PATH/construct-trixie.tar" ]; then
            exit 0
          fi
          artifact_id=$(gh api "repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --paginate \
            --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\") | .id" | head -n 1)
          if [ -z "$artifact_id" ]; then
            echo "::error::artifact not found: ${ARTIFACT_NAME}"
            exit 1
          fi
          archive="$ARTIFACT_PATH/.artifact.zip"
          gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "$archive"
          python3 -m zipfile -e "$archive" "$ARTIFACT_PATH"
          rm "$archive"
      - name: Load construct image for Docker E2E
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' &&
          inputs.docker-e2e && inputs.construct-image-changed
        run: docker load --input target/construct-image/construct-trixie.tar
      - name: Build jackin-capsule for Docker E2E
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' && inputs.docker-e2e
        run: cargo build -p jackin-capsule --bin jackin-capsule --locked --offline
      - name: Point nextest at jackin-capsule
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' && inputs.docker-e2e
        run: |
          capsule_bin="${CARGO_TARGET_DIR:-target}/debug/jackin-capsule"
          chmod +x "$capsule_bin"
          case "$capsule_bin" in
            /*) echo "JACKIN_CAPSULE_BIN=$capsule_bin" >> "$GITHUB_ENV" ;;
            *) echo "JACKIN_CAPSULE_BIN=$PWD/$capsule_bin" >> "$GITHUB_ENV" ;;
          esac
      - name: Run Docker E2E smoke test
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' && inputs.docker-e2e
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${VELNOR_DOCKER_HOST_TEMP:-}" ]; then
            export TMPDIR="$VELNOR_DOCKER_HOST_TEMP"
          fi
          cargo nextest run -p jackin --features e2e --profile docker-e2e \
            -E 'test(jackin_load_ctrl_q_yes_exits_cold_build_quickly)' \
            --no-tests=pass --color=always --locked --offline
      - name: Upload Docker E2E junit + timing
        if: >-
          always() && steps.crate-result.outputs.hit != 'true' &&
          matrix.package == 'jackin' && inputs.docker-e2e
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-junit-docker-e2e-${{ matrix.config.lane }}
          path: target/nextest/docker-e2e/junit.xml
          if-no-files-found: ignore
      - name: Fail on unquarantined Docker E2E flakes
        if: >-
          always() && steps.crate-result.outputs.hit != 'true' &&
          matrix.package == 'jackin' && inputs.docker-e2e
        shell: bash
        run: |
          [ -f target/nextest/docker-e2e/junit.xml ] || exit 0
          if ! grep -q 'flaky="true"' target/nextest/docker-e2e/junit.xml; then exit 0; fi
          mapfile -t flaky_names < <(
            grep 'flaky="true"' target/nextest/docker-e2e/junit.xml \
              | sed -n 's/.*name="\([^"]*\)".*/\1/p'
          )
          unquarantined=()
          for name in "${flaky_names[@]}"; do
            [ -n "$name" ] || continue
            if ! grep -Fq "name = \"$name\"" flaky-tests.toml 2>/dev/null; then
              unquarantined+=("$name")
            fi
          done
          if [ "${#unquarantined[@]}" -gt 0 ]; then
            echo "::error::flaky Docker E2E test(s) detected and not quarantined in flaky-tests.toml"
            printf "%s\n" "${unquarantined[@]}"
            exit 1
          fi

      - name: Pack input-identical crate target
        if: >-
          always() && !cancelled() && !failure() &&
          steps.crate-result.outputs.hit != 'true' &&
          steps.crate-target.outputs.canonical-hit != 'true' &&
          matrix.config.lane == 'GitHub' &&
          (github.ref == 'refs/heads/main' ||
           github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          totals=(0 0 0 0 0)
          for index in 0 1 2 3 4; do
            : > "target.list-$index"
          done
          while IFS=$'\t' read -r -d '' size path; do
            bucket=0
            for index in 1 2 3 4; do
              if [ "${totals[index]}" -lt "${totals[bucket]}" ]; then
                bucket=$index
              fi
            done
            printf '%s\0' "$path" >> "target.list-$bucket"
            totals[bucket]=$((totals[bucket] + size))
          done < <(
            find target \
              \( -path target/nextest -o -path 'target/nextest/*' \
                 -o -path 'target/telemetry-*' \
                 -o -path target/.ci-restore -o -path 'target/.ci-restore/*' \) \
              -prune -o \( -type f -o -type l \) -printf '%s\t%p\0' \
              | sort -z -nr
          )

          pids=()
          for index in 0 1 2 3 4; do
            tar --zstd --null --no-recursion \
              --files-from="target.list-$index" \
              -cf "target.part-$index" &
            pids+=("$!")
          done
          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done
          [ "$failed" -eq 0 ]
          rm target.list-*
          sha256sum target.part-* > target.ready
      - name: Publish input-identical crate target part 0
        if: >-
          always() && !cancelled() && !failure() &&
          steps.crate-result.outputs.hit != 'true' &&
          steps.crate-target.outputs.canonical-hit != 'true' &&
          matrix.config.lane == 'GitHub' &&
          (github.ref == 'refs/heads/main' ||
           github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'pull_request' &&
