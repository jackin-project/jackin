name: Rust Nextest Packages

on:
  workflow_call:
    inputs:
      runner-configs-json:
        description: JSON array of runner lane configs. Each item has lane and JSON-encoded runner fields.
        required: true
        type: string
      all-features:
        description: Run each package with all Cargo features enabled.
        required: true
        type: boolean
      cache-shared-key:
        description: Shared Rust cache namespace for this nextest lane.
        required: true
        type: string
      construct-image-changed:
        description: Download and load the PR-built construct image before Docker E2E.
        required: false
        default: false
        type: boolean
      docker-e2e:
        description: Build and run the real Docker E2E nextest lane.
        required: false
        default: false
        type: boolean
    secrets:
      GH_READONLY_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  prepare:
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.runner-configs-json) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo nextest prepare (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_RETRY: "10"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: ${{ matrix.config.lane == 'GitHub' && 'on' || 'off' }}
      SCCACHE_GHA_CACHE_TO: sccache-nextest-prepare-${{ inputs.cache-shared-key }}-${{ matrix.config.lane }}-${{ matrix.config.runner_os }}-${{ matrix.config.runner_arch }}
      SCCACHE_GHA_CACHE_FROM: sccache-nextest-prepare-${{ inputs.cache-shared-key }}-${{ matrix.config.lane }}-${{ matrix.config.runner_os }}-${{ matrix.config.runner_arch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust cargo-nextest sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ inputs.cache-shared-key }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          # One workspace-level nextest cache per runner lane. The package
          # matrix restores this exact cache read-only; per-package cache keys
          # fragment the workspace graph and force cold downloads/builds. This
          # cache intentionally keeps workspace artifacts because they are the
          # prepared output consumed by the per-crate fan-out.
      - name: Export sccache GitHub cache runtime
        if: matrix.config.lane == 'GitHub'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Build nextest binaries
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.cargo-registry-cache.outputs.cache-hit }}" = "true" ]; then
            cargo fetch --locked --offline
          else
            attempt=1
            until cargo fetch --locked; do
              if [ "$attempt" -ge 3 ]; then
                exit 1
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          fi

          args=(--workspace --no-run --no-tests=pass --color=always --locked)
          if [ "${{ inputs.all-features }}" = "true" ]; then
            args+=(--all-features)
          fi
          cargo nextest run --timings --offline "${args[@]}"

          if [ "${{ inputs.docker-e2e }}" = "true" ]; then
            cargo nextest run \
              --timings \
              --offline \
              -p jackin \
              --features e2e \
              --profile docker-e2e \
              --no-run \
              --color=always \
              --locked
            cargo build -p jackin-capsule --bin jackin-capsule --locked --offline
          fi
      - name: Pack prepared nextest workspace
        shell: bash
        run: |
          set -euo pipefail

          handoff_dir="$RUNNER_TEMP/nextest-handoff"
          rm -rf "$handoff_dir"
          mkdir -p "$handoff_dir"
          mkdir -p "$HOME/.cargo/registry/index" "$HOME/.cargo/registry/cache" "$HOME/.cargo/git/db"

          tar --posix --use-compress-program zstdmt \
            -cf "$handoff_dir/cargo-home.tar.zst" \
            -C "$HOME" \
            .cargo/registry/index \
            .cargo/registry/cache \
            .cargo/git/db
          tar --posix --use-compress-program zstdmt \
            -cf "$handoff_dir/target.tar.zst" \
            -C "$GITHUB_WORKSPACE" \
            target
      - name: Upload prepared nextest workspace
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-workspace-${{ matrix.config.lane }}
          path: ${{ runner.temp }}/nextest-handoff/*.tar.zst
          if-no-files-found: error
          compression-level: 0
          retention-days: 1
      - name: Upload cargo timings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-timings-nextest-prepare-${{ matrix.config.lane }}
          path: target/cargo-timings/*.html
          if-no-files-found: ignore
          retention-days: 7
      - name: Write sccache stats
        if: always()
        run: |
          if ! command -v sccache >/dev/null 2>&1; then
            echo "sccache not installed; skipping stats"
            exit 0
          fi
          stats_file="sccache-stats-nextest-prepare-${{ inputs.cache-shared-key }}-${{ matrix.config.lane }}.txt"
          sccache --show-stats | tee "$stats_file"
          {
            echo "### sccache nextest prepare ${{ inputs.cache-shared-key }} (${{ matrix.config.lane }})"
            echo '```text'
            cat "$stats_file"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload sccache stats
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sccache-stats-nextest-prepare-${{ inputs.cache-shared-key }}-${{ matrix.config.lane }}
          path: sccache-stats-nextest-prepare-${{ inputs.cache-shared-key }}-${{ matrix.config.lane }}.txt
          if-no-files-found: ignore
          retention-days: 7
  packages:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.runner-configs-json) }}
        group:
          - jackin
          - jackin-capsule
          - jackin-runtime
          - jackin-tui
          - small-crates
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo nextest ${{ matrix.group }} (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_RETRY: "10"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: ${{ matrix.config.lane == 'GitHub' && 'on' || 'off' }}
      SCCACHE_GHA_CACHE_TO: sccache-nextest-prepare-${{ inputs.cache-shared-key }}-${{ matrix.config.lane }}-${{ matrix.config.runner_os }}-${{ matrix.config.runner_arch }}
      SCCACHE_GHA_CACHE_FROM: sccache-nextest-prepare-${{ inputs.cache-shared-key }}-${{ matrix.config.lane }}-${{ matrix.config.runner_os }}-${{ matrix.config.runner_arch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust cargo-nextest sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ inputs.cache-shared-key }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          save-if: "false"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback.
          # The prepare job owns saving this workspace cache; package jobs only
          # restore it so the matrix cannot create 19 isolated target caches.
      - name: Download prepared nextest workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextest-workspace-${{ matrix.config.lane }}
          path: ${{ runner.temp }}/nextest-handoff
      - name: Restore prepared nextest workspace
        shell: bash
        run: |
          set -euo pipefail
          tar --use-compress-program unzstd -xf "$RUNNER_TEMP/nextest-handoff/cargo-home.tar.zst" -C "$HOME"
          tar --use-compress-program unzstd -xf "$RUNNER_TEMP/nextest-handoff/target.tar.zst" -C "$GITHUB_WORKSPACE"
      - name: Export sccache GitHub cache runtime
        if: matrix.config.lane == 'GitHub'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Run package tests
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.group }}" in
            jackin|jackin-capsule|jackin-runtime|jackin-tui)
              args=(-p "${{ matrix.group }}")
              ;;
            small-crates)
              args=(
                --workspace
                --exclude jackin
                --exclude jackin-capsule
                --exclude jackin-runtime
                --exclude jackin-tui
              )
              ;;
            *)
              echo "::error::unknown nextest package group: ${{ matrix.group }}"
              exit 1
              ;;
          esac

          args+=(--no-tests=pass --color=always --locked --offline)
          if [ "${{ inputs.all-features }}" = "true" ]; then
            args+=(--all-features)
          fi
          cargo nextest run "${args[@]}"

  docker-e2e:
    needs: prepare
    if: inputs.docker-e2e
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.runner-configs-json) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: Docker E2E smoke (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_RETRY: "10"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: ${{ matrix.config.lane == 'GitHub' && 'on' || 'off' }}
      SCCACHE_GHA_CACHE_TO: sccache-nextest-prepare-${{ inputs.cache-shared-key }}-${{ matrix.config.lane }}-${{ matrix.config.runner_os }}-${{ matrix.config.runner_arch }}
      SCCACHE_GHA_CACHE_FROM: sccache-nextest-prepare-${{ inputs.cache-shared-key }}-${{ matrix.config.lane }}-${{ matrix.config.runner_os }}-${{ matrix.config.runner_arch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust cargo-nextest sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: ${{ inputs.cache-shared-key }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          save-if: "false"
          # The prepare job owns this cache. Docker E2E restores the prepared
          # workspace so it can start after prepare without rebuilding the graph.
      - name: Download prepared nextest workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextest-workspace-${{ matrix.config.lane }}
          path: ${{ runner.temp }}/nextest-handoff
      - name: Restore prepared nextest workspace
        shell: bash
        run: |
          set -euo pipefail
          tar --use-compress-program unzstd -xf "$RUNNER_TEMP/nextest-handoff/cargo-home.tar.zst" -C "$HOME"
          tar --use-compress-program unzstd -xf "$RUNNER_TEMP/nextest-handoff/target.tar.zst" -C "$GITHUB_WORKSPACE"
      - name: Export sccache GitHub cache runtime
        if: matrix.config.lane == 'GitHub'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Download construct image for E2E
        if: inputs.construct-image-changed
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: construct-trixie-image-${{ matrix.config.lane }}
          path: /tmp
      - name: Load construct image for E2E
        if: inputs.construct-image-changed
        run: docker load --input /tmp/construct-trixie.tar
      - name: Point nextest at prepared jackin-capsule
        run: |
          chmod +x target/debug/jackin-capsule
          echo "JACKIN_CAPSULE_BIN=$PWD/target/debug/jackin-capsule" >> "$GITHUB_ENV"
      - name: Run Docker E2E smoke tests
        shell: bash
        run: |
          set -euo pipefail
          cargo nextest run -p jackin --features e2e --profile docker-e2e --color=always --locked --offline
