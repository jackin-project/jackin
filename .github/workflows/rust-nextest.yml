name: Rust Nextest Packages

on:
  workflow_call:
    inputs:
      runner-configs-json:
        description: JSON array of runner lane configs. Each item has lane and JSON-encoded runner fields.
        required: true
        type: string
      packages-json:
        description: JSON array of exact affected workspace crate names.
        required: false
        default: '["jackin","jackin-agent-status","jackin-brand","jackin-build-meta","jackin-capsule","jackin-config","jackin-console","jackin-core","jackin-dev","jackin-diagnostics","jackin-docker","jackin-env","jackin-host","jackin-image","jackin-instance","jackin-isolation","jackin-launch","jackin-manifest","jackin-oppicker","jackin-pr-trailers","jackin-process","jackin-protocol","jackin-runtime","jackin-term","jackin-test-support","jackin-tui","jackin-usage","jackin-xtask"]'
        type: string
      package-cache-keys-json:
        description: JSON object mapping each affected crate to its exact source-closure key.
        required: false
        default: '{}'
        type: string
      package-target-results-json:
        description: JSON object mapping each affected crate to centrally resolved target artifact metadata.
        required: false
        default: '{}'
        type: string
      refresh-package:
        description: Exact crate whose cached proof must be regenerated.
        required: false
        default: ""
        type: string
      all-features:
        description: Run each package with all Cargo features enabled.
        required: true
        type: boolean
      construct-image-changed:
        description: Download and load the PR-built construct image before Docker E2E.
        required: false
        default: false
        type: boolean
      docker-e2e:
        description: Build and run the real Docker E2E nextest lane.
        required: false
        default: false
        type: boolean
      ci-tools-contract:
        description: Runner-independent CI tools artifact contract.
        required: false
        default: ""
        type: string
      ci-xtask-contract:
        description: Runner-independent xtask artifact contract.
        required: false
        default: ""
        type: string
      docker-contract:
        description: Runner-independent Docker result contract.
        required: false
        default: ""
        type: string
      nextest-contract:
        description: Runner-independent nextest result contract.
        required: false
        default: ""
        type: string
      registry-contract:
        description: Runner-independent Cargo registry cache contract.
        required: false
        default: ""
        type: string
      rustup-contract:
        description: Runner-independent current Rust toolchain cache contract.
        required: false
        default: ""
        type: string
      rust-version:
        description: Exact current Rust toolchain version.
        required: false
        default: ""
        type: string
permissions:
  actions: read
  contents: read

jobs:
  packages:
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.runner-configs-json) }}
        package: ${{ fromJSON(inputs.packages-json) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo test ${{ matrix.package }} (${{ matrix.config.lane }})
    env:
      BUILDX_BUILDER: jackin-construct-${{ github.run_id }}-${{ github.run_attempt }}-${{ strategy.job-index }}
      CARGO_INCREMENTAL: "0"
      CARGO_NET_OFFLINE: "true"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_TERM_COLOR: always
      JACKIN_TELEMETRY_VOLUME_PATH: target/telemetry-volume-ratchet.json
      LOCAL_REGISTRY_IMAGE: projectjackin/construct
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
          xtask-contract: ${{ inputs.ci-xtask-contract }}
          include-tools: "false"
      - name: Find input-identical successful crate result
        id: crate-result
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          "$CI_XTASK" ci-result find
          --package "${{ matrix.package }}"
          --cache-key "${{ fromJSON(inputs.package-cache-keys-json)[matrix.package] }}"
          --all-features "${{ inputs.all-features }}"
          --docker-e2e "${{ inputs.docker-e2e }}"
          --construct-image-changed "${{ inputs.construct-image-changed }}"
          --common-contract-key "${{ inputs.nextest-contract }}"
          --docker-contract-key "${{ inputs.docker-contract || hashFiles('docker/**', 'docker-bake.hcl') }}"
          --runner-os "${{ runner.os }}"
          --runner-arch "${{ runner.arch }}"
          --source-sha "${{ github.sha }}"
          --repository "${{ github.repository }}"
          --refresh-package "${{ inputs.refresh-package }}"
          --github-output
      - uses: ./.github/actions/download-ci-xtask
        if: steps.crate-result.outputs.hit != 'true'
        with:
          lane: ${{ matrix.config.lane }}
          tools-contract: ${{ inputs.ci-tools-contract }}
          xtask-contract: ${{ inputs.ci-xtask-contract }}
      - name: Cache prepared Rust toolchains
        if: steps.crate-result.outputs.hit != 'true'
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-v2-${{ runner.os }}-${{ runner.arch }}-${{ inputs.rustup-contract || hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-v2-${{ runner.os }}-${{ runner.arch }}-
      - name: Use the prepared current Rust toolchain
        if: steps.crate-result.outputs.hit != 'true'
        run: >-
          "$CI_XTASK" ci-toolchain activate
          --version "${{ inputs.rust-version }}"
      - id: cargo-registry-cache
        if: steps.crate-result.outputs.hit != 'true'
        uses: ./.github/actions/cache-cargo-registry
        with:
          contract-key: ${{ inputs.registry-contract }}
      - name: Resolve exact crate target key
        id: crate-target-key
        if: steps.crate-result.outputs.hit != 'true'
        shell: bash
        env:
          PACKAGE: ${{ matrix.package }}
          SUPPLIED_KEY: ${{ fromJSON(inputs.package-cache-keys-json)[matrix.package] }}
        run: |
          set -euo pipefail
          key=$SUPPLIED_KEY
          if [ -z "$key" ]; then
            key=$("$CI_XTASK" affected-crates --metadata "$CI_METADATA" --all --cache-keys \
              | jq -er --arg package "$PACKAGE" '.[$package]')
          fi
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - name: Find reusable crate target seed
        id: crate-target
        if: steps.crate-result.outputs.hit != 'true'
        shell: bash
        env:
          ALL_FEATURES: ${{ inputs.all-features }}
          CACHE_KEY: ${{ steps.crate-target-key.outputs.key }}
          GH_TOKEN: ${{ github.token }}
          PACKAGE: ${{ matrix.package }}
          REPOSITORY: ${{ github.repository }}
          RUNNER_ARCH: ${{ runner.arch }}
          RUNNER_OS: ${{ runner.os }}
          TARGET_RESULTS: ${{ inputs.package-target-results-json }}
        run: |
          "$CI_XTASK" ci-target find \
            --package "$PACKAGE" \
            --cache-key "$CACHE_KEY" \
            --all-features "$ALL_FEATURES" \
            --runner-os "$RUNNER_OS" \
            --runner-arch "$RUNNER_ARCH" \
            --repository "$REPOSITORY" \
            --supplied-results "$TARGET_RESULTS" \
            --github-output
      - name: Use runner-local target seed
        id: local-target
        if: steps.crate-target.outputs.hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          target_dir=${CARGO_TARGET_DIR:-target}
          hit=false
          if [ -f "$target_dir/.rustc_info.json" ] &&
             [ -d "$target_dir/debug/deps" ] &&
             find "$target_dir/debug/deps" -maxdepth 1 -type f -name '*.rlib' -print -quit | grep -q .; then
            hit=true
            echo "::notice::using runner-local current Cargo target as a validated seed"
          fi
          echo "hit=$hit" >> "$GITHUB_OUTPUT"
      - name: Download reusable crate target seed
        if: steps.crate-target.outputs.hit == 'true' && steps.local-target.outputs.hit != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          "$CI_XTASK" ci-target download \
            --artifact-id "${{ steps.crate-target.outputs.artifact-id }}" \
            --destination target/.ci-restore \
            --repository "$REPOSITORY"
      - name: Restore reusable crate target seed
        id: restored-target
        if: steps.crate-target.outputs.hit == 'true' && steps.local-target.outputs.hit != 'true'
        shell: bash
        env:
          CACHE_KEY: ${{ steps.crate-target-key.outputs.key }}
          KNOWN_EXACT: ${{ steps.crate-target.outputs.known-exact }}
        run: |
          "$CI_XTASK" ci-target restore \
            --archive target/.ci-restore/target.tar.zst \
            --target target \
            --cache-key "$CACHE_KEY" \
            --known-exact "$KNOWN_EXACT"
      - name: Run package tests
        if: steps.crate-result.outputs.hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          args=(-p "${{ matrix.package }}" --no-tests=pass --color=always --locked --offline --profile ci)
          if [ "${{ inputs.all-features }}" = "true" ]; then
            args+=(--all-features)
          fi
          cargo nextest run "${args[@]}"
      - name: Run crate doctests
        if: >-
          steps.crate-result.outputs.hit != 'true' &&
          !contains(fromJSON('["jackin-dev","jackin-pr-trailers","jackin-xtask"]'), matrix.package)
        run: cargo test --doc -p "${{ matrix.package }}" --locked --offline
      - name: Check crate default features
        if: steps.crate-result.outputs.hit != 'true'
        run: cargo check -p "${{ matrix.package }}" --all-targets --locked --offline
      - name: Lint crate all features
        if: steps.crate-result.outputs.hit != 'true'
        run: cargo clippy -p "${{ matrix.package }}" --all-targets --all-features --locked --offline -- -D warnings
      - name: Check crate feature powerset
        if: >-
          steps.crate-result.outputs.hit != 'true' &&
          contains(fromJSON('["jackin","jackin-agent-status","jackin-capsule","jackin-diagnostics","jackin-runtime","jackin-term"]'), matrix.package)
        run: cargo hack check -p "${{ matrix.package }}" --feature-powerset --all-targets --locked
      - name: Build crate benchmarks
        if: >-
          steps.crate-result.outputs.hit != 'true' &&
          contains(fromJSON('["jackin","jackin-capsule","jackin-config","jackin-diagnostics","jackin-manifest","jackin-runtime","jackin-term","jackin-usage"]'), matrix.package)
        run: cargo build --benches -p "${{ matrix.package }}" --locked --offline
      - name: Run bounded crate fuzz targets
        if: >-
          steps.crate-result.outputs.hit != 'true' &&
          contains(fromJSON('["jackin-config","jackin-env","jackin-manifest","jackin-protocol","jackin-term"]'), matrix.package)
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
        run: |
          case "${{ matrix.package }}" in
            jackin-config) dir=crates/jackin-config; targets="config_migrate workspace_migrate" ;;
            jackin-env) dir=crates/jackin-env; targets="env_resolve" ;;
            jackin-manifest) dir=crates/jackin-manifest; targets="manifest_migrate manifest_validate" ;;
            jackin-protocol) dir=crates/jackin-protocol; targets="decode_frames" ;;
            jackin-term) dir=crates/jackin-term; targets="damage_grid_process" ;;
          esac
          cd "$dir"
          cargo fetch --locked --offline
          for fuzz_target in $targets; do
            "$CI_CARGO_FUZZ" fuzz run --sanitizer none --target x86_64-unknown-linux-gnu \
              "$fuzz_target" -- -max_total_time=5
          done
      - name: Enforce telemetry volume ratchet
        if: steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin-diagnostics'
        run: |
          "$CI_XTASK" lint ratchet --only export-volume
      - name: Upload junit + timing
        if: always() && steps.crate-result.outputs.hit != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-junit-${{ matrix.package }}-${{ matrix.config.lane }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
      - name: Detect junit timing report
        id: junit
        if: always() && steps.crate-result.outputs.hit != 'true'
        shell: bash
        run: |
          if [ -f target/nextest/ci/junit.xml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      # Plan 027: suite-time family enforces when junit exists (skipped locally).
      - name: Suite-time ratchet (scheduled enforce)
        if: >-
          always() && steps.crate-result.outputs.hit != 'true' &&
          steps.junit.outputs.exists == 'true'
        run: |
          "$CI_XTASK" lint ratchet --only suite-time
      - name: Slowest tests summary
        if: always() && steps.crate-result.outputs.hit != 'true'
        shell: bash
        run: |
          if [ -f target/nextest/ci/junit.xml ]; then
            python3 - "$GITHUB_STEP_SUMMARY" "${{ matrix.package }}" <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          summary_path = Path(sys.argv[1])
          group = sys.argv[2]
          junit_path = Path("target/nextest/ci/junit.xml")
          root = ET.parse(junit_path).getroot()

          cases = []
          for case in root.iter("testcase"):
              name = case.attrib.get("name", "")
              try:
                  seconds = float(case.attrib.get("time", "0") or 0)
              except ValueError:
                  seconds = 0.0
              cases.append((seconds, name))

          with summary_path.open("a", encoding="utf-8") as summary:
              print(f"### Slowest tests ({group})", file=summary)
              for seconds, name in sorted(cases, reverse=True)[:10]:
                  print(f"- {seconds:g}s `{name}`", file=summary)
              print("", file=summary)
              print(
                  f"Crate wall time (sum of testcase times): {sum(seconds for seconds, _ in cases):.3f}s",
                  file=summary,
              )
          PY
          fi
      - name: Fail on unquarantined flakes
        if: always() && steps.crate-result.outputs.hit != 'true'
        shell: bash
        run: |
          [ -f target/nextest/ci/junit.xml ] || exit 0
          if ! grep -q 'flaky="true"' target/nextest/ci/junit.xml; then
            exit 0
          fi
          # Extract testcase names from lines that also carry flaky="true".
          mapfile -t flaky_names < <(
            grep 'flaky="true"' target/nextest/ci/junit.xml \
              | sed -n 's/.*name="\([^"]*\)".*/\1/p'
          )
          unquarantined=()
          for name in "${flaky_names[@]}"; do
            [ -n "$name" ] || continue
            if ! grep -Fq "name = \"$name\"" flaky-tests.toml 2>/dev/null; then
              unquarantined+=("$name")
            fi
          done
          if [ "${#unquarantined[@]}" -gt 0 ]; then
            echo "::error::flaky test(s) detected and not quarantined in flaky-tests.toml"
            printf "%s\n" "${unquarantined[@]}"
            exit 1
          fi

      - name: Set up Docker Buildx for Docker E2E
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' &&
          inputs.docker-e2e && inputs.construct-image-changed
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          name: ${{ env.BUILDX_BUILDER }}
      - name: Expose GitHub Actions cache runtime
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' &&
          inputs.docker-e2e && inputs.construct-image-changed
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - name: Resolve construct tool versions
        id: construct-versions
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' &&
          inputs.docker-e2e && inputs.construct-image-changed
        shell: bash
        run: |
          set -euo pipefail
          source docker/construct/versions.env
          echo "shellfirm-version=${SHELLFIRM_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Restore prebuilt shellfirm
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' &&
          inputs.docker-e2e && inputs.construct-image-changed
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: docker/construct/prebuilt
          key: shellfirm-${{ runner.os }}-${{ runner.arch }}-${{ steps.construct-versions.outputs.shellfirm-version }}-${{ inputs.rustup-contract || hashFiles('rust-toolchain.toml') }}
      - name: Build construct image inside the jackin crate job
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' &&
          inputs.docker-e2e && inputs.construct-image-changed
        env:
          CACHE_FROM: |
            type=registry,ref=projectjackin/construct:buildcache-amd64
            type=gha,scope=construct-ci-e2e,repository=${{ github.repository }},ghtoken=${{ github.token }}
          CACHE_TO: type=gha,scope=construct-ci-e2e,repository=${{ github.repository }},ghtoken=${{ github.token }},mode=max
        shell: bash
        run: |
          set -euo pipefail
          "$CI_XTASK" construct build-platform amd64
      - name: Build jackin-capsule for Docker E2E
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' && inputs.docker-e2e
        run: cargo build -p jackin-capsule --bin jackin-capsule --locked --offline
      - name: Point nextest at jackin-capsule
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' && inputs.docker-e2e
        run: |
          capsule_bin="${CARGO_TARGET_DIR:-target}/debug/jackin-capsule"
          chmod +x "$capsule_bin"
          case "$capsule_bin" in
            /*) echo "JACKIN_CAPSULE_BIN=$capsule_bin" >> "$GITHUB_ENV" ;;
            *) echo "JACKIN_CAPSULE_BIN=$PWD/$capsule_bin" >> "$GITHUB_ENV" ;;
          esac
      - name: Run Docker E2E smoke test
        if: >-
          steps.crate-result.outputs.hit != 'true' && matrix.package == 'jackin' && inputs.docker-e2e
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${VELNOR_DOCKER_HOST_TEMP:-}" ]; then
            export TMPDIR="$VELNOR_DOCKER_HOST_TEMP"
          fi
          cargo nextest run -p jackin --test dind_e2e --features e2e --profile docker-e2e \
            -E 'test(jackin_load_ctrl_q_yes_exits_cold_build_quickly)' \
            --no-tests=pass --color=always --locked --offline
      - name: Upload Docker E2E junit + timing
        if: >-
          always() && steps.crate-result.outputs.hit != 'true' &&
          matrix.package == 'jackin' && inputs.docker-e2e
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-junit-docker-e2e-${{ matrix.config.lane }}
          path: target/nextest/docker-e2e/junit.xml
          if-no-files-found: ignore
      - name: Fail on unquarantined Docker E2E flakes
        if: >-
          always() && steps.crate-result.outputs.hit != 'true' &&
          matrix.package == 'jackin' && inputs.docker-e2e
        shell: bash
        run: |
          [ -f target/nextest/docker-e2e/junit.xml ] || exit 0
          if ! grep -q 'flaky="true"' target/nextest/docker-e2e/junit.xml; then exit 0; fi
          mapfile -t flaky_names < <(
            grep 'flaky="true"' target/nextest/docker-e2e/junit.xml \
              | sed -n 's/.*name="\([^"]*\)".*/\1/p'
          )
          unquarantined=()
          for name in "${flaky_names[@]}"; do
            [ -n "$name" ] || continue
            if ! grep -Fq "name = \"$name\"" flaky-tests.toml 2>/dev/null; then
              unquarantined+=("$name")
            fi
          done
          if [ "${#unquarantined[@]}" -gt 0 ]; then
            echo "::error::flaky Docker E2E test(s) detected and not quarantined in flaky-tests.toml"
            printf "%s\n" "${unquarantined[@]}"
            exit 1
          fi

      - name: Pack reusable crate target seed
        if: >-
          always() && !cancelled() && !failure() &&
          steps.crate-result.outputs.hit != 'true' &&
          steps.restored-target.outputs.canonical-hit != 'true' &&
          matrix.config.cache_writer &&
          (github.ref == 'refs/heads/main' ||
           github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          "$CI_XTASK" ci-target pack \
            --target target \
            --source-key "${{ steps.crate-target-key.outputs.key }}" \
            --output target.tar.zst
      - name: Publish reusable crate target seed
        if: >-
          always() && !cancelled() && !failure() &&
          steps.crate-result.outputs.hit != 'true' &&
          steps.restored-target.outputs.canonical-hit != 'true' &&
          matrix.config.cache_writer &&
          (github.ref == 'refs/heads/main' ||
           github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.crate-target.outputs.name }}
          path: target.tar.zst
          compression-level: 0
          retention-days: 7

      - name: Capture sccache stats
        if: always() && steps.crate-result.outputs.hit != 'true'
        uses: ./.github/actions/sccache-stats
        with:
          artifact-name: sccache-stats-nextest-${{ matrix.package }}-${{ matrix.config.lane }}
          heading: sccache test ${{ matrix.package }} (${{ matrix.config.lane }})
      - name: Stage input-identical successful crate result
        if: >-
          always() && !cancelled() && !failure() &&
          steps.crate-result.outputs.hit != 'true' &&
          matrix.package != inputs.refresh-package &&
          matrix.config.cache_writer &&
          (github.ref == 'refs/heads/main' ||
           github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          printf '%s\n' \
            "package=${{ matrix.package }}" \
            "source-key=${{ steps.crate-target-key.outputs.key }}" \
            "source-sha=${{ github.sha }}" \
            > crate-result.txt
      - name: Publish input-identical successful crate result
        if: >-
          always() && !cancelled() && !failure() &&
          steps.crate-result.outputs.hit != 'true' &&
          matrix.package != inputs.refresh-package &&
          matrix.config.cache_writer &&
          (github.ref == 'refs/heads/main' ||
           github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.crate-result.outputs.name }}
          path: crate-result.txt
          compression-level: 0
          retention-days: 7
      - name: Publish exact-SHA successful crate result alias
        if: >-
          always() && !cancelled() && !failure() &&
          steps.crate-result.outputs.hit != 'true' &&
          matrix.package != inputs.refresh-package &&
          steps.crate-result.outputs.name != steps.crate-result.outputs.sha-name &&
          matrix.config.cache_writer &&
          (github.ref == 'refs/heads/main' ||
           github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.crate-result.outputs.sha-name }}
