name: Rust Nextest Packages

on:
  workflow_call:
    inputs:
      runner-configs-json:
        description: JSON array of runner lane configs. Each item has lane and JSON-encoded runner fields.
        required: true
        type: string
      all-features:
        description: Run each package with all Cargo features enabled.
        required: true
        type: boolean
      cache-shared-key:
        description: Shared Rust cache namespace for this nextest lane.
        required: true
        type: string
      save-target-cache:
        description: Save the restored Rust target cache after package or Docker jobs finish.
        required: false
        default: true
        type: boolean
      construct-image-changed:
        description: Download and load the PR-built construct image before Docker E2E.
        required: false
        default: false
        type: boolean
      docker-e2e:
        description: Build and run the real Docker E2E nextest lane.
        required: false
        default: false
        type: boolean
permissions:
  actions: read
  contents: read

jobs:
  packages:
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.runner-configs-json) }}
        shard:
          - { name: jackin, group: jackin, partition: "" }
          - { name: jackin-capsule, group: jackin-capsule, partition: "" }
          - { name: jackin-runtime-1, group: jackin-runtime, partition: "hash:1/5" }
          - { name: jackin-runtime-2, group: jackin-runtime, partition: "hash:2/5" }
          - { name: jackin-runtime-3, group: jackin-runtime, partition: "hash:3/5" }
          - { name: jackin-runtime-4, group: jackin-runtime, partition: "hash:4/5" }
          - { name: jackin-runtime-5, group: jackin-runtime, partition: "hash:5/5" }
          - { name: small-tools, group: small-tools, partition: "" }
          - { name: small-services, group: small-services, partition: "" }
          - { name: small-foundation, group: small-foundation, partition: "" }
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo nextest ${{ matrix.shard.name }} (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_OFFLINE: "true"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          # sccache install: blank wrapper in case binstall source-falls-back
          # to cargo, which would probe rustc through a missing sccache.
          RUSTC_WRAPPER: ""
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ inputs.cache-shared-key }}-package-${{ matrix.shard.group }}
          key: ${{ hashFiles('Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', '.cargo/**', 'build.rs', 'src/**', 'crates/**', 'tests/**', 'docker/runtime/**') }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
          save-if: >-
            ${{ github.ref == 'refs/heads/main' ||
                github.event_name == 'workflow_dispatch' ||
                (github.event_name == 'pull_request' &&
                 github.event.pull_request.head.repo.full_name == github.repository) }}
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback.
          # Each package group owns its exact artifacts. The source revision key
          # lets an equivalent rerun reuse them without freezing the first
          # workspace snapshot under an immutable semantic key.
          # Both lanes use the same target-cache contract. Velnor's persistent
          # runner state remains a transparent accelerator beneath it.
      - name: Run package tests
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.shard.group }}" in
            jackin|jackin-capsule|jackin-runtime)
              args=(-p "${{ matrix.shard.group }}")
              ;;
            small-tools)
              args=(-p jackin-console -p jackin-console-oppicker -p jackin-xtask)
              ;;
            small-services)
              args=(
                -p jackin-config
                -p jackin-diagnostics
                -p jackin-env
                -p jackin-image
              )
              ;;
            small-foundation)
              args=(
                -p jackin-agent-status
                -p jackin-build-meta
                -p jackin-core
                -p jackin-dev
                -p jackin-docker
                -p jackin-host
                -p jackin-instance
                -p jackin-isolation
                -p jackin-launch-tui
                -p jackin-manifest
                -p jackin-pr-trailers
                -p jackin-process
                -p jackin-protocol
                -p jackin-term
                -p jackin-test-support
                -p jackin-usage
              )
              ;;
            *)
              echo "::error::unknown nextest package group: ${{ matrix.shard.group }}"
              exit 1
              ;;
          esac

          args+=(--no-tests=pass --color=always --locked --offline --profile ci)
          if [ -n "${{ matrix.shard.partition }}" ]; then
            args+=(--partition "${{ matrix.shard.partition }}")
          fi
          if [ "${{ inputs.all-features }}" = "true" ]; then
            args+=(--all-features)
          fi
          cargo nextest run "${args[@]}"
      - name: Upload junit + timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-junit-${{ matrix.shard.name }}-${{ matrix.config.lane }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
      # Plan 027: suite-time family enforces when junit exists (skipped locally).
      - name: Suite-time ratchet (scheduled enforce)
        if: always() && hashFiles('target/nextest/ci/junit.xml') != ''
        run: |
          "$CI_XTASK" lint ratchet --only suite-time
      - name: Slowest tests summary
        if: always()
        shell: bash
        run: |
          if [ -f target/nextest/ci/junit.xml ]; then
            python3 - "$GITHUB_STEP_SUMMARY" "${{ matrix.shard.name }}" <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          summary_path = Path(sys.argv[1])
          group = sys.argv[2]
          junit_path = Path("target/nextest/ci/junit.xml")
          root = ET.parse(junit_path).getroot()

          cases = []
          for case in root.iter("testcase"):
              name = case.attrib.get("name", "")
              try:
                  seconds = float(case.attrib.get("time", "0") or 0)
              except ValueError:
                  seconds = 0.0
              cases.append((seconds, name))

          with summary_path.open("a", encoding="utf-8") as summary:
              print(f"### Slowest tests ({group})", file=summary)
              for seconds, name in sorted(cases, reverse=True)[:10]:
                  print(f"- {seconds:g}s `{name}`", file=summary)
              print("", file=summary)
              print(
                  f"Shard wall time (sum of testcase times): {sum(seconds for seconds, _ in cases):.3f}s",
                  file=summary,
              )
          PY
          fi
      - name: Fail on unquarantined flakes
        if: always()
        shell: bash
        run: |
          [ -f target/nextest/ci/junit.xml ] || exit 0
          if ! grep -q 'flaky="true"' target/nextest/ci/junit.xml; then
            exit 0
          fi
          # Extract testcase names from lines that also carry flaky="true".
          mapfile -t flaky_names < <(
            grep 'flaky="true"' target/nextest/ci/junit.xml \
              | sed -n 's/.*name="\([^"]*\)".*/\1/p'
          )
          unquarantined=()
          for name in "${flaky_names[@]}"; do
            [ -n "$name" ] || continue
            if ! grep -Fq "name = \"$name\"" flaky-tests.toml 2>/dev/null; then
              unquarantined+=("$name")
            fi
          done
          if [ "${#unquarantined[@]}" -gt 0 ]; then
            echo "::error::flaky test(s) detected and not quarantined in flaky-tests.toml"
            printf "%s\n" "${unquarantined[@]}"
            exit 1
          fi

      - name: Capture sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats
        with:
          artifact-name: sccache-stats-nextest-${{ matrix.shard.name }}-${{ matrix.config.lane }}
          heading: sccache nextest ${{ matrix.shard.name }} (${{ matrix.config.lane }})

  docker-e2e:
    if: inputs.docker-e2e
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.runner-configs-json) }}
        shard:
          - { name: docker-e2e-1, partition: "hash:1/4" }
          - { name: docker-e2e-2, partition: "hash:2/4" }
          - { name: docker-e2e-3, partition: "hash:3/4" }
          - { name: docker-e2e-4, partition: "hash:4/4" }
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: Docker E2E ${{ matrix.shard.name }} (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_OFFLINE: "true"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          # sccache install: blank wrapper in case binstall source-falls-back
          # to cargo, which would probe rustc through a missing sccache.
          RUSTC_WRAPPER: ""
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-docker-e2e-dev-workspace-v1
          key: ${{ hashFiles('Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', '.cargo/**', 'build.rs', 'src/**', 'crates/**', 'tests/**', 'docker/runtime/**') }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
          save-if: >-
            ${{ github.ref == 'refs/heads/main' ||
                github.event_name == 'workflow_dispatch' ||
                (github.event_name == 'pull_request' &&
                 github.event.pull_request.head.repo.full_name == github.repository) }}
          # Docker E2E owns its exact build/run artifacts. Package shards keep
          # the all-features namespace so the narrower Docker graph cannot seed
          # the shared package-test cache.
      - name: Download construct image for E2E
        if: inputs.construct-image-changed
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: construct-trixie-image-${{ matrix.config.lane }}
          path: target/construct-image
      - name: Recover construct image through the Actions API
        if: inputs.construct-image-changed
        shell: bash
        env:
          ARTIFACT_NAME: construct-trixie-image-${{ matrix.config.lane }}
          ARTIFACT_PATH: target/construct-image
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_PATH"
          if [ -f "$ARTIFACT_PATH/construct-trixie.tar" ]; then
            exit 0
          fi

          artifact_id=$(
            gh api "repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
              --paginate \
              --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\") | .id" \
              | head -n 1
          )
          if [ -z "$artifact_id" ]; then
            echo "::error::artifact not found: ${ARTIFACT_NAME}"
            exit 1
          fi

          archive="$ARTIFACT_PATH/.artifact.zip"
          gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "$archive"
          python3 -m zipfile -e "$archive" "$ARTIFACT_PATH"
          rm "$archive"
      - name: Load construct image for E2E
        if: inputs.construct-image-changed
        run: docker load --input target/construct-image/construct-trixie.tar
      - name: Build jackin-capsule for nextest
        run: cargo build -p jackin-capsule --bin jackin-capsule --locked --offline
      - name: Point nextest at jackin-capsule
        run: |
          capsule_bin="${CARGO_TARGET_DIR:-target}/debug/jackin-capsule"
          chmod +x "$capsule_bin"
          case "$capsule_bin" in
            /*) echo "JACKIN_CAPSULE_BIN=$capsule_bin" >> "$GITHUB_ENV" ;;
            *) echo "JACKIN_CAPSULE_BIN=$PWD/$capsule_bin" >> "$GITHUB_ENV" ;;
          esac
      - name: Run Docker E2E smoke tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${VELNOR_DOCKER_HOST_TEMP:-}" ]; then
            export TMPDIR="$VELNOR_DOCKER_HOST_TEMP"
          fi
          cargo nextest run -p jackin --features e2e --profile docker-e2e \
            --partition "${{ matrix.shard.partition }}" --no-tests=pass \
            --color=always --locked --offline
      - name: Upload Docker E2E junit + timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-junit-${{ matrix.shard.name }}-${{ matrix.config.lane }}
          path: target/nextest/docker-e2e/junit.xml
          if-no-files-found: ignore
      - name: Fail on unquarantined Docker E2E flakes
        if: always()
        shell: bash
        run: |
          [ -f target/nextest/docker-e2e/junit.xml ] || exit 0
          if ! grep -q 'flaky="true"' target/nextest/docker-e2e/junit.xml; then
            exit 0
          fi
          mapfile -t flaky_names < <(
            grep 'flaky="true"' target/nextest/docker-e2e/junit.xml \
              | sed -n 's/.*name="\([^"]*\)".*/\1/p'
          )
          unquarantined=()
          for name in "${flaky_names[@]}"; do
            [ -n "$name" ] || continue
            if ! grep -Fq "name = \"$name\"" flaky-tests.toml 2>/dev/null; then
              unquarantined+=("$name")
            fi
          done
          if [ "${#unquarantined[@]}" -gt 0 ]; then
            echo "::error::flaky Docker E2E test(s) detected and not quarantined in flaky-tests.toml"
            printf "%s\n" "${unquarantined[@]}"
            exit 1
          fi
      - name: Capture sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats
        with:
          artifact-name: sccache-stats-${{ matrix.shard.name }}-${{ matrix.config.lane }}
          heading: sccache ${{ matrix.shard.name }} (${{ matrix.config.lane }})
