        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "cargo-binstall rust cargo:cargo-nextest cargo:cargo-zigbuild zig"
