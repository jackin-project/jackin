  # Plan 027: per-main health JSON snapshot (advisory series seed).
  health-trend:
    name: Health trend snapshot (advisory)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - name: Restore prior health snapshots
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p target/health-history
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.expired == false and (.name | startswith("health-snapshot-")))] | .[:12][] | .archive_download_url' \
            > target/health-history/urls.txt
          : > health-history.jsonl
          index=0
          while IFS= read -r url; do
            [ -n "$url" ] || continue
            index=$((index + 1))
            gh api "$url" > "target/health-history/${index}.zip"
            unzip -p "target/health-history/${index}.zip" health-snapshot.json \
              | jq -c . >> health-history.jsonl
          done < target/health-history/urls.txt
      - name: Emit health JSON
        run: |
          set -euo pipefail
          cargo run -p jackin-xtask --locked -- health --format json > health-report.json
          jq -n \
            --argjson schema 1 \
            --arg observed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson observed_at_unix "$(date -u +%s)" \
            --arg commit_sha "$GITHUB_SHA" \
            --slurpfile report health-report.json \
            '{schema: $schema, observed_at: $observed_at, observed_at_unix: $observed_at_unix, commit_sha: $commit_sha, report: $report[0]}' \
            | tee health-snapshot.json
          jq -c . health-snapshot.json >> health-history.jsonl
          {
            echo "### Health snapshot"
            echo "Series snapshots: $(wc -l < health-history.jsonl)"
            echo
            echo '```json'
            head -c 8000 health-snapshot.json || true
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload health snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: health-snapshot-${{ github.run_id }}
          path: |
            health-snapshot.json
            health-history.jsonl
          if-no-files-found: warn
