name: Hygiene

on:
  schedule:
    - cron: "23 11 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dead-code:
    name: Dead-code scanners
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "rust cargo:cargo-deny cargo:cargo-fuzz cargo:cargo-hack cargo:cargo-udeps cargo:cargo-workspace-unused-pub"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - name: Install nightly for cargo-udeps
        run: rustup toolchain install nightly --profile minimal
      - run: cargo +nightly udeps --workspace --all-targets
      - run: bash .github/scripts/check-workspace-unused-pub.sh
      - run: cargo deny check advisories
      - run: cargo hack check --workspace --feature-powerset --all-targets --locked
      - name: Long jackin-term fuzz run
        run: |
          cd crates/jackin-term
          cargo +nightly fuzz run vt100_process -- -max_total_time=300
