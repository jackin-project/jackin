name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
            if [[ "$version" == *"-dev"* ]]; then
              echo "::error::Cannot release a dev version ($version)"
              exit 1
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  build:
    needs: [check-version, test]
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        env:
          JACKIN_VERSION_OVERRIDE: ${{ needs.check-version.outputs.version }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          archive="jackin-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" jackin jackin-validate
          shasum -a 256 "$archive" > "$archive.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: jackin-${{ matrix.target }}
          path: |
            jackin-*.tar.gz
            jackin-*.tar.gz.sha256

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" artifacts/jackin-*.tar.gz artifacts/jackin-*.sha256 \
            --title "v${VERSION}" \
            --generate-notes

  homebrew:
    needs: [check-version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: jackin
          homebrew-tap: jackin-project/homebrew-tap
          tag-name: v${{ needs.check-version.outputs.version }}
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
