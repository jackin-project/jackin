name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      lanes:
        description: |
          Which runner(s) to run on. Default github; use both for parity runs.
        type: choice
        default: github
        options: [github, velnor, both]

permissions:
  actions: read
  contents: read

# Two simultaneous tag pushes (or a tag push racing a workflow_dispatch
# from main) would otherwise both reach `gh release create` and the
# second loses to a 422 from a duplicate tag/release. Group key is
# specifically `release-` (no ref) because we want serialization
# across tags too.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  matrix-setup:
    name: Select runner lane
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      configs: ${{ steps.set.outputs.configs }}
      has_github: ${{ steps.set.outputs.has_github }}
    steps:
      - id: set
        env:
          LANES: ${{ github.event_name == 'workflow_dispatch' && inputs.lanes || 'github' }}
        run: |
          github='{"lane":"GitHub","runner":"\"ubuntu-24.04\"","runner_os":"Linux","runner_arch":"X64"}'
          velnor='{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","runner_os":"Linux","runner_arch":"X64"}'
          case "$LANES" in
            velnor)
              configs="[$velnor]"
              has_github=false
              ;;
            both)
              configs="[$github,$velnor]"
              has_github=true
              ;;
            *)
              configs="[$github]"
              has_github=true
              ;;
          esac
          {
            echo "configs=$configs"
            echo "has_github=$has_github"
          } >> "$GITHUB_OUTPUT"

  check-version:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require main for manual releases
        if: github.event_name == 'workflow_dispatch'
        run: |
          test "${GITHUB_REF}" = "refs/heads/main" || {
            echo "::error::workflow_dispatch releases must run from main"
            exit 1
          }

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
            if [[ "$version" == *"-dev"* ]]; then
              echo "::error::Cannot release a dev version ($version)"
              exit 1
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    needs: [check-version, matrix-setup]
    uses: ./.github/workflows/rust-nextest.yml
    with:
      runner-configs-json: ${{ needs.matrix-setup.outputs.configs }}
      all-features: false
      cache-shared-key: nextest-default-workspace-v2
    secrets: inherit

  build:
    needs: [check-version, matrix-setup]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
        target:
          - triple: x86_64-apple-darwin
            zigbuild_target: x86_64-apple-darwin
          - triple: aarch64-apple-darwin
            zigbuild_target: aarch64-apple-darwin
          - triple: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.17
          - triple: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.17
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: build jackin ${{ matrix.target.triple }} (${{ matrix.config.lane }})
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: ${{ matrix.config.lane == 'GitHub' && 'on' || 'off' }}
      SCCACHE_GHA_CACHE_TO: sccache-release-jackin-${{ matrix.config.lane }}-${{ matrix.config.runner_os }}-${{ matrix.config.runner_arch }}-${{ matrix.target.triple }}
      SCCACHE_GHA_CACHE_FROM: sccache-release-jackin-${{ matrix.config.lane }}-${{ matrix.config.runner_os }}-${{ matrix.config.runner_arch }}-${{ matrix.target.triple }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust zig cargo-zigbuild cosign syft sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-archive-jackin-${{ matrix.target.triple }}-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: rustup target add ${{ matrix.target.triple }}
      - name: Export sccache GitHub cache runtime
        if: matrix.config.lane == 'GitHub'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Cache macOS SDK
        if: contains(matrix.target.triple, 'apple')
        id: sdk-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/macos-sdk
          key: macos-sdk-26.1
      - name: Download macOS SDK
        if: contains(matrix.target.triple, 'apple') && steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/macos-sdk
          curl -fsSL "https://github.com/joseluisq/macosx-sdks/releases/download/26.1/MacOSX26.1.sdk.tar.xz" \
            | tar -xJ -C /tmp/macos-sdk
      - name: Set macOS SDKROOT
        if: contains(matrix.target.triple, 'apple')
        run: |
          echo "SDKROOT=/tmp/macos-sdk/MacOSX26.1.sdk" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> "$GITHUB_ENV"
      - name: Build signed archive
        uses: ./.github/actions/build-release-archive
        with:
          package: jackin
          target: ${{ matrix.target.triple }}
          zigbuild-target: ${{ matrix.target.zigbuild_target }}
          version: ${{ needs.check-version.outputs.version }}
          archive-basename: jackin-${{ needs.check-version.outputs.version }}-${{ matrix.target.triple }}
          artifact-name: release-${{ matrix.config.lane }}-jackin-${{ matrix.target.triple }}
          timings-artifact-name: cargo-timings-release-jackin-${{ matrix.target.triple }}-${{ matrix.config.lane }}
          sccache-stats-artifact-name: sccache-stats-release-jackin-${{ matrix.target.triple }}-${{ matrix.config.lane }}
          sccache-stats-heading: sccache release jackin ${{ matrix.target.triple }} (${{ matrix.config.lane }})

  build-jackin-capsule:
    needs: [check-version, matrix-setup]
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: build jackin-capsule ${{ matrix.target.triple }} (${{ matrix.config.lane }})
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: ${{ matrix.config.lane == 'GitHub' && 'on' || 'off' }}
      SCCACHE_GHA_CACHE_TO: sccache-release-capsule-${{ matrix.config.lane }}-${{ matrix.config.runner_os }}-${{ matrix.config.runner_arch }}-${{ matrix.target.triple }}
      SCCACHE_GHA_CACHE_FROM: sccache-release-capsule-${{ matrix.config.lane }}-${{ matrix.config.runner_os }}-${{ matrix.config.runner_arch }}-${{ matrix.target.triple }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
        target:
          - triple: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.17
          - triple: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.17
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust zig cargo-zigbuild cosign syft sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-archive-capsule-${{ matrix.target.triple }}-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: rustup target add ${{ matrix.target.triple }}
      - name: Export sccache GitHub cache runtime
        if: matrix.config.lane == 'GitHub'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Build signed capsule archive
        uses: ./.github/actions/build-release-archive
        with:
          package: jackin-capsule
          target: ${{ matrix.target.triple }}
          zigbuild-target: ${{ matrix.target.zigbuild_target }}
          version: ${{ needs.check-version.outputs.version }}
          archive-basename: jackin-capsule-${{ needs.check-version.outputs.version }}-${{ matrix.target.triple }}
          artifact-name: release-${{ matrix.config.lane }}-jackin-capsule-${{ matrix.target.triple }}
          timings-artifact-name: cargo-timings-release-capsule-${{ matrix.target.triple }}-${{ matrix.config.lane }}
          sccache-stats-artifact-name: sccache-stats-release-capsule-${{ matrix.target.triple }}-${{ matrix.config.lane }}
          sccache-stats-heading: sccache release capsule ${{ matrix.target.triple }} (${{ matrix.config.lane }})

  release:
    if: needs.matrix-setup.outputs.has_github == 'true'
    needs: [check-version, matrix-setup, test, build, build-jackin-capsule]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
    outputs:
      arm64_macos: ${{ steps.shas.outputs.arm64_macos }}
      x86_macos: ${{ steps.shas.outputs.x86_macos }}
      arm64_linux: ${{ steps.shas.outputs.arm64_linux }}
      x86_linux: ${{ steps.shas.outputs.x86_linux }}
      capsule_arm64_linux: ${{ steps.shas.outputs.capsule_arm64_linux }}
      capsule_x86_linux: ${{ steps.shas.outputs.capsule_x86_linux }}
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-GitHub-*
          path: artifacts
          merge-multiple: true

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Read platform SHA256s
        id: shas
        run: |
          read_sha() {
            awk '{print $1}' "artifacts/$1.sha256"
          }
          {
            echo "arm64_macos=$(read_sha "jackin-${VERSION}-aarch64-apple-darwin.tar.gz")"
            echo "x86_macos=$(read_sha "jackin-${VERSION}-x86_64-apple-darwin.tar.gz")"
            echo "arm64_linux=$(read_sha "jackin-${VERSION}-aarch64-unknown-linux-gnu.tar.gz")"
            echo "x86_linux=$(read_sha "jackin-${VERSION}-x86_64-unknown-linux-gnu.tar.gz")"
            echo "capsule_arm64_linux=$(read_sha "jackin-capsule-${VERSION}-aarch64-unknown-linux-gnu.tar.gz")"
            echo "capsule_x86_linux=$(read_sha "jackin-capsule-${VERSION}-x86_64-unknown-linux-gnu.tar.gz")"
          } >> "$GITHUB_OUTPUT"

      - name: Produce and sign capsule manifest
        uses: ./.github/actions/sign-capsule-manifest
        with:
          version: ${{ needs.check-version.outputs.version }}
          arm64-sha: ${{ steps.shas.outputs.capsule_arm64_linux }}
          x86-sha: ${{ steps.shas.outputs.capsule_x86_linux }}
          github-token: ${{ secrets.GH_READONLY_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" \
            artifacts/jackin-[0-9]*.tar.gz \
            artifacts/jackin-[0-9]*.tar.gz.sha256 \
            artifacts/jackin-[0-9]*.tar.gz.bundle \
            artifacts/jackin-[0-9]*.tar.gz.sbom.json \
            artifacts/jackin-capsule-*.tar.gz \
            artifacts/jackin-capsule-*.tar.gz.sha256 \
            artifacts/jackin-capsule-*.tar.gz.bundle \
            artifacts/jackin-capsule-*.tar.gz.sbom.json \
            artifacts/capsule-manifest.json \
            artifacts/capsule-manifest.json.bundle \
            --title "v${VERSION}" \
            --generate-notes

  homebrew:
    # Explicit success gate so a future change to the `release` job
    # that turns a failure into a soft-error / continue-on-error path
    # cannot silently ship a formula update for an unreleased version.
    if: needs.release.result == 'success'
    needs: [check-version, release]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: jackin-project/homebrew-tap
          ref: main
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Rewrite stable formula
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          ARM64_SHA256: ${{ needs.release.outputs.arm64_macos }}
          X86_SHA256: ${{ needs.release.outputs.x86_macos }}
          LINUX_ARM64_SHA256: ${{ needs.release.outputs.arm64_linux }}
          LINUX_X86_SHA256: ${{ needs.release.outputs.x86_linux }}
          CAPSULE_ARM64_SHA256: ${{ needs.release.outputs.capsule_arm64_linux }}
          CAPSULE_X86_SHA256: ${{ needs.release.outputs.capsule_x86_linux }}
        run: |
          cat > homebrew-tap/Formula/jackin.rb <<EOF
          class Jackin < Formula
            desc "CLI for orchestrating autonomous AI coding agents in isolated sandboxed environments — reproducible, scoped, and fully under your control"
            homepage "https://github.com/jackin-project/jackin"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/jackin-project/jackin/releases/download/v${VERSION}/jackin-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA256}"
              end
              on_intel do
                url "https://github.com/jackin-project/jackin/releases/download/v${VERSION}/jackin-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_SHA256}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/jackin-project/jackin/releases/download/v${VERSION}/jackin-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM64_SHA256}"
              end
              on_intel do
                url "https://github.com/jackin-project/jackin/releases/download/v${VERSION}/jackin-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X86_SHA256}"
              end
            end

            resource "jackin-capsule-aarch64-unknown-linux-gnu" do
              url "https://github.com/jackin-project/jackin/releases/download/v${VERSION}/jackin-capsule-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
              sha256 "${CAPSULE_ARM64_SHA256}"
            end

            resource "jackin-capsule-x86_64-unknown-linux-gnu" do
              url "https://github.com/jackin-project/jackin/releases/download/v${VERSION}/jackin-capsule-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${CAPSULE_X86_SHA256}"
            end

            conflicts_with "jackin-project/tap/jackin-preview", because: "stable and preview install the same binary"

            def install
              bin.install "jackin"
              bin.install "jackin-role"

              capsule_target = Hardware::CPU.arm? ? "aarch64-unknown-linux-gnu" : "x86_64-unknown-linux-gnu"
              capsule_arch = Hardware::CPU.arm? ? "arm64" : "amd64"
              resource("jackin-capsule-#{capsule_target}").stage do
                capsule_dir = libexec/"jackin-capsule/linux-#{capsule_arch}"
                capsule_dir.install "jackin-capsule"
                chmod 0755, capsule_dir/"jackin-capsule"
              end
            end

            test do
              system "#{bin}/jackin", "--version"
            end
          end
          EOF

      - name: Open and merge PR for tap update
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          git add Formula/jackin.rb
          if git diff --cached --quiet --exit-code; then
            echo "Stable formula already up to date"
            exit 0
          fi
          branch="release/formula-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git commit -m "jackin ${VERSION}"
          git push -u origin "$branch"
          body_file="${RUNNER_TEMP}/homebrew-pr-body.md"
          {
            printf 'Automated stable formula update for **jackin %s**.\n\n' "$VERSION"
            printf -- '- Release: https://github.com/jackin-project/jackin/releases/tag/v%s\n' "$VERSION"
            printf -- '- Installs matching jackin-capsule Linux resource archives under formula libexec.\n'
          } > "$body_file"
          pr_url=$(gh pr create \
            --title "jackin ${VERSION}" \
            --body-file "$body_file" \
            --base main \
            --head "$branch")
          echo "Opened PR: $pr_url"
          gh pr merge "$pr_url" --squash --delete-branch

  timing-summary:
    if: always()
    needs: [matrix-setup, check-version, test, build, build-jackin-capsule, release, homebrew]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Write workflow timing summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/ci/workflow-timing-summary.sh Release
