name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: read

# Two simultaneous tag pushes (or a tag push racing a workflow_dispatch
# from main) would otherwise both reach `gh release create` and the
# second loses to a 422 from a duplicate tag/release. Group key is
# specifically `release-` (no ref) because we want serialization
# across tags too.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Require main for manual releases
        if: github.event_name == 'workflow_dispatch'
        run: |
          test "${GITHUB_REF}" = "refs/heads/main" || {
            echo "::error::workflow_dispatch releases must run from main"
            exit 1
          }

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
            if [[ "$version" == *"-dev"* ]]; then
              echo "::error::Cannot release a dev version ($version)"
              exit 1
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    needs: check-version
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "rust cargo:cargo-nextest"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-
      - name: Install mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - run: cargo nextest run --color=always

  build:
    needs: [check-version, test]
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            zigbuild: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            zigbuild: true
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - run: rustup target add ${{ matrix.target }}
      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Install mold linker
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "zig cargo:cargo-zigbuild"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}

      - name: Build
        env:
          JACKIN_VERSION_OVERRIDE: ${{ needs.check-version.outputs.version }}
        run: |
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            cargo zigbuild --release --locked --target ${{ matrix.target }}.2.17
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          archive="jackin-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" jackin jackin-role
          shasum -a 256 "$archive" > "$archive.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jackin-${{ matrix.target }}
          path: |
            jackin-*.tar.gz
            jackin-*.tar.gz.sha256

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" artifacts/jackin-*.tar.gz artifacts/jackin-*.sha256 \
            --title "v${VERSION}" \
            --generate-notes

  homebrew:
    # Explicit success gate so a future change to the `release` job
    # that turns a failure into a soft-error / continue-on-error path
    # cannot silently let `bump-homebrew-formula-action` ship a
    # formula update for an unreleased version.
    if: needs.release.result == 'success'
    needs: [check-version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@ccf2332299a883f6af50a1d2d41e5df7904dd769 # v4.1
        with:
          formula-name: jackin
          homebrew-tap: jackin-project/homebrew-tap
          tag-name: v${{ needs.check-version.outputs.version }}
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
