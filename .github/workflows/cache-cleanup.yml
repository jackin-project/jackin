name: Cache Cleanup

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      ref:
        description: Cache ref to delete, for example refs/pull/632/merge.
        required: true
        type: string

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Delete scoped caches
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CACHE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || format('refs/pull/{0}/merge', github.event.pull_request.number) }}
        run: |
          set -euo pipefail

          echo "Deleting caches for ${CACHE_REF}"
          while :; do
            cache_ids=$(gh cache list --ref "$CACHE_REF" --limit 100 --json id --jq '.[].id')
            if [ -z "$cache_ids" ]; then
              break
            fi
            while IFS= read -r cache_id; do
              [ -z "$cache_id" ] && continue
              gh cache delete "$cache_id" || true
            done <<< "$cache_ids"
          done
