name: Cache Cleanup

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      lanes:
        description: velnor (default) | github | both
        type: choice
        default: velnor
        options: [velnor, github, both]
      ref:
        description: Cache ref to delete, for example refs/pull/632/merge.
        required: true
        type: string

permissions:
  actions: write
  contents: read

concurrency:
  group: cache-cleanup-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Cleanup (${{ matrix.config.lane }})
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    timeout-minutes: 15
    steps:
      - name: Delete scoped caches
        if: matrix.config.writer
        env:
          GH_TOKEN: ${{ github.token }}
          CACHE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || format('refs/pull/{0}/merge', github.event.pull_request.number) }}
        run: gh cache delete --all --ref "$CACHE_REF" --succeed-on-no-caches
