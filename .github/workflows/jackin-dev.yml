name: jackin-dev

on:
  pull_request:
    paths:
      - ".github/actions/sign-and-attest-archive/**"
      - ".github/workflows/jackin-dev.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/jackin-dev/**"
      - "mise.toml"
      - "rust-toolchain.toml"
  push:
    branches: [main]
    paths:
      - "crates/jackin-dev/**"
  workflow_dispatch:
    inputs:
      lanes:
        description: |
          Which runner(s) to run on. Default velnor; use both for parity runs.
        type: choice
        default: velnor
        options: [velnor, github, both]

concurrency:
  # PR validation may cancel superseded work. Publishing runs serialize and
  # finish because cancellation can leave partially written registry state.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-version-bump:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Version policy compares the complete pull-request base range.
          fetch-depth: 0 # required by pull-request version-range policy
      - name: Classify version-check inputs
        id: version-inputs
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          token: ""
          filters: |
            lock:
              - 'Cargo.lock'
            artifact:
              - 'Cargo.toml'
              - 'crates/jackin-dev/**'
              - '!crates/jackin-dev/**/*.md'
      - name: Cache Rust toolchain
        if: steps.version-inputs.outputs.lock == 'true' && steps.version-inputs.outputs.artifact != 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        if: steps.version-inputs.outputs.lock == 'true' && steps.version-inputs.outputs.artifact != 'true'
        with:
          version: "2026.7.7"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - if: steps.version-inputs.outputs.lock == 'true' && steps.version-inputs.outputs.artifact != 'true'
        uses: ./.github/actions/cache-cargo-registry

      - name: Require jackin-dev version bump for artifact changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CARGO_NET_OFFLINE: "true"
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          diff_files=$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")
          artifact_changed=false
          lock_changed=false
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in
              Cargo.toml)
                artifact_changed=true
                ;;
              crates/jackin-dev/*)
                # README, AGENTS.md, and CLAUDE.md are orientation docs/symlinks;
                # they do not change the released artifact.
                case "$path" in
                  *.md) ;;
                  *) artifact_changed=true ;;
                esac
                ;;
              Cargo.lock)
                lock_changed=true
                ;;
            esac
          done <<< "$diff_files"

          if [ "$lock_changed" = true ] && [ "$artifact_changed" != true ]; then
            base_tree="$RUNNER_TEMP/jackin-dev-base.tree"
            head_tree="$RUNNER_TEMP/jackin-dev-head.tree"
            base_worktree="$RUNNER_TEMP/jackin-dev-base"

            git worktree add --detach "$base_worktree" "$BASE_SHA"
            (
              cd "$base_worktree"
              cargo tree -p jackin-dev --locked --edges normal,build --prefix none |
                sed -E 's| \([^)]*/crates/jackin-dev\)||' |
                sort -u
            ) > "$base_tree"
            cargo tree -p jackin-dev --locked --edges normal,build --prefix none |
              sed -E 's| \([^)]*/crates/jackin-dev\)||' |
              sort -u > "$head_tree"

            if ! cmp -s "$base_tree" "$head_tree"; then
              artifact_changed=true
            fi
          fi

          if [ "$artifact_changed" != true ]; then
            exit 0
          fi

          base_version=$(
            git show "${BASE_SHA}:crates/jackin-dev/Cargo.toml" |
              sed -n 's/^version = "\(.*\)"/\1/p' |
              head -1
          )
          head_version=$(
            sed -n 's/^version = "\(.*\)"/\1/p' crates/jackin-dev/Cargo.toml |
              head -1
          )

          if [ "$base_version" = "$head_version" ]; then
            echo "::error::jackin-dev artifact inputs changed; bump crates/jackin-dev/Cargo.toml from ${head_version}"
            exit 1
          fi

  version:
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      runner-configs: ${{ (github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","runner_os":"Linux","runner_arch":"X64","writer":true},{"lane":"GitHub","runner":"\"ubuntu-26.04\"","runner_os":"Linux","runner_arch":"X64","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"\"ubuntu-26.04\"","runner_os":"Linux","runner_arch":"X64","writer":true}]' || '[{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","runner_os":"Linux","runner_arch":"X64","writer":true}]' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: version
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/jackin-dev/Cargo.toml | head -1)
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  assert-version:
    needs: version
    runs-on: ubuntu-26.04
    timeout-minutes: 60
    outputs:
      published: ${{ steps.result.outputs.published || steps.off-main.outputs.published }}
    permissions:
      contents: read
    steps:
      - name: Reuse a completely published version
        id: result
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          if ! gh release view "jackin-dev-v${VERSION}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          formula=$(
            curl -fsSL --max-time 30 \
              "https://raw.githubusercontent.com/jackin-project/homebrew-tap/main/Formula/jackin-dev.rb"
          )
          formula_version=$(printf '%s\n' "$formula" | sed -n 's/^[[:space:]]*version "\(.*\)"/\1/p' | head -1)
          if [ "$formula_version" != "$VERSION" ]; then
            echo "::error::jackin-dev-v${VERSION} exists but the Homebrew formula publishes ${formula_version:-no version}"
            exit 1
          fi

          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "jackin-dev v${VERSION} release and formula already exist; reusing the published result"
      - name: Skip unpublished-version assertion off main
        id: off-main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "published=false" >> "$GITHUB_OUTPUT"
          echo "jackin-dev version publication is checked only on main"

  build:
    if: >-
      github.event_name != 'pull_request' &&
      needs.assert-version.outputs.published != 'true'
    needs: [version, assert-version]
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: build ${{ matrix.target.target }} (${{ matrix.config.lane }})
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "false"
      SCCACHE_CACHE_SIZE: 20G
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.version.outputs.runner-configs) }}
        target:
          - target: aarch64-apple-darwin
            zigbuild_target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
            zigbuild_target: x86_64-apple-darwin
          - target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.17
          - target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.17
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        env:
          # sccache install: blank wrapper in case binstall source-falls-back
          # to cargo, which would probe rustc through a missing sccache.
          RUSTC_WRAPPER: ""
        with:
          version: "2026.7.7"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "cargo-binstall rust zig cargo:cargo-zigbuild cosign syft"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0
          disable_annotations: "false"
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - run: rustup target add ${{ matrix.target.target }}
      - name: Cache Cargo target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target
          key: cargo-target-${{ matrix.config.lane }}-${{ runner.os }}-${{ github.job }}-${{ matrix.target.target }}-${{ hashFiles('rust-toolchain.toml', '.cargo/config.toml', '**/Cargo.toml', '**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: cargo-target-${{ matrix.config.lane }}-${{ runner.os }}-${{ github.job }}-${{ matrix.target.target }}-${{ hashFiles('rust-toolchain.toml', '.cargo/config.toml', '**/Cargo.toml', '**/Cargo.lock') }}-
      - name: Cache macOS SDK
        if: contains(matrix.target.target, 'apple')
        id: sdk-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/macos-sdk
          key: macos-sdk-26.1
      - name: Download macOS SDK
        if: contains(matrix.target.target, 'apple') && steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/macos-sdk
          curl -fsSL "https://github.com/joseluisq/macosx-sdks/releases/download/26.1/MacOSX26.1.sdk.tar.xz" \
            | tar -xJ -C /tmp/macos-sdk
      - name: Set macOS SDKROOT
        if: contains(matrix.target.target, 'apple')
        run: |
          echo "SDKROOT=/tmp/macos-sdk/MacOSX26.1.sdk" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> "$GITHUB_ENV"
      - name: Build
        env:
          ZIGBUILD_TARGET: ${{ matrix.target.zigbuild_target }}
        run: |
          set -euo pipefail
          export ZIG_GLOBAL_CACHE_DIR="${ZIG_GLOBAL_CACHE_DIR:-${RUNNER_TEMP:-/tmp}/zig-global-cache}"
          export ZIG_LOCAL_CACHE_DIR="${ZIG_LOCAL_CACHE_DIR:-${RUNNER_TEMP:-/tmp}/zig-local-cache}"
          mkdir -p "$ZIG_GLOBAL_CACHE_DIR" "$ZIG_LOCAL_CACHE_DIR"
          cargo zigbuild --timings --release --locked -p jackin-dev --target "$ZIGBUILD_TARGET"
      - name: Stage cargo timings
        if: always()
        run: |
          target_dir="${CARGO_TARGET_DIR:-target}"
          if [ "$target_dir" != "target" ] && [ -d "${target_dir}/cargo-timings" ]; then
            mkdir -p target/cargo-timings
            cp -a "${target_dir}/cargo-timings/." target/cargo-timings/
          fi
      - name: Upload cargo timings
        if: always() && matrix.config.writer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-timings-jackin-dev-${{ matrix.config.lane }}-${{ matrix.target.target }}
          path: target/cargo-timings/*.html
          if-no-files-found: ignore
          retention-days: 7
      - name: Package
        env:
          TARGET: ${{ matrix.target.target }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          target_dir="${CARGO_TARGET_DIR:-target}"
          archive="jackin-dev-${VERSION}-${TARGET}.tar.gz"
          tar -czf "$archive" \
            -C "${target_dir}/${TARGET}/release" \
            jackin-dev
          sha256sum "$archive" | awk '{print $1}' > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_ENV"
      - name: Sign, SBOM, and attest archive
        if: matrix.config.writer
        uses: ./.github/actions/sign-and-attest-archive
        with:
          archive: ${{ env.archive }}
      - if: matrix.config.writer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jackin-dev-${{ matrix.config.lane }}-${{ matrix.target.target }}
          path: |
            jackin-dev-*.tar.gz
            jackin-dev-*.tar.gz.sha256
            jackin-dev-*.tar.gz.bundle
            jackin-dev-*.tar.gz.sbom.json

  publish:
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.assert-version.outputs.published != 'true'
    needs: [version, assert-version, build]
    runs-on: ubuntu-26.04
    timeout-minutes: 60
    concurrency:
      group: homebrew-tap-publish
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: jackin-dev-*
          path: artifacts
          merge-multiple: true
      - name: Publish jackin-dev release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "jackin-dev-v${VERSION}" \
            artifacts/jackin-dev-*.tar.gz \
            artifacts/jackin-dev-*.tar.gz.sha256 \
            artifacts/jackin-dev-*.tar.gz.bundle \
            artifacts/jackin-dev-*.tar.gz.sbom.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "jackin-dev v${VERSION}" \
            --notes "jackin-dev v${VERSION}"
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: jackin-project/homebrew-tap
          ref: main
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Rewrite jackin-dev formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          read_sha() {
            cat "artifacts/jackin-dev-${VERSION}-$1.tar.gz.sha256"
          }
          ARM64_MACOS_SHA256=$(read_sha aarch64-apple-darwin)
          X86_MACOS_SHA256=$(read_sha x86_64-apple-darwin)
          ARM64_LINUX_SHA256=$(read_sha aarch64-unknown-linux-gnu)
          X86_LINUX_SHA256=$(read_sha x86_64-unknown-linux-gnu)

          cat > homebrew-tap/Formula/jackin-dev.rb <<EOF
          class JackinDev < Formula
            desc "Developer tooling for local jackin pull request verification"
            homepage "https://github.com/jackin-project/jackin"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/jackin-project/jackin/releases/download/jackin-dev-v${VERSION}/jackin-dev-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_MACOS_SHA256}"
              end
              on_intel do
                url "https://github.com/jackin-project/jackin/releases/download/jackin-dev-v${VERSION}/jackin-dev-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_MACOS_SHA256}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/jackin-project/jackin/releases/download/jackin-dev-v${VERSION}/jackin-dev-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${ARM64_LINUX_SHA256}"
              end
              on_intel do
                url "https://github.com/jackin-project/jackin/releases/download/jackin-dev-v${VERSION}/jackin-dev-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${X86_LINUX_SHA256}"
              end
            end

            def install
              bin.install "jackin-dev"
            end

            test do
              system "#{bin}/jackin-dev", "--help"
            end
          end
          EOF

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/jackin-dev.rb
          if git diff --cached --quiet --exit-code; then
            echo "jackin-dev formula already up to date for ${VERSION}"
            exit 0
          fi
          branch="jackin-dev/formula-${VERSION}"
          git switch -c "$branch"
          git commit -m "chore: update jackin-dev to ${VERSION}"
          git push -u origin "$branch"
          pr_url=$(gh pr create \
            --repo jackin-project/homebrew-tap \
            --title "chore: update jackin-dev to ${VERSION}" \
            --body "Automated formula update for jackin-dev ${VERSION}. Release: https://github.com/jackin-project/jackin/releases/tag/jackin-dev-v${VERSION}" \
            --base main \
            --head "$branch")
          echo "Opened PR: $pr_url"
          gh pr merge "$pr_url" --squash --delete-branch
