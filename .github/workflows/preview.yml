name: Publish Homebrew Preview

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebrew-tap-publish
  cancel-in-progress: true

jobs:
  source-changed:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_repository.full_name == github.repository &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Resolve source SHA
        id: source
        env:
          # Pre-resolve into env vars so the inline shell never sees a
          # template substitution — keeps the script style identical to
          # the rest of this workflow's run blocks.
          DISPATCH_SHA: ${{ github.sha }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "sha=${DISPATCH_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${WORKFLOW_RUN_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.source.outputs.sha }}
          fetch-depth: 0

      - name: Classify changed paths
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sha="$SOURCE_SHA"

          # Diff base is the previously-published preview SHA, read from the
          # leading "# source-sha: <40-hex>" comment in the live formula.
          # A multi-commit push can land a source change in an earlier commit
          # and a docs-only final commit; classifying against the prior
          # published SHA (not sha^1) catches those cases correctly.
          old_sha=""
          formula_err=""
          if formula_body=$(curl -fsSL --max-time 30 "https://raw.githubusercontent.com/jackin-project/homebrew-tap/main/Formula/jackin-preview.rb" 2>&1); then
            # Strict 40-hex-char regex: a captive-portal HTML response
            # returning HTTP 200 will not match, so the downstream
            # "old_sha empty" branch handles that as "no prior preview".
            old_sha=$(printf '%s\n' "$formula_body" | sed -n 's|^[[:space:]]*# source-sha: \([0-9a-f]\{40\}\)$|\1|p' | head -1)
          else
            formula_err="$formula_body"
            echo "::warning::failed to fetch homebrew-tap formula: ${formula_err}; falling open"
          fi

          # Fall open to source=true when curl failed, when there is no
          # prior published SHA, when the head SHA is already published,
          # or when the prior SHA is not reachable in the current
          # checkout. The publish job's `git diff --cached --quiet`
          # guard catches a no-op formula rewrite, so a spurious "true"
          # at most costs a wasted run — never a silently-missed source
          # change.
          if [ -n "$formula_err" ] || [ -z "$old_sha" ] || [ "$old_sha" = "$sha" ] \
             || ! git rev-parse --verify "${old_sha}^{commit}" >/dev/null 2>&1; then
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Capture the diff via command substitution wrapped in `if !`,
          # which suppresses `set -e` propagation so we can branch on
          # the exit code explicitly. stderr is captured to a separate
          # variable so a benign git warning cannot contaminate the file
          # list the case statement scans.
          diff_err=""
          if ! { diff_files=$(git diff --name-only "${old_sha}...${sha}" 2>/tmp/diff.err); }; then
            diff_err=$(cat /tmp/diff.err)
            echo "::warning::diff failed for ${old_sha}...${sha}: ${diff_err}; falling open"
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          source=false
          while IFS= read -r path; do
            # Skip the trailing-newline empty iteration.
            [ -z "$path" ] && continue
            # Path globs are intentionally a subset of ci.yml's `rust:`
            # filter: tests/** and .github/workflows/ci.yml change the
            # Rust build but don't change the binary that ships in the
            # Homebrew tarball, so they don't need a preview republish.
            # The shared paths (Cargo.*, rust-toolchain.toml, build.rs,
            # src/, docker/runtime/) MUST drift together with ci.yml
            # — when adding a new build input there, add it here too.
            case "$path" in
              .github/workflows/preview.yml|Cargo.toml|Cargo.lock|rust-toolchain.toml|build.rs|src/**|docker/runtime/**)
                source=true
                ;;
            esac
          done <<< "$diff_files"

          echo "source=$source" >> "$GITHUB_OUTPUT"

  build-preview:
    needs: source-changed
    if: needs.source-changed.outputs.source == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    strategy:
      matrix:
        include:
          # macOS targets cross-compiled from Linux via cargo-zigbuild +
          # real macOS SDK. Zig respects SDKROOT for framework lookups;
          # SDK sourced from joseluisq/macosx-sdks, cached between runs.
          - target: aarch64-apple-darwin
            zigbuild_target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
            zigbuild_target: x86_64-apple-darwin
          # Linux targets: glibc 2.17 minimum for broad host compatibility.
          - target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.17
          - target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.17
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.source-changed.outputs.sha }}
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}
          cache-key: preview-${{ matrix.target }}
          rustflags: ""
      - name: Install Zig and cargo-zigbuild
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "zig cargo:cargo-zigbuild"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - name: Cache macOS SDK
        if: contains(matrix.target, 'apple')
        id: sdk-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/macos-sdk
          key: macos-sdk-26.1
      - name: Download macOS SDK
        if: contains(matrix.target, 'apple') && steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/macos-sdk
          curl -fsSL "https://github.com/joseluisq/macosx-sdks/releases/download/26.1/MacOSX26.1.sdk.tar.xz" \
            | tar -xJ -C /tmp/macos-sdk
      - name: Set macOS SDKROOT
        if: contains(matrix.target, 'apple')
        run: |
          echo "SDKROOT=/tmp/macos-sdk/MacOSX26.1.sdk" >> "$GITHUB_ENV"
          # Pin deployment target so the binary runs on macOS 12+ even
          # though we build with the latest SDK.
          echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> "$GITHUB_ENV"
      - name: Build
        env:
          ZIGBUILD_TARGET: ${{ matrix.zigbuild_target }}
        run: cargo zigbuild --release --locked --target "$ZIGBUILD_TARGET"
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          archive="jackin-preview-${TARGET}.tar.gz"
          tar -czf "$archive" \
            -C "target/${TARGET}/release" \
            jackin jackin-role
          sha256sum "$archive" | awk '{print $1}' > "$archive.sha256"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jackin-preview-${{ matrix.target }}
          path: |
            jackin-preview-${{ matrix.target }}.tar.gz
            jackin-preview-${{ matrix.target }}.tar.gz.sha256

  publish-preview:
    needs: [source-changed, build-preview]
    if: needs.source-changed.outputs.source == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.source-changed.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify source SHA is on main
        if: github.event_name == 'workflow_run'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FULL_SHA: ${{ needs.source-changed.outputs.sha }}
        run: |
          # Use GitHub's compare API instead of mutating the local checkout.
          # A prior run published preview.1 for f6327ae because the runner
          # behaved like it only had a one-commit checkout even with
          # fetch-depth: 0, so local git ancestry checks were no longer
          # reliable enough for preview versioning.
          compare_status=$(
            curl -fsSL \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/compare/${FULL_SHA}...main" |
              jq -er '.status'
          )

          case "$compare_status" in
            identical|ahead) ;;
            *)
              echo "::error::source SHA ${FULL_SHA} is not on main (compare status: ${compare_status})"
              exit 1
              ;;
          esac

      - name: Compute preview metadata
        id: meta
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FULL_SHA: ${{ needs.source-changed.outputs.sha }}
        run: |
          base_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          base_version=${base_version%-dev}
          short_sha=$(printf '%s' "$FULL_SHA" | cut -c1-7)
          # Derive the preview counter from GitHub's server-side commit history
          # instead of `git rev-list --count HEAD` so the version stays
          # monotonic even if the runner checkout is unexpectedly shallow.
          graphql_query='query($owner: String!, $name: String!, $oid: GitObjectID!) { repository(owner: $owner, name: $name) { object(oid: $oid) { ... on Commit { history(first: 1) { totalCount } } } } }'
          commit_count=$(
            jq -cn \
              --arg query "$graphql_query" \
              --arg owner "$GITHUB_REPOSITORY_OWNER" \
              --arg name "${GITHUB_REPOSITORY#*/}" \
              --arg oid "$FULL_SHA" \
              '{query: $query, variables: {owner: $owner, name: $name, oid: $oid}}' |
              curl -fsSL \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Content-Type: application/json" \
                --data @- \
                https://api.github.com/graphql |
              jq -er '.data.repository.object.history.totalCount'
          )
          {
            echo "full_sha=$FULL_SHA"
            echo "short_sha=$short_sha"
            echo "version=${base_version}-preview.${commit_count}+${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish preview GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA: ${{ needs.source-changed.outputs.sha }}
        run: |
          # Delete existing preview release and its tag so the new release
          # can claim the `preview` tag at the current SHA.
          gh release delete preview --yes --cleanup-tag 2>/dev/null || true
          gh release create preview \
            --prerelease \
            --target "$SHA" \
            --title "Preview ${VERSION}" \
            --notes "Preview build from [${SHA:0:7}](https://github.com/${GITHUB_REPOSITORY}/commit/${SHA})." \
            artifacts/jackin-preview-*.tar.gz \
            artifacts/jackin-preview-*.tar.gz.sha256

      - name: Read platform SHA256s
        id: shas
        run: |
          echo "arm64_macos=$(cat artifacts/jackin-preview-aarch64-apple-darwin.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "x86_macos=$(cat artifacts/jackin-preview-x86_64-apple-darwin.tar.gz.sha256)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: jackin-project/homebrew-tap
          ref: main
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Verify preview alias
        run: |
          test -L homebrew-tap/Aliases/jackin@preview
          test "$(readlink homebrew-tap/Aliases/jackin@preview)" = "../Formula/jackin-preview.rb"

      - name: Extract previous preview SHA
        id: prev
        run: |
          old_sha=$(
            sed -n 's|^[[:space:]]*# source-sha: \([0-9a-f]\{40\}\)$|\1|p' \
              homebrew-tap/Formula/jackin-preview.rb | head -1
          )
          echo "old_sha=${old_sha}" >> "$GITHUB_OUTPUT"

      - name: Rewrite preview formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          FULL_SHA: ${{ steps.meta.outputs.full_sha }}
          ARM64_SHA256: ${{ steps.shas.outputs.arm64_macos }}
          X86_SHA256: ${{ steps.shas.outputs.x86_macos }}
        run: |
          cat > homebrew-tap/Formula/jackin-preview.rb <<EOF
          # source-sha: ${FULL_SHA}
          class JackinPreview < Formula
            desc "CLI for orchestrating autonomous AI coding agents in isolated sandboxed environments — reproducible, scoped, and fully under your control"
            homepage "https://github.com/jackin-project/jackin"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/jackin-project/jackin/releases/download/preview/jackin-preview-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA256}"
              end
              on_intel do
                url "https://github.com/jackin-project/jackin/releases/download/preview/jackin-preview-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_SHA256}"
              end
            end

            conflicts_with "jackin-project/tap/jackin", because: "preview and stable install the same binary"

            def install
              bin.install "jackin"
              bin.install "jackin-role"
            end

            test do
              system "#{bin}/jackin", "--version"
            end
          end
          EOF

      - name: Build PR body
        id: pr_body
        env:
          OLD_SHA: ${{ steps.prev.outputs.old_sha }}
          NEW_SHA: ${{ steps.meta.outputs.full_sha }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          body_file="${RUNNER_TEMP}/pr-body.md"
          {
            printf 'Automated preview formula update for **jackin@preview %s**.\n\n' "$VERSION"
            printf -- '- Source: [`%s`](https://github.com/jackin-project/jackin/commit/%s)\n' \
              "${NEW_SHA:0:7}" "$NEW_SHA"
            if [ -n "$OLD_SHA" ] && [ "$OLD_SHA" != "$NEW_SHA" ]; then
              printf -- '- Previous: [`%s`](https://github.com/jackin-project/jackin/commit/%s)\n' \
                "${OLD_SHA:0:7}" "$OLD_SHA"
              printf -- '- [Full diff](https://github.com/jackin-project/jackin/compare/%s...%s)\n' \
                "$OLD_SHA" "$NEW_SHA"
            fi
            printf -- '- [CHANGELOG](https://github.com/jackin-project/jackin/blob/%s/CHANGELOG.md)\n\n' "$NEW_SHA"
            printf '## Commits\n\n'
            if [ -n "$OLD_SHA" ] \
               && git -C "${GITHUB_WORKSPACE}" rev-parse --verify --quiet "${OLD_SHA}^{commit}" >/dev/null; then
              git -C "${GITHUB_WORKSPACE}" log --pretty=format:'- %s (%h)' "${OLD_SHA}..${NEW_SHA}"
              printf '\n'
            else
              printf '_No prior preview SHA found; commit range unavailable._\n'
            fi
            printf '\n## Unreleased changelog\n\n'
            awk '
              /^## \[Unreleased\]/ {flag=1; next}
              /^## / {flag=0}
              flag {print}
            ' "${GITHUB_WORKSPACE}/CHANGELOG.md" | awk 'NF{found=1} {print} END{ if(!found) print "_(empty)_" }'
          } > "$body_file"
          echo "body_file=$body_file" >> "$GITHUB_OUTPUT"

      - name: Open and merge PR for tap update
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
          PR_BODY_FILE: ${{ steps.pr_body.outputs.body_file }}
        run: |
          git add Formula/jackin-preview.rb
          if git diff --cached --quiet --exit-code; then
            echo "Preview formula already up to date"
            exit 0
          fi
          branch="preview/formula-${SHORT_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git commit -m "jackin@preview ${VERSION}"
          git push -u origin "$branch"
          pr_url=$(gh pr create \
            --title "jackin@preview ${VERSION}" \
            --body-file "$PR_BODY_FILE" \
            --base main \
            --head "$branch")
          echo "Opened PR: $pr_url"
          gh pr merge "$pr_url" --squash --delete-branch
