name: Publish Homebrew Preview

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      lanes:
        description: "Which runner(s) to run on. Default github; use both for parity runs."
        type: choice
        options: [github, velnor, both]
        default: github

permissions:
  actions: read
  contents: read

concurrency:
  # Branch dispatches are build-only and must not contend with the main publish.
  group: homebrew-preview-${{ github.ref == 'refs/heads/main' && 'publish' || github.ref }}
  cancel-in-progress: true

jobs:
  source-changed:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      source: ${{ steps.filter.outputs.source }}
      sha: ${{ steps.source.outputs.sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      version: ${{ steps.meta.outputs.version }}
      toolchain_key: ${{ steps.toolchain.outputs.key }}
      xtask_contract: ${{ steps.toolchain.outputs.xtask_contract }}
      jackin_archive_contract: ${{ steps.toolchain.outputs.jackin_archive_contract }}
      capsule_archive_contract: ${{ steps.toolchain.outputs.capsule_archive_contract }}
    steps:
      - name: Resolve source SHA
        id: source
        env:
          # Pre-resolve into env vars so the inline shell never sees a
          # template substitution — keeps the script style identical to
          # the rest of this workflow's run blocks.
          DISPATCH_SHA: ${{ github.sha }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          case "$EVENT_NAME" in
            workflow_dispatch)
              echo "sha=${DISPATCH_SHA}" >> "$GITHUB_OUTPUT"
              ;;
            workflow_run)
              echo "sha=${WORKFLOW_SHA}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported event: ${EVENT_NAME}"
              exit 1
              ;;
          esac

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.source.outputs.sha }}
          fetch-depth: 0

      - name: Resolve Rust toolchain cache key
        id: toolchain
        env:
          CACHE_KEY: ${{ hashFiles('rust-toolchain.toml') }}
          XTASK_CONTRACT: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml', '.cargo/**', 'crates/*/Cargo.toml', 'crates/jackin-xtask/src/**', 'crates/jackin-process/src/**') }}
          JACKIN_ARCHIVE_CONTRACT: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml', 'mise.toml', 'mise.lock', '.cargo/**', 'crates/jackin/Cargo.toml', 'crates/jackin-brand/Cargo.toml', 'crates/jackin-build-meta/Cargo.toml', 'crates/jackin-config/Cargo.toml', 'crates/jackin-console/Cargo.toml', 'crates/jackin-core/Cargo.toml', 'crates/jackin-diagnostics/Cargo.toml', 'crates/jackin-docker/Cargo.toml', 'crates/jackin-env/Cargo.toml', 'crates/jackin-host/Cargo.toml', 'crates/jackin-image/Cargo.toml', 'crates/jackin-instance/Cargo.toml', 'crates/jackin-isolation/Cargo.toml', 'crates/jackin-launch/Cargo.toml', 'crates/jackin-manifest/Cargo.toml', 'crates/jackin-oppicker/Cargo.toml', 'crates/jackin-process/Cargo.toml', 'crates/jackin-protocol/Cargo.toml', 'crates/jackin-runtime/Cargo.toml', 'crates/jackin-test-support/Cargo.toml', 'crates/jackin-tui/Cargo.toml', 'crates/jackin-usage/Cargo.toml', 'crates/jackin/src/**', 'crates/jackin-brand/src/**', 'crates/jackin-build-meta/src/**', 'crates/jackin-config/src/**', 'crates/jackin-console/src/**', 'crates/jackin-core/src/**', 'crates/jackin-diagnostics/src/**', 'crates/jackin-docker/src/**', 'crates/jackin-env/src/**', 'crates/jackin-host/src/**', 'crates/jackin-image/src/**', 'crates/jackin-instance/src/**', 'crates/jackin-isolation/src/**', 'crates/jackin-launch/src/**', 'crates/jackin-manifest/src/**', 'crates/jackin-oppicker/src/**', 'crates/jackin-process/src/**', 'crates/jackin-protocol/src/**', 'crates/jackin-runtime/src/**', 'crates/jackin-test-support/src/**', 'crates/jackin-tui/src/**', 'crates/jackin-usage/src/**', 'crates/jackin-xtask/src/release_archive.rs', 'crates/jackin-xtask/src/cmd.rs') }}
          CAPSULE_ARCHIVE_CONTRACT: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml', 'mise.toml', 'mise.lock', '.cargo/**', 'crates/jackin-agent-status/Cargo.toml', 'crates/jackin-agent-status/src/**', 'crates/jackin-brand/Cargo.toml', 'crates/jackin-brand/src/**', 'crates/jackin-build-meta/Cargo.toml', 'crates/jackin-build-meta/src/**', 'crates/jackin-capsule/Cargo.toml', 'crates/jackin-capsule/src/**', 'crates/jackin-core/Cargo.toml', 'crates/jackin-core/src/**', 'crates/jackin-diagnostics/Cargo.toml', 'crates/jackin-diagnostics/src/**', 'crates/jackin-process/Cargo.toml', 'crates/jackin-process/src/**', 'crates/jackin-protocol/Cargo.toml', 'crates/jackin-protocol/src/**', 'crates/jackin-term/Cargo.toml', 'crates/jackin-term/src/**', 'crates/jackin-tui/Cargo.toml', 'crates/jackin-tui/src/**', 'crates/jackin-usage/Cargo.toml', 'crates/jackin-usage/src/**', 'crates/jackin-xtask/src/release_archive.rs', 'crates/jackin-xtask/src/cmd.rs') }}
        run: |
          {
            echo "key=$CACHE_KEY"
            echo "xtask_contract=$XTASK_CONTRACT"
            echo "jackin_archive_contract=$JACKIN_ARCHIVE_CONTRACT"
            echo "capsule_archive_contract=$CAPSULE_ARCHIVE_CONTRACT"
          } >> "$GITHUB_OUTPUT"

      - name: Classify changed paths
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sha="$SOURCE_SHA"

          # Diff base is the previously-published preview SHA, read from the
          # leading "# source-sha: <40-hex>" comment in the live formula.
          # A multi-commit push can land a source change in an earlier commit
          # and a docs-only final commit; classifying against the prior
          # published SHA (not sha^1) catches those cases correctly.
          old_sha=""
          formula_err=""
          if formula_body=$(curl -fsSL --max-time 30 "https://raw.githubusercontent.com/jackin-project/homebrew-tap/main/Formula/jackin-preview.rb" 2>&1); then
            # Strict 40-hex-char regex: a captive-portal HTML response
            # returning HTTP 200 will not match, so the downstream
            # "old_sha empty" branch handles that as "no prior preview".
            old_sha=$(printf '%s\n' "$formula_body" | sed -n 's|^[[:space:]]*# source-sha: \([0-9a-f]\{40\}\)$|\1|p' | head -1)
          else
            formula_err="$formula_body"
            echo "::warning::failed to fetch homebrew-tap formula: ${formula_err}; falling open"
          fi

          # An input-identical source is already represented by the live
          # release and formula, so do not rebuild its six signed archives.
          if [ -n "$old_sha" ] && [ "$old_sha" = "$sha" ]; then
            echo "source=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fall open to source=true when curl failed, when there is no
          # prior published SHA, or when the prior SHA is not reachable in
          # the current checkout. The publish job's `git diff --cached --quiet`
          # guard catches a no-op formula rewrite, so a spurious "true"
          # at most costs a wasted run — never a silently-missed source
          # change.
          if [ -n "$formula_err" ] || [ -z "$old_sha" ] \
             || ! git rev-parse --verify "${old_sha}^{commit}" >/dev/null 2>&1; then
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Capture the diff via command substitution wrapped in `if !`,
          # which suppresses `set -e` propagation so we can branch on
          # the exit code explicitly. stderr is captured to a separate
          # variable so a benign git warning cannot contaminate the file
          # list the case statement scans.
          diff_err=""
          if ! { diff_files=$(git diff --name-only "${old_sha}...${sha}" 2>/tmp/diff.err); }; then
            diff_err=$(cat /tmp/diff.err)
            echo "::warning::diff failed for ${old_sha}...${sha}: ${diff_err}; falling open"
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          extract_release_mise() {
            awk '
              function keep(name) {
                return name == "zig" ||
                  name == "cosign" ||
                  name == "syft" ||
                  name == "cargo-zigbuild" ||
                  name == "sccache"
              }
              /^\[tools\]$/ { section = "tools"; next }
              /^\[tool_alias\]$/ { section = "tool_alias"; next }
              /^\[tools\./ {
                section = $0
                sub(/^\[tools\./, "", section)
                sub(/\]$/, "", section)
                next
              }
              /^\[/ { section = ""; next }
              /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
              {
                key = $1
                sub(/[[:space:]]*=.*/, "", key)
                gsub(/"/, "", key)
                if (section == "tools" && keep(key)) print section "." key "=" $0
                else if (section == "tool_alias" && keep(key)) print section "." key "=" $0
                else if (keep(section)) print "tools." section "." $0
              }
            ' "$1"
          }

          source=false
          while IFS= read -r path; do
            # Skip the trailing-newline empty iteration.
            [ -z "$path" ] && continue
            # Path globs are intentionally a subset of ci.yml's `rust:`
            # filter: tests/** and .github/workflows/ci.yml change the
            # Rust build but don't change the binary that ships in the
            # Homebrew tarball, so they don't need a preview republish.
            # The shared paths (Cargo.*, rust-toolchain.toml, build.rs,
            # src/, docker/runtime/) MUST drift together with ci.yml
            # — when adding a new build input there, add it here too.
            case "$path" in
              .github/workflows/preview.yml|Cargo.toml|Cargo.lock|rust-toolchain.toml|build.rs|src/**|docker/runtime/**|crates/**)
                source=true
                ;;
              mise.toml)
                if ! git cat-file -e "${old_sha}:mise.toml" 2>/dev/null; then
                  source=true
                  continue
                fi

                git show "${old_sha}:mise.toml" > "$RUNNER_TEMP/mise-preview-base.toml"
                extract_release_mise "$RUNNER_TEMP/mise-preview-base.toml" > "$RUNNER_TEMP/mise-preview-base-release.txt"
                extract_release_mise mise.toml > "$RUNNER_TEMP/mise-preview-head-release.txt"

                if ! cmp -s "$RUNNER_TEMP/mise-preview-base-release.txt" "$RUNNER_TEMP/mise-preview-head-release.txt"; then
                  source=true
                fi
                ;;
            esac
          done <<< "$diff_files"

          echo "source=$source" >> "$GITHUB_OUTPUT"

      - name: Compute preview metadata
        id: meta
        if: steps.filter.outputs.source == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FULL_SHA: ${{ steps.source.outputs.sha }}
        run: |
          base_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          base_version=${base_version%-dev}
          short_sha=$(printf '%s' "$FULL_SHA" | cut -c1-7)
          # Derive the preview counter from GitHub's server-side commit history
          # instead of `git rev-list --count HEAD` so the version stays
          # monotonic even if the runner checkout is unexpectedly shallow.
          # shellcheck disable=SC2016
          graphql_query='query($owner: String!, $name: String!, $oid: GitObjectID!) { repository(owner: $owner, name: $name) { object(oid: $oid) { ... on Commit { history(first: 1) { totalCount } } } } }'
          commit_count=$(
            jq -cn \
              --arg query "$graphql_query" \
              --arg owner "$GITHUB_REPOSITORY_OWNER" \
              --arg name "${GITHUB_REPOSITORY#*/}" \
              --arg oid "$FULL_SHA" \
              '{query: $query, variables: {owner: $owner, name: $name, oid: $oid}}' |
              curl -fsSL \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Content-Type: application/json" \
                --data @- \
                https://api.github.com/graphql |
              jq -er '.data.repository.object.history.totalCount'
          )
          {
            echo "full_sha=$FULL_SHA"
            echo "short_sha=$short_sha"
            echo "version=${base_version}-preview.${commit_count}+${short_sha}"
          } >> "$GITHUB_OUTPUT"

  build-preview:
    name: build preview jackin (${{ matrix.config.lane }})
    needs: [source-changed]
    if: needs.source-changed.outputs.source == 'true'
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    concurrency:
      group: preview-jackin-${{ needs.source-changed.outputs.jackin_archive_contract }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
      MISE_DATA_DIR: ${{ matrix.config.mise_data_dir }}
      RUSTUP_HOME: ${{ github.workspace }}/.ci-rustup
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        config: ${{ fromJSON((github.event_name != 'workflow_dispatch' || inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"\"ubuntu-24.04\"","mise_data_dir":"/home/runner/.local/share/mise"}]' || inputs.lanes == 'velnor' && '[{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","mise_data_dir":"/opt/mise"}]' || '[{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","mise_data_dir":"/opt/mise"},{"lane":"GitHub","runner":"\"ubuntu-24.04\"","mise_data_dir":"/home/runner/.local/share/mise"}]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.source-changed.outputs.sha }}
      - name: Restore input-identical jackin archive set
        id: archive-result
        uses: ./.github/actions/restore-package-result
        with:
          workflow: preview.yml
          branch: ${{ github.ref_name }}
          primary-name: preview-GitHub-jackin-${{ needs.source-changed.outputs.jackin_archive_contract }}
          alternate-name: preview-Velnor-jackin-${{ needs.source-changed.outputs.jackin_archive_contract }}
          current-name-regexp: ^preview-(GitHub|Velnor)-jackin-${{ needs.source-changed.outputs.jackin_archive_contract }}$
      - uses: ./.github/actions/download-ci-xtask
        if: steps.archive-result.outputs.found != 'true'
        with:
          token: ${{ github.token }}
          lane: ${{ matrix.config.lane }}
          xtask-contract: ${{ needs.source-changed.outputs.xtask_contract }}
          include-tools: "false"
      - name: Cache Rust toolchain
        if: steps.archive-result.outputs.found != 'true'
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ env.RUSTUP_HOME }}/toolchains
            ${{ env.RUSTUP_HOME }}/update-hashes
          key: rustup-v2-${{ runner.os }}-${{ runner.arch }}-${{ needs.source-changed.outputs.toolchain_key }}
          restore-keys: |
            rustup-v2-${{ runner.os }}-${{ runner.arch }}-
      - name: Use the prepared current Rust toolchain
        if: steps.archive-result.outputs.found != 'true'
        run: >-
          "$CI_XTASK" ci-toolchain prepare
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        if: steps.archive-result.outputs.found != 'true'
        env:
          # sccache install: blank wrapper in case binstall source-falls-back
          # to cargo, which would probe rustc through a missing sccache.
          RUSTC_WRAPPER: ""
        with:
          version: "2026.7.7"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.event_name == 'workflow_run' || github.ref == 'refs/heads/main' }}
          install_args: "cargo-binstall zig cargo:cargo-zigbuild cosign syft cargo:sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        if: steps.archive-result.outputs.found != 'true'
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.archive-result.outputs.found != 'true'
        with:
          shared-key: release-archive-jackin-workspace-v3
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
          save-if: ${{ github.event_name == 'workflow_run' || github.ref == 'refs/heads/main' }}
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback.
          # Only main saves, preserving limited cache quota for reusable entries.
      - name: Cache macOS SDK
        if: steps.archive-result.outputs.found != 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/macos-sdk
          key: macos-sdk-26.1
      - name: Build complete signed jackin archive set
        if: steps.archive-result.outputs.found != 'true'
        env:
          VERSION: ${{ needs.source-changed.outputs.version }}
        run: >-
          "$CI_XTASK" release-archives
          --package jackin
          --version "$VERSION"
          --sccache-stats sccache-stats.txt
      - name: Attest complete jackin archive set
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.tar.gz
      - name: Upload complete jackin archive set
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preview-${{ matrix.config.lane }}-jackin-${{ needs.source-changed.outputs.jackin_archive_contract }}
          path: dist/*.tar.gz*
      - name: Upload jackin cargo timings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-timings-preview-jackin-${{ matrix.config.lane }}
          path: dist/cargo-timings/*.html
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload jackin sccache stats
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sccache-stats-preview-jackin-${{ matrix.config.lane }}
          path: sccache-stats.txt
          if-no-files-found: ignore
          retention-days: 7

  build-jackin-capsule:
    name: build preview capsule (${{ matrix.config.lane }})
    needs: [source-changed]
    if: needs.source-changed.outputs.source == 'true'
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    concurrency:
      group: preview-capsule-${{ needs.source-changed.outputs.capsule_archive_contract }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
      MISE_DATA_DIR: ${{ matrix.config.mise_data_dir }}
      RUSTUP_HOME: ${{ github.workspace }}/.ci-rustup
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        config: ${{ fromJSON((github.event_name != 'workflow_dispatch' || inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"\"ubuntu-24.04\"","mise_data_dir":"/home/runner/.local/share/mise"}]' || inputs.lanes == 'velnor' && '[{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","mise_data_dir":"/opt/mise"}]' || '[{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","mise_data_dir":"/opt/mise"},{"lane":"GitHub","runner":"\"ubuntu-24.04\"","mise_data_dir":"/home/runner/.local/share/mise"}]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.source-changed.outputs.sha }}
      - name: Restore input-identical capsule archive set
        id: archive-result
        uses: ./.github/actions/restore-package-result
        with:
          workflow: preview.yml
          branch: ${{ github.ref_name }}
          primary-name: preview-GitHub-jackin-capsule-${{ needs.source-changed.outputs.capsule_archive_contract }}
          alternate-name: preview-Velnor-jackin-capsule-${{ needs.source-changed.outputs.capsule_archive_contract }}
          current-name-regexp: ^preview-(GitHub|Velnor)-jackin-capsule-${{ needs.source-changed.outputs.capsule_archive_contract }}$
      - uses: ./.github/actions/download-ci-xtask
        if: steps.archive-result.outputs.found != 'true'
        with:
          token: ${{ github.token }}
          lane: ${{ matrix.config.lane }}
          xtask-contract: ${{ needs.source-changed.outputs.xtask_contract }}
          include-tools: "false"
      - name: Cache Rust toolchain
        if: steps.archive-result.outputs.found != 'true'
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ env.RUSTUP_HOME }}/toolchains
            ${{ env.RUSTUP_HOME }}/update-hashes
          key: rustup-v2-${{ runner.os }}-${{ runner.arch }}-${{ needs.source-changed.outputs.toolchain_key }}
          restore-keys: |
            rustup-v2-${{ runner.os }}-${{ runner.arch }}-
      - name: Use the prepared current Rust toolchain
        if: steps.archive-result.outputs.found != 'true'
        run: >-
          "$CI_XTASK" ci-toolchain prepare
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        if: steps.archive-result.outputs.found != 'true'
        env:
          # sccache install: blank wrapper in case binstall source-falls-back
          # to cargo, which would probe rustc through a missing sccache.
          RUSTC_WRAPPER: ""
        with:
          version: "2026.7.7"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.event_name == 'workflow_run' || github.ref == 'refs/heads/main' }}
          install_args: "cargo-binstall zig cargo:cargo-zigbuild cosign syft cargo:sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        if: steps.archive-result.outputs.found != 'true'
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.archive-result.outputs.found != 'true'
        with:
          shared-key: release-archive-capsule-workspace-v3
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
          save-if: ${{ github.event_name == 'workflow_run' || github.ref == 'refs/heads/main' }}
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback.
          # Only main saves, preserving limited cache quota for reusable entries.
      - name: Build complete signed capsule archive set
        if: steps.archive-result.outputs.found != 'true'
        env:
          VERSION: ${{ needs.source-changed.outputs.version }}
        run: >-
          "$CI_XTASK" release-archives
          --package jackin-capsule
          --version "$VERSION"
          --sccache-stats sccache-stats.txt
      - name: Attest complete capsule archive set
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.tar.gz
      - name: Upload complete capsule archive set
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preview-${{ matrix.config.lane }}-jackin-capsule-${{ needs.source-changed.outputs.capsule_archive_contract }}
          path: dist/*.tar.gz*
      - name: Upload capsule cargo timings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-timings-preview-capsule-${{ matrix.config.lane }}
          path: dist/cargo-timings/*.html
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload capsule sccache stats
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sccache-stats-preview-capsule-${{ matrix.config.lane }}
          path: sccache-stats.txt
          if-no-files-found: ignore
          retention-days: 7

  publish-gate:
    needs: [source-changed, build-preview, build-jackin-capsule]
    if: >-
      (github.event_name == 'workflow_run' || github.ref == 'refs/heads/main') &&
      needs.source-changed.outputs.source == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.lanes != 'velnor')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      ci_ok: ${{ steps.ci.outputs.ok }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Accept successful triggering CI
        id: ci
        env:
          EVENT_NAME: ${{ github.event_name }}
          CI_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          CI_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_SHA: ${{ needs.source-changed.outputs.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$CI_CONCLUSION" != "success" ] || [ "$CI_SHA" != "$SOURCE_SHA" ]; then
            echo "::error::triggering CI does not prove source ${SOURCE_SHA}"
            exit 1
          fi
          echo "ok=true" >> "$GITHUB_OUTPUT"

  publish-preview:
    needs: [source-changed, build-preview, build-jackin-capsule, publish-gate]
    if: >-
      (github.event_name == 'workflow_run' || github.ref == 'refs/heads/main') &&
      needs.source-changed.outputs.source == 'true' &&
      needs.publish-gate.outputs.ci_ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: homebrew-tap-publish
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.source-changed.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: preview-GitHub-*
          merge-multiple: true

      - name: Restore prepared CI xtask
        uses: ./.github/actions/download-ci-xtask
        with:
          token: ${{ github.token }}
          lane: GitHub
          xtask-contract: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml', '.cargo/**', 'crates/*/Cargo.toml', 'crates/jackin-xtask/src/**', 'crates/jackin-process/src/**') }}
          include-tools: "false"

      - name: Verify source SHA is on main
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FULL_SHA: ${{ needs.source-changed.outputs.sha }}
        run: |
          # Use GitHub's compare API instead of mutating the local checkout.
          # A prior run published preview.1 for f6327ae because the runner
          # behaved like it only had a one-commit checkout even with
          # fetch-depth: 0, so local git ancestry checks were no longer
          # reliable enough for preview versioning.
          compare_status=$(
            curl -fsSL \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/compare/${FULL_SHA}...main" |
              jq -er '.status'
          )

          case "$compare_status" in
            identical|ahead) ;;
            *)
              echo "::error::source SHA ${FULL_SHA} is not on main (compare status: ${compare_status})"
              exit 1
              ;;
          esac

      - name: Read platform SHA256s
        id: shas
        run: |
          {
            echo "arm64_macos=$(cat artifacts/jackin-aarch64-apple-darwin.tar.gz.sha256)"
            echo "x86_macos=$(cat artifacts/jackin-x86_64-apple-darwin.tar.gz.sha256)"
            echo "arm64_linux=$(cat artifacts/jackin-aarch64-unknown-linux-gnu.tar.gz.sha256)"
            echo "x86_linux=$(cat artifacts/jackin-x86_64-unknown-linux-gnu.tar.gz.sha256)"
            echo "capsule_arm64_linux=$(cat artifacts/jackin-capsule-aarch64-unknown-linux-gnu.tar.gz.sha256)"
            echo "capsule_x86_linux=$(cat artifacts/jackin-capsule-x86_64-unknown-linux-gnu.tar.gz.sha256)"
          } >> "$GITHUB_OUTPUT"

      - name: Produce and sign capsule manifest
        uses: ./.github/actions/sign-capsule-manifest
        with:
          version: ${{ needs.source-changed.outputs.version }}
          arm64-sha: ${{ steps.shas.outputs.capsule_arm64_linux }}
          x86-sha: ${{ steps.shas.outputs.capsule_x86_linux }}
          github-token: ${{ github.token }}

      - name: Publish preview GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.source-changed.outputs.version }}
          SHA: ${{ needs.source-changed.outputs.sha }}
        run: >-
          "$CI_XTASK" github publish-preview
          --repository "$GITHUB_REPOSITORY"
          --version "$VERSION"
          --sha "$SHA"
          --assets artifacts

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: jackin-project/homebrew-tap
          ref: main
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Verify preview alias
        run: |
          test -L homebrew-tap/Aliases/jackin@preview
          test "$(readlink homebrew-tap/Aliases/jackin@preview)" = "../Formula/jackin-preview.rb"

      - name: Extract previous preview SHA
        id: prev
        run: |
          old_sha=$(
            sed -n 's|^[[:space:]]*# source-sha: \([0-9a-f]\{40\}\)$|\1|p' \
              homebrew-tap/Formula/jackin-preview.rb | head -1
          )
          echo "old_sha=${old_sha}" >> "$GITHUB_OUTPUT"

      - name: Rewrite preview formula
        env:
          VERSION: ${{ needs.source-changed.outputs.version }}
          FULL_SHA: ${{ needs.source-changed.outputs.sha }}
          ARM64_SHA256: ${{ steps.shas.outputs.arm64_macos }}
          X86_SHA256: ${{ steps.shas.outputs.x86_macos }}
          LINUX_ARM64_SHA256: ${{ steps.shas.outputs.arm64_linux }}
          LINUX_X86_SHA256: ${{ steps.shas.outputs.x86_linux }}
          CAPSULE_ARM64_SHA256: ${{ steps.shas.outputs.capsule_arm64_linux }}
          CAPSULE_X86_SHA256: ${{ steps.shas.outputs.capsule_x86_linux }}
        run: |
          cat > homebrew-tap/Formula/jackin-preview.rb <<EOF
          # source-sha: ${FULL_SHA}
          class JackinPreview < Formula
            desc "CLI for orchestrating autonomous AI coding agents in isolated sandboxed environments — reproducible, scoped, and fully under your control"
            homepage "https://github.com/jackin-project/jackin"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/jackin-project/jackin/releases/download/preview/jackin-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA256}"
              end
              on_intel do
                url "https://github.com/jackin-project/jackin/releases/download/preview/jackin-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_SHA256}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/jackin-project/jackin/releases/download/preview/jackin-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM64_SHA256}"
              end
              on_intel do
                url "https://github.com/jackin-project/jackin/releases/download/preview/jackin-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X86_SHA256}"
              end
            end

            resource "jackin-capsule-aarch64-unknown-linux-gnu" do
              url "https://github.com/jackin-project/jackin/releases/download/preview/jackin-capsule-aarch64-unknown-linux-gnu.tar.gz"
              sha256 "${CAPSULE_ARM64_SHA256}"
            end

            resource "jackin-capsule-x86_64-unknown-linux-gnu" do
              url "https://github.com/jackin-project/jackin/releases/download/preview/jackin-capsule-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${CAPSULE_X86_SHA256}"
            end

            conflicts_with "jackin-project/tap/jackin", because: "preview and stable install the same binary"

            def install
              bin.install "jackin"
              bin.install "jackin-role"

              capsule_target = Hardware::CPU.arm? ? "aarch64-unknown-linux-gnu" : "x86_64-unknown-linux-gnu"
              capsule_arch = Hardware::CPU.arm? ? "arm64" : "amd64"
              resource("jackin-capsule-#{capsule_target}").stage do
                capsule_dir = libexec/"jackin-capsule/linux-#{capsule_arch}"
                capsule_dir.install "jackin-capsule"
                chmod 0755, capsule_dir/"jackin-capsule"
              end
            end

            test do
              system "#{bin}/jackin", "--version"
            end
          end
          EOF

      - name: Verify preview formula downloads
        run: |
          set -euo pipefail
          while IFS= read -r url; do
            echo "Verifying $url"
            curl -fsIL --retry 3 --retry-all-errors --max-time 30 "$url" >/dev/null
          done < <(
            sed -n 's|^[[:space:]]*url "\(https://github.com/jackin-project/jackin/releases/download/preview/[^"]*\)".*$|\1|p' \
              homebrew-tap/Formula/jackin-preview.rb
          )

      - name: Build PR body
        id: pr_body
        env:
          OLD_SHA: ${{ steps.prev.outputs.old_sha }}
          NEW_SHA: ${{ needs.source-changed.outputs.sha }}
          VERSION: ${{ needs.source-changed.outputs.version }}
        run: |
          body_file="${RUNNER_TEMP}/pr-body.md"
          # shellcheck disable=SC2016
          {
            printf 'Automated preview formula update for **jackin@preview %s**.\n\n' "$VERSION"
            printf -- '- Source: [`%s`](https://github.com/jackin-project/jackin/commit/%s)\n' \
              "${NEW_SHA:0:7}" "$NEW_SHA"
            if [ -n "$OLD_SHA" ] && [ "$OLD_SHA" != "$NEW_SHA" ]; then
              printf -- '- Previous: [`%s`](https://github.com/jackin-project/jackin/commit/%s)\n' \
                "${OLD_SHA:0:7}" "$OLD_SHA"
              printf -- '- [Full diff](https://github.com/jackin-project/jackin/compare/%s...%s)\n' \
                "$OLD_SHA" "$NEW_SHA"
            fi
            printf -- '- [CHANGELOG](https://github.com/jackin-project/jackin/blob/%s/CHANGELOG.md)\n\n' "$NEW_SHA"
            printf '## Commits\n\n'
            if [ -n "$OLD_SHA" ] \
               && git -C "${GITHUB_WORKSPACE}" rev-parse --verify --quiet "${OLD_SHA}^{commit}" >/dev/null; then
              git -C "${GITHUB_WORKSPACE}" log --pretty=format:'- %s (%h)' "${OLD_SHA}..${NEW_SHA}"
              printf '\n'
            else
              printf '_No prior preview SHA found; commit range unavailable._\n'
            fi
            printf '\n## Unreleased changelog\n\n'
            awk '
              /^## \[Unreleased\]/ {flag=1; next}
              /^## / {flag=0}
              flag {print}
            ' "${GITHUB_WORKSPACE}/CHANGELOG.md" | awk 'NF{found=1} {print} END{ if(!found) print "_(empty)_" }'
          } > "$body_file"
          echo "body_file=$body_file" >> "$GITHUB_OUTPUT"

      - name: Open and merge PR for tap update
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.source-changed.outputs.version }}
          SHORT_SHA: ${{ needs.source-changed.outputs.short_sha }}
          PR_BODY_FILE: ${{ steps.pr_body.outputs.body_file }}
        run: |
          git add Formula/jackin-preview.rb
          if git diff --cached --quiet --exit-code; then
            echo "Preview formula already up to date"
            exit 0
          fi
          branch="preview/formula-${SHORT_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git commit -m "jackin@preview ${VERSION}"
          git push -u origin "$branch"
          pr_url=$(gh pr create \
            --title "jackin@preview ${VERSION}" \
            --body-file "$PR_BODY_FILE" \
            --base main \
            --head "$branch")
          echo "Opened PR: $pr_url"
          gh pr merge "$pr_url" --squash --delete-branch
