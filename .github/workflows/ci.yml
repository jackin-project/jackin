# NOTE: `preview.yml` triggers on `workflow_run.workflows: ["CI"]`,
# so the workflow name below is load-bearing. Renaming this file's
# `name:` field silently breaks the Homebrew preview publish chain.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.dispatch.outputs.rust || steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Force rust=true on workflow_dispatch
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: echo "rust=true" >> "$GITHUB_OUTPUT"

      # build.rs supplies compile-time version metadata and
      # docker/runtime/entrypoint.sh is include_str!'d by
      # src/derived_image.rs — both affect the produced binary even
      # though they live outside src/ and tests/.
      - name: Classify changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - '.github/workflows/ci.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'build.rs'
              - 'src/**'
              - 'tests/**'
              - 'docker/runtime/**'

  check:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy, rustfmt
          # `-D warnings` is enforced explicitly on the clippy step
          # below; leaving the action's default RUSTFLAGS would also
          # apply it to `cargo build`/`cargo check`/`cargo nextest run`.
          rustflags: ""
      - uses: taiki-e/install-action@3235f8901fd37ffed0052b276cec25a362fb82e9 # v2.77.7
        with:
          tool: cargo-nextest
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      # Verify the default-features compile path. Clippy above runs with
      # --all-features, so without this step the default build is otherwise
      # untouched in CI. The `e2e` feature is purely additive (empty `e2e
      # = []` plus a single `#![cfg(feature = "e2e")]` test file), so
      # running nextest both with and without it would re-execute every
      # non-feature-gated test for no extra coverage.
      - run: cargo check --all-targets
      - run: cargo nextest run --all-features

  msrv:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    # Verify that the crate still builds on its declared MSRV
    # (`rust-version` in Cargo.toml). This is independent of the toolchain
    # pin in rust-toolchain.toml, which tracks the latest tested stable
    # used for day-to-day builds.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          # Override rust-toolchain.toml: this job exists specifically to
          # verify the floor declared in `Cargo.toml`'s `rust-version`.
          toolchain: "1.94.0"
          cache-key: msrv-1.94.0
          rustflags: ""
      - name: cargo check on MSRV
        run: cargo check --workspace --all-targets --locked
        env:
          RUSTUP_TOOLCHAIN: "1.94.0"

  build-validator:
    needs: [changes, check]
    # Run on push-to-main when Rust inputs change, and on any
    # workflow_dispatch so a maintainer can re-build the validator
    # artifacts on demand without waiting for a Rust-touching push.
    if: >-
      (github.event_name == 'push' &&
       github.ref == 'refs/heads/main' &&
       needs.changes.outputs.rust == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}
          cache-key: validator-${{ matrix.target }}
          rustflags: ""

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build validator
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --bin jackin-validate --target ${{ matrix.target }}
          else
            cargo build --release --locked --bin jackin-validate --target ${{ matrix.target }}
          fi

      - name: Package validator
        run: |
          archive="jackin-validate-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" jackin-validate
          sha256sum "$archive" > "$archive.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jackin-validate-${{ matrix.target }}
          path: |
            jackin-validate-${{ matrix.target }}.tar.gz
            jackin-validate-${{ matrix.target }}.tar.gz.sha256
          retention-days: 7

  # Single stable check name for branch-protection required-status,
  # regardless of which gated jobs skipped under it.
  ci-required:
    if: always()
    needs: [changes, check, msrv, build-validator]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/aggregate-needs
        with:
          needs-json: ${{ toJSON(needs) }}
          workflow-label: CI
