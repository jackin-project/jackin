# NOTE: `preview.yml` triggers on `workflow_run.workflows: ["CI"]`,
# so the workflow name below is load-bearing. Renaming this file's
# `name:` field silently breaks the Homebrew preview publish chain.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.dispatch.outputs.rust || steps.filter.outputs.rust }}
      construct: ${{ steps.dispatch.outputs.construct || steps.filter.outputs.construct }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Force rust=true construct=true on workflow_dispatch
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          echo "rust=true" >> "$GITHUB_OUTPUT"
          echo "construct=true" >> "$GITHUB_OUTPUT"

      # build.rs supplies compile-time version metadata and
      # docker/runtime/entrypoint.sh is include_str!'d by
      # src/derived_image.rs — both affect the produced binary even
      # though they live outside src/ and tests/.
      - name: Classify changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - '.github/workflows/ci.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'build.rs'
              - 'src/**'
              - 'tests/**'
              - 'docker/runtime/**'
            construct:
              - '.github/workflows/construct.yml'
              - 'Justfile'
              - 'docker-bake.hcl'
              - 'docker/construct/**'

  check:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "rust cargo:cargo-nextest"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      # When docker/construct/** changes, the published construct:trixie image
      # on Docker Hub is stale for the lifetime of the PR — it is only
      # republished after merge to main. Build the construct image locally and
      # tag it as projectjackin/construct:trixie so the E2E test uses the
      # updated image rather than pulling the outdated one from the registry.
      - name: Build construct image for E2E
        if: needs.changes.outputs.construct == 'true'
        run: |
          set -a && source docker/construct/versions.env && set +a
          DOCKER_BUILDKIT=1 docker build \
            --build-arg SHELLFIRM_VERSION="$SHELLFIRM_VERSION" \
            --build-arg TIRITH_VERSION="$TIRITH_VERSION" \
            --build-arg MISE_VERSION="$MISE_VERSION" \
            -t projectjackin/construct:trixie \
            docker/construct/
      # Verify the default-features compile path. Clippy above runs with
      # --all-features, so without this step the default build is otherwise
      # untouched in CI. The `e2e` feature is purely additive (empty `e2e
      # = []` plus a single `#![cfg(feature = "e2e")]` test file), so
      # running nextest both with and without it would re-execute every
      # non-feature-gated test for no extra coverage.
      - run: cargo check --all-targets
      - run: cargo nextest run --all-features

  msrv:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    # Verify that the crate still builds on its declared MSRV
    # (`rust-version` in Cargo.toml). This is independent of the toolchain
    # pin in rust-toolchain.toml, which tracks the latest tested stable
    # used for day-to-day builds.
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "version=$(sed -n 's/^rust-version = \"\(.*\)\"/\1/p' Cargo.toml)" >> "$GITHUB_OUTPUT"
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "rust@${{ steps.msrv.outputs.version }}"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-
      - name: cargo check on MSRV
        run: cargo check --workspace --all-targets --locked
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}

  build-validator:
    needs: [changes, check]
    # Run on push-to-main when Rust inputs change, and on any
    # workflow_dispatch so a maintainer can re-build the validator
    # artifacts on demand without waiting for a Rust-touching push.
    if: >-
      (github.event_name == 'push' &&
       github.ref == 'refs/heads/main' &&
       needs.changes.outputs.rust == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            zigbuild: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "${{ matrix.zigbuild && 'rust zig cargo:cargo-zigbuild' || 'rust' }}"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - run: rustup target add ${{ matrix.target }}
      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Build validator
        run: |
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            cargo zigbuild --release --locked --bin jackin-role --target aarch64-unknown-linux-gnu.2.17
          else
            cargo build --release --locked --bin jackin-role --target ${{ matrix.target }}
          fi

      - name: Package validator
        run: |
          archive="jackin-role-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" jackin-role
          sha256sum "$archive" > "$archive.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jackin-role-${{ matrix.target }}
          path: |
            jackin-role-${{ matrix.target }}.tar.gz
            jackin-role-${{ matrix.target }}.tar.gz.sha256
          retention-days: 7

  # Single stable check name for branch-protection required-status,
  # regardless of which gated jobs skipped under it.
  ci-required:
    if: always()
    needs: [changes, check, msrv, build-validator]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/aggregate-needs
        with:
          needs-json: ${{ toJSON(needs) }}
          workflow-label: CI
