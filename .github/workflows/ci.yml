name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@51cd0b8c0499559d9a4d75c0f5c67bec3a894ec8 # v2.75.28
        with:
          tool: cargo-nextest
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo nextest run

  msrv:
    # Verify that the crate still builds on its declared MSRV
    # (`rust-version` in Cargo.toml). This is independent of the toolchain
    # pin in rust-toolchain.toml, which tracks the latest tested stable
    # used for day-to-day builds.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install MSRV toolchain (1.94.0)
        run: rustup toolchain install 1.94.0 --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: msrv-1.94.0
      - name: cargo check on MSRV
        run: cargo +1.94.0 check --workspace --all-targets --locked
        env:
          RUSTUP_TOOLCHAIN: "1.94.0"

  build-validator:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: validator-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build validator
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --bin jackin-validate --target ${{ matrix.target }}
          else
            cargo build --release --locked --bin jackin-validate --target ${{ matrix.target }}
          fi

      - name: Package validator
        run: |
          archive="jackin-validate-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" jackin-validate
          sha256sum "$archive" > "$archive.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: jackin-validate-${{ matrix.target }}
          path: |
            jackin-validate-${{ matrix.target }}.tar.gz
            jackin-validate-${{ matrix.target }}.tar.gz.sha256
          retention-days: 7
