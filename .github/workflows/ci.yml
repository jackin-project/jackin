name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      # Either the dispatch short-circuit step or dorny/paths-filter
      # writes the boolean — never both, since they are mutually
      # exclusive on event_name.
      rust: ${{ steps.dispatch.outputs.rust || steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # workflow_dispatch is an explicit operator action — skip the
      # paths-filter classifier so manual runs always exercise the
      # full Rust suite, regardless of which paths happened to change.
      - name: Force rust=true on workflow_dispatch
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: echo "rust=true" >> "$GITHUB_OUTPUT"

      # build.rs feeds compile-time version metadata into every Rust
      # build, and docker/runtime/entrypoint.sh is pulled in via
      # include_str!() in src/derived_image.rs — both affect the
      # produced binary even though they live outside src/ and tests/.
      - name: Classify changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - '.github/workflows/ci.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'build.rs'
              - 'src/**'
              - 'tests/**'
              - 'docker/runtime/**'

  check:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          # Toolchain channel comes from rust-toolchain.toml.
          components: clippy, rustfmt
          # `-D warnings` is enforced explicitly on the clippy step below;
          # leaving the action's default RUSTFLAGS would also apply it to
          # `cargo build`/`cargo check`/`cargo nextest run`, which is a
          # behavioral change we don't want to bundle into this PR.
          rustflags: ""
      - uses: taiki-e/install-action@cca35edeb1d01366c2843b68fc3ca441446d73d3 # v2.77.1
        with:
          tool: cargo-nextest
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo nextest run

  msrv:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    # Verify that the crate still builds on its declared MSRV
    # (`rust-version` in Cargo.toml). This is independent of the toolchain
    # pin in rust-toolchain.toml, which tracks the latest tested stable
    # used for day-to-day builds.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          # Override rust-toolchain.toml: this job exists specifically to
          # verify the floor declared in `Cargo.toml`'s `rust-version`.
          toolchain: "1.94.0"
          cache-key: msrv-1.94.0
          rustflags: ""
      - name: cargo check on MSRV
        run: cargo check --workspace --all-targets --locked
        env:
          RUSTUP_TOOLCHAIN: "1.94.0"

  build-validator:
    needs: [changes, check]
    # Run on push-to-main when Rust inputs change, and on any
    # workflow_dispatch so a maintainer can re-build the validator
    # artifacts on demand without waiting for a Rust-touching push.
    if: >-
      (github.event_name == 'push' &&
       github.ref == 'refs/heads/main' &&
       needs.changes.outputs.rust == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          # Toolchain channel comes from rust-toolchain.toml.
          target: ${{ matrix.target }}
          cache-key: validator-${{ matrix.target }}
          rustflags: ""

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build validator
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --bin jackin-validate --target ${{ matrix.target }}
          else
            cargo build --release --locked --bin jackin-validate --target ${{ matrix.target }}
          fi

      - name: Package validator
        run: |
          archive="jackin-validate-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" jackin-validate
          sha256sum "$archive" > "$archive.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jackin-validate-${{ matrix.target }}
          path: |
            jackin-validate-${{ matrix.target }}.tar.gz
            jackin-validate-${{ matrix.target }}.tar.gz.sha256
          retention-days: 7
