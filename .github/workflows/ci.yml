    name: cargo bench build ${{ matrix.shard.name }} (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-bench-${{ matrix.shard.name }}-workspace-v3-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', '.cargo/**', 'build.rs', 'src/**', 'crates/**', 'tests/**', 'docker/runtime/**') }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: cargo build --benches ${{ matrix.shard.packages }} --locked

  # Plan 022: scoped feature-powerset for crates with real optional behavior.
  # Full workspace powerset stays on the scheduled hygiene lane.
  feature-powerset-scoped:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
        package:
          - jackin
          - jackin-diagnostics
          - jackin-capsule
          - jackin-agent-status
          - jackin-term
          - jackin-runtime
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: feature powerset ${{ matrix.package }} (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-feature-powerset-${{ matrix.package }}-workspace-v2-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', '.cargo/**', 'build.rs', 'src/**', 'crates/**', 'tests/**', 'docker/runtime/**') }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTFLAGS RUSTDOC RUSTUP"
      # Crates that actually expose optional behavior (not test-support-only).
      - run: >
          cargo hack check
          -p ${{ matrix.package }}
          --feature-powerset
          --all-targets
          --locked

  msrv:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    # Verify that the crate still builds on its declared MSRV
    # (`rust-version` in Cargo.toml). This is independent of the toolchain
    # pin in rust-toolchain.toml, which tracks the latest tested stable
    # used for day-to-day builds.
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
        shard:
          - { name: core, packages: "-p jackin -p jackin-core -p jackin-host -p jackin-instance -p jackin-isolation -p jackin-docker" }
          - { name: capsule, packages: "-p jackin-capsule -p jackin-runtime -p jackin-protocol -p jackin-term -p jackin-agent-status" }
          - { name: services, packages: "-p jackin-config -p jackin-diagnostics -p jackin-env -p jackin-image -p jackin-manifest -p jackin-usage" }
          - { name: tools, packages: "-p jackin-console -p jackin-console-oppicker -p jackin-launch-tui -p jackin-process -p jackin-test-support -p jackin-build-meta -p jackin-dev -p jackin-xtask" }
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo msrv check ${{ matrix.shard.name }} (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "version=$(sed -n 's/^rust-version = \"\(.*\)\"/\1/p' Cargo.toml)" >> "$GITHUB_OUTPUT"
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ steps.msrv.outputs.version }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust@${{ steps.msrv.outputs.version }}"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-msrv-${{ matrix.shard.name }}-dev-workspace-v3-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', '.cargo/**', 'build.rs', 'src/**', 'crates/**', 'tests/**', 'docker/runtime/**') }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - name: cargo check on MSRV
        run: cargo check ${{ matrix.shard.packages }} --all-targets --locked
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}
  audit:
    # Advisories are also covered daily by hygiene.yml (cargo deny check
    # advisories); in PR CI the audit only needs to run when the dependency
    # graph can change (the rust filter includes Cargo.lock).
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo audit (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache audit indexes
        id: audit-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/advisory-db
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/audit.toml') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - name: Run cargo audit
        shell: bash
        run: |
          set -euo pipefail

          args=(--no-yanked)
          if [ "${{ steps.audit-cache.outputs.cache-hit }}" = "true" ]; then
            args+=(--no-fetch --stale)
          fi
          cargo audit "${args[@]}"

  # Single stable check name for branch-protection required-status,
  # regardless of which gated jobs skipped under it.
  ci-required:
    if: always()
    needs:
      - matrix-setup
      - changes
      - actionlint
      - audit
      - cargo-registry-warmup
      - fmt
      - clippy
      - dependency-policy
      - schema-check
      - file-size-gate
      - check-default
      - construct-e2e-image
      - doctest
      - test
      - fuzz
      - bench-build
      - feature-powerset-scoped
      - msrv
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/aggregate-needs
        with:
          needs-json: ${{ toJSON(needs) }}
          workflow-label: CI
