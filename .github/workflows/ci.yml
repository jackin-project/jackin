      - name: Capture sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats
        with:
          artifact-name: sccache-stats-ci-check-default-${{ matrix.config.lane }}
          heading: sccache ci check-default (${{ matrix.config.lane }})
  construct-e2e-image:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.construct_image == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: construct E2E image (${{ matrix.config.lane }})
    env:
      BUILDX_BUILDER: jackin-construct
      CARGO_NET_OFFLINE: "true"
      CARGO_TERM_COLOR: always
      LOCAL_REGISTRY_IMAGE: projectjackin/construct
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      # When docker/construct/** changes, the published construct:trixie image
      # on Docker Hub is stale for the lifetime of the PR — it is only
      # republished after merge to main. Build the construct image in its own
      # job and pass it to nextest as a Docker tar so the E2E tests use the
      # updated image rather than pulling the outdated one from the registry.
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          # sccache install: blank wrapper in case binstall source-falls-back
          # to cargo, which would probe rustc through a missing sccache.
          RUSTC_WRAPPER: ""
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: construct-e2e-image-${{ matrix.config.lane }}-workspace-v2-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', '.cargo/**', 'build.rs', 'src/**', 'crates/**', 'tests/**', 'docker/runtime/**') }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
      - name: Set up Docker Buildx for E2E cache
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          name: ${{ env.BUILDX_BUILDER }}
      - name: Expose GitHub Actions cache runtime
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - name: Resolve construct tool versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          source docker/construct/versions.env
          echo "shellfirm-version=${SHELLFIRM_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Restore prebuilt shellfirm
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: docker/construct/prebuilt
          key: shellfirm-${{ runner.os }}-${{ runner.arch }}-${{ steps.versions.outputs.shellfirm-version }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Build construct image for E2E
        env:
          CACHE_FROM: |
            type=registry,ref=projectjackin/construct:buildcache-amd64
            type=gha,scope=construct-ci-e2e,repository=${{ github.repository }},ghtoken=${{ github.token }}
          CACHE_TO: type=gha,scope=construct-ci-e2e,repository=${{ github.repository }},ghtoken=${{ github.token }},mode=max
        run: |
          set -euo pipefail
          "$CI_XTASK" construct build-platform amd64
          docker save --output construct-trixie.tar projectjackin/construct:trixie
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: construct-trixie-image-${{ matrix.config.lane }}
          path: construct-trixie.tar
          retention-days: 1
      - name: Capture sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats
        with:
          artifact-name: sccache-stats-ci-construct-e2e-image-${{ matrix.config.lane }}
          heading: sccache ci construct-e2e-image (${{ matrix.config.lane }})

  # Plan 011: promote scheduled doc tests into PR CI + cheap pending-snap hygiene.
  # Kept as a sibling job because `test` is a reusable nextest workflow.
  doctest:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
        shard:
          - { name: core, packages: "-p jackin -p jackin-core -p jackin-host -p jackin-instance -p jackin-isolation -p jackin-docker" }
          - { name: capsule, packages: "-p jackin-capsule -p jackin-runtime -p jackin-protocol -p jackin-term -p jackin-agent-status" }
          - { name: services, packages: "-p jackin-config -p jackin-diagnostics -p jackin-env -p jackin-image -p jackin-manifest -p jackin-usage" }
          - { name: tools, packages: "-p jackin-console -p jackin-console-oppicker -p jackin-launch-tui -p jackin-process -p jackin-test-support -p jackin-build-meta -p jackin-dev -p jackin-xtask" }
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo test --doc ${{ matrix.shard.name }} (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_OFFLINE: "true"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          RUSTC_WRAPPER: ""
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-doctest-dev-${{ matrix.shard.name }}-v3-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml', '.cargo/**', 'build.rs', 'src/**', 'crates/**', 'tests/**', 'docker/runtime/**') }}
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
      - name: Reject pending insta snapshots
        run: |
          pending=$(git ls-files --others --exclude-standard '*.pending-snap'; find crates -name '*.pending-snap' -print)
          if [ -n "$pending" ]; then echo "::error::pending insta snapshots found:"; echo "$pending"; exit 1; fi
      - name: Enumerate changed insta snapshots for review
        run: |
          # Plan 024: absence of *.pending-snap is not proof of review. List every
          # .snap that differs from origin/main so PR reviewers must acknowledge them.
          base=$(git merge-base origin/main HEAD 2>/dev/null || true)
          if [ -z "$base" ]; then
            echo "No merge-base with origin/main; skipping snapshot-diff enumeration."
            exit 0
          fi
          changed=$(git diff --name-only "$base" -- '*.snap' || true)
          {
            echo "## Changed insta snapshots"
            if [ -z "$changed" ]; then
              echo "_None vs origin/main._"
            else
              echo "Reviewer must acknowledge each changed \`.snap\` (hand-edited snapshots that match buggy output are rejected in review):"
              echo
              echo '```'
              echo "$changed"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$changed" ]; then
            echo "Changed .snap files:"
            echo "$changed"
          else
            echo "No changed .snap files vs origin/main."
          fi
      - run: cargo test --doc ${{ matrix.shard.packages }} --locked
      - name: Capture sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats
        with:
          artifact-name: sccache-stats-ci-doctest-${{ matrix.shard.name }}-${{ matrix.config.lane }}
          heading: sccache ci doctest ${{ matrix.shard.name }} (${{ matrix.config.lane }})

