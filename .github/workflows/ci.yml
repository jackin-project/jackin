# NOTE: `preview.yml` is triggered by a successful run of this workflow name
# on main and verifies the triggering source SHA before publishing. Renaming
# the `name:` field silently breaks the Homebrew preview chain.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      lanes:
        description: |
          Which runner(s) to run on. Default github; use both for parity runs.
        type: choice
        default: github
        options: [github, velnor, both]

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  matrix-setup:
    name: Select runner lane
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      configs: ${{ steps.set.outputs.configs }}
    steps:
      - id: set
        env:
          LANES: ${{ github.event_name == 'workflow_dispatch' && inputs.lanes || 'github' }}
        run: |
          github_writer='{"lane":"GitHub","runner":"\"ubuntu-24.04\"","runner_os":"Linux","runner_arch":"X64","cache_writer":true}'
          velnor_writer='{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","runner_os":"Linux","runner_arch":"X64","cache_writer":true}'
          velnor_reader='{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","runner_os":"Linux","runner_arch":"X64","cache_writer":false}'
          case "$LANES" in
            velnor) configs="[$velnor_writer]" ;;
            both)   configs="[$github_writer,$velnor_reader]" ;;
            *)      configs="[$github_writer]" ;;
          esac
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.route.outputs.rust }}
      construct: ${{ steps.route.outputs.construct }}
      construct_image: ${{ steps.route.outputs.construct_image }}
      docker_e2e: ${{ steps.route.outputs.docker_e2e }}
      workflows: ${{ steps.route.outputs.workflows }}
      policy-reuse: ${{ steps.policy-result.outputs.hit }}
      policy-result-name: ${{ steps.policy-result.outputs.name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Reject pending insta snapshots
        run: |
          pending=$(git ls-files --others --exclude-standard '*.pending-snap'; find crates -name '*.pending-snap' -print)
          if [ -n "$pending" ]; then echo "::error::pending insta snapshots found:"; echo "$pending"; exit 1; fi

      - name: Force rust=true construct=true on workflow_dispatch
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          {
            echo "rust=true"
            echo "construct=true"
            echo "construct_image=true"
            echo "docker_e2e=true"
            echo "workflows=true"
          } >> "$GITHUB_OUTPUT"

      # build.rs supplies compile-time version metadata and
      # docker/runtime/entrypoint.sh is include_str!'d by
      # src/derived_image.rs — both affect the produced binary even
      # though they live outside src/ and tests/.
      - name: Classify changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          token: ${{ github.token }}
          filters: |
            rust:
              - '.cargo/**'
              - '.github/workflows/ci.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - 'deny.toml'
              - 'file-size-budget.toml'
              - 'test-layout-allowlist.toml'
              - 'rust-toolchain.toml'
              - 'build.rs'
              - 'src/**'
              - 'crates/**'
              - 'tests/**'
              - 'docker/runtime/**'
            construct:
              - '.github/workflows/construct.yml'
              - 'docker-bake.hcl'
              - 'docker/construct/**'
              - 'crates/jackin-xtask/**'
            construct_image:
              - 'docker/construct/**'
            docker_e2e:
              - '.config/nextest.toml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/rust-nextest.yml'
              - 'docker/**'
              - 'crates/jackin/tests/dind_e2e.rs'
              - 'crates/jackin/tests/dind_e2e/**'
              - 'crates/jackin/tests/fixtures/**'
              - 'crates/jackin/src/runtime.rs'
              - 'crates/jackin/src/app/**'
              - 'crates/jackin/src/cli/role.rs'
              - 'crates/jackin/src/cli/prewarm.rs'
              - 'crates/jackin/src/docker_client/**'
              - 'crates/jackin/src/repo_contract/**'
              - 'crates/jackin-capsule/**'
              - 'crates/jackin-config/**'
              - 'crates/jackin-docker/**'
              - 'crates/jackin-env/**'
              - 'crates/jackin-host/**'
              - 'crates/jackin-image/**'
              - 'crates/jackin-instance/**'
              - 'crates/jackin-isolation/**'
              - 'crates/jackin-launch-tui/**'
              - 'crates/jackin-manifest/**'
              - 'crates/jackin-protocol/**'
              - 'crates/jackin-runtime/**'
              - 'crates/jackin-usage/**'
            workflows:
              - '.github/workflows/**'
            mise:
              - 'mise.toml'

      - name: Route changed paths
        id: route
        shell: bash
        env:
          FORCE_RUST: ${{ steps.dispatch.outputs.rust }}
          FORCE_CONSTRUCT: ${{ steps.dispatch.outputs.construct }}
          FORCE_CONSTRUCT_IMAGE: ${{ steps.dispatch.outputs.construct_image }}
          FORCE_DOCKER_E2E: ${{ steps.dispatch.outputs.docker_e2e }}
          FORCE_WORKFLOWS: ${{ steps.dispatch.outputs.workflows }}
          FILTER_RUST: ${{ steps.filter.outputs.rust }}
          FILTER_CONSTRUCT: ${{ steps.filter.outputs.construct }}
          FILTER_CONSTRUCT_IMAGE: ${{ steps.filter.outputs.construct_image }}
          FILTER_DOCKER_E2E: ${{ steps.filter.outputs.docker_e2e }}
          FILTER_WORKFLOWS: ${{ steps.filter.outputs.workflows }}
          FILTER_MISE: ${{ steps.filter.outputs.mise }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          rust="${FORCE_RUST:-${FILTER_RUST:-false}}"
          construct="${FORCE_CONSTRUCT:-${FILTER_CONSTRUCT:-false}}"
          construct_image="${FORCE_CONSTRUCT_IMAGE:-${FILTER_CONSTRUCT_IMAGE:-false}}"
          docker_e2e="${FORCE_DOCKER_E2E:-${FILTER_DOCKER_E2E:-false}}"
          workflows="${FORCE_WORKFLOWS:-${FILTER_WORKFLOWS:-false}}"

          if [ "$docker_e2e" = "true" ] || [ "$construct_image" = "true" ]; then
            rust=true
            docker_e2e=true
          fi

          if [ "${FILTER_MISE:-false}" = "true" ] && [ -z "${FORCE_RUST:-}" ]; then
            base=""
            if [ -n "$BASE_REF" ]; then
              git fetch --no-tags origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
              base=$(git merge-base HEAD "refs/remotes/origin/$BASE_REF")
            elif [ -n "$BEFORE_SHA" ] && ! [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
              base="$BEFORE_SHA"
            elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              base="HEAD^"
            fi

            if [ -z "$base" ] || ! git cat-file -e "$base:mise.toml" 2>/dev/null; then
              rust=true
            else
              git show "$base:mise.toml" > "$RUNNER_TEMP/mise-base.toml"
              awk '
                function keep(name) {
                  return name == "zig" ||
                    name == "cargo-audit" ||
                    name == "cargo-deny" ||
                    name == "cargo-fuzz" ||
                    name == "cargo-hack" ||
                    name == "cargo-nextest" ||
                    name == "cargo-shear" ||
                    name == "cargo-zigbuild"
                }
                /^\[tools\]$/ { section = "tools"; next }
                /^\[tool_alias\]$/ { section = "tool_alias"; next }
                /^\[tools\./ {
                  section = $0
                  sub(/^\[tools\./, "", section)
                  sub(/\]$/, "", section)
                  next
                }
                /^\[/ { section = ""; next }
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
                {
                  key = $1
                  sub(/[[:space:]]*=.*/, "", key)
                  gsub(/"/, "", key)
                  if (section == "tools" && keep(key)) print section "." key "=" $0
                  else if (section == "tool_alias" && keep(key)) print section "." key "=" $0
                  else if (keep(section)) print "tools." section "." $0
                }
              ' "$RUNNER_TEMP/mise-base.toml" > "$RUNNER_TEMP/mise-base-rust.txt"
              awk '
                function keep(name) {
                  return name == "zig" ||
                    name == "cargo-audit" ||
                    name == "cargo-deny" ||
                    name == "cargo-fuzz" ||
                    name == "cargo-hack" ||
                    name == "cargo-nextest" ||
                    name == "cargo-shear" ||
                    name == "cargo-zigbuild"
                }
                /^\[tools\]$/ { section = "tools"; next }
                /^\[tool_alias\]$/ { section = "tool_alias"; next }
                /^\[tools\./ {
                  section = $0
                  sub(/^\[tools\./, "", section)
                  sub(/\]$/, "", section)
                  next
                }
                /^\[/ { section = ""; next }
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
                {
                  key = $1
                  sub(/[[:space:]]*=.*/, "", key)
                  gsub(/"/, "", key)
                  if (section == "tools" && keep(key)) print section "." key "=" $0
                  else if (section == "tool_alias" && keep(key)) print section "." key "=" $0
                  else if (keep(section)) print "tools." section "." $0
                }
              ' mise.toml > "$RUNNER_TEMP/mise-head-rust.txt"

              if ! cmp -s "$RUNNER_TEMP/mise-base-rust.txt" "$RUNNER_TEMP/mise-head-rust.txt"; then
                rust=true
              fi
            fi
          fi

          {
            echo "rust=$rust"
            echo "construct=$construct"
            echo "construct_image=$construct_image"
            echo "docker_e2e=$docker_e2e"
            echo "workflows=$workflows"
          } >> "$GITHUB_OUTPUT"

      - name: Find input-identical repository policy result
        id: policy-result
        if: steps.route.outputs.rust == 'true'
        shell: bash
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GH_TOKEN: ${{ github.token }}
          LANES: ${{ github.event_name == 'workflow_dispatch' && inputs.lanes || 'github' }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          base=${BASE_SHA:-}
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
            base=$(git merge-base HEAD refs/remotes/origin/main)
          fi
          digest=$(
            {
              printf 'contract=ci-policy-v1\nbase=%s\n' "$base"
              while IFS= read -r -d '' path; do
                printf '%s\0%s\n' "$path" "$(git hash-object "$path")"
              done < <(
                git ls-files -z -- \
                  '.cargo/**' \
                  'Cargo.lock' \
                  'Cargo.toml' \
                  'build.rs' \
                  'clippy.toml' \
                  'crates/**' \
                  'deny.toml' \
                  'file-size-budget.toml' \
                  'ratchet.toml' \
                  'rust-toolchain.toml' \
                  'scripts/ci/check-agent-status-truthful.sh' \
                  'src/**' \
                  'test-layout-allowlist.toml' \
                  'tests/**'
              )
            } | sha256sum | cut -d ' ' -f 1
          )
          name="ci-policy-result-v1-${digest}-${LANES}"
          artifact_id=
          if ! artifact_id=$(
            gh api "repos/${REPOSITORY}/actions/artifacts?name=${name}&per_page=10" \
              --jq '.artifacts[] | select(.expired == false) | .id' \
              | head -n 1
          ); then
            echo "::warning::repository-policy result lookup failed; running policies"
            artifact_id=
          fi
          if [ -n "$artifact_id" ]; then
            echo "::notice::reusing input-identical repository policy result"
          fi
          {
            echo "name=$name"
            if [ -n "$artifact_id" ]; then
              echo "hit=true"
            else
              echo "hit=false"
            fi
          } >> "$GITHUB_OUTPUT"

  actionlint:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.workflows == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: actionlint (${{ matrix.config.lane }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "actionlint shellcheck"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - run: actionlint .github/workflows/*.yml

  fmt:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo fmt (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - run: rustup component add rustfmt
      - run: cargo fmt --check

  cargo-registry-warmup:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo registry warmup (${{ matrix.config.lane }})
    outputs:
      affected-packages: ${{ steps.affected-crates.outputs.packages }}
      affected-cache-keys: ${{ steps.affected-crates.outputs.cache-keys }}
      reused-packages: ${{ steps.affected-crates.outputs.reused-packages }}
    env:
      CARGO_TARGET_DIR: target
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read MSRV
        id: msrv
        run: echo "version=$(sed -n 's/^rust-version = \"\(.*\)\"/\1/p' Cargo.toml)" >> "$GITHUB_OUTPUT"
      - id: ci-xtask-artifact
        name: Restore input-identical CI xtask
        shell: bash
        env:
          ARTIFACT_NAME: ci-xtask-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml', '.cargo/**', 'crates/*/Cargo.toml', 'crates/jackin-xtask/src/**', 'crates/jackin-process/src/**') }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p .ci-prebuilt-xtask
          artifact_id=$(
            gh api "repos/${REPOSITORY}/actions/artifacts?name=${ARTIFACT_NAME}&per_page=10" \
              --jq '.artifacts[] | select(.expired == false) | .id' \
              | head -n 1
          )
          if [ -z "$artifact_id" ]; then
            echo "hit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          archive=.ci-prebuilt-xtask/.artifact.zip
          gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "$archive"
          python3 -m zipfile -e "$archive" .ci-prebuilt-xtask
          rm "$archive"
          chmod +x .ci-prebuilt-xtask/jackin-xtask
          echo "hit=true" >> "$GITHUB_OUTPUT"
      - id: ci-tools-artifact
        name: Restore resolved CI tool binaries
        shell: bash
        env:
          ARTIFACT_NAME: ci-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', 'mise.lock') }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p .ci-prebuilt-tools
          artifact_id=$(
            gh api "repos/${REPOSITORY}/actions/artifacts?name=${ARTIFACT_NAME}&per_page=10" \
              --jq '.artifacts[] | select(.expired == false) | .id' \
              | head -n 1
          )
          if [ -z "$artifact_id" ]; then
            echo "hit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          archive=.ci-prebuilt-tools/.artifact.zip
          gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "$archive"
          python3 -m zipfile -e "$archive" .ci-prebuilt-tools
          rm "$archive"
          chmod +x .ci-prebuilt-tools/*
          echo "hit=true" >> "$GITHUB_OUTPUT"
      - id: xtask-target-seed
        name: Find latest successful jackin-xtask target
        if: steps.ci-xtask-artifact.outputs.hit != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MARKER_NAME: ci-crate-target-latest-v4-${{ runner.os }}-${{ runner.arch }}-jackin-xtask-ready
          PREFIX_BASE: ci-crate-target-v4-${{ runner.os }}-${{ runner.arch }}-jackin-xtask-
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          artifact=$(
            gh api "repos/${REPOSITORY}/actions/artifacts?name=${MARKER_NAME}&per_page=10" \
              --jq '.artifacts[] | select(.expired == false) | [.id, .workflow_run.id] | @tsv' \
              | head -n 1
          )
          if [ -z "$artifact" ]; then
            echo "hit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          read -r artifact_id run_id <<< "$artifact"
          mkdir -p target/.ci-latest-marker
          gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
            > target/.ci-latest-marker/artifact.zip
          python3 -m zipfile -e \
            target/.ci-latest-marker/artifact.zip target/.ci-latest-marker
          prefix=$(cat target/.ci-latest-marker/target.latest)
          rm -rf target/.ci-latest-marker
          if [[ ! "$prefix" =~ ^${PREFIX_BASE}[0-9a-f]{64}$ ]]; then
            echo "::error::invalid latest-target prefix for jackin-xtask"
            exit 1
          fi
          {
            echo "hit=true"
            echo "prefix=$prefix"
            echo "run-id=$run_id"
          } >> "$GITHUB_OUTPUT"
      - name: Download latest successful jackin-xtask target
        if: >-
          steps.ci-xtask-artifact.outputs.hit != 'true' &&
          steps.xtask-target-seed.outputs.hit == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ${{ steps.xtask-target-seed.outputs.prefix }}-part-*
          path: target/.ci-restore
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.xtask-target-seed.outputs.run-id }}
      - name: Restore latest successful jackin-xtask target
        if: >-
          steps.ci-xtask-artifact.outputs.hit != 'true' &&
          steps.xtask-target-seed.outputs.hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          pids=()
          for archive in target/.ci-restore/target.part-*; do
            tar --zstd -xf "$archive" &
            pids+=("$!")
          done
          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done
          [ "$failed" -eq 0 ]
          rm -rf target/.ci-restore
          git ls-files -z | xargs -0r touch --date='2000-01-01T00:00:00Z' --
      - name: Check prepared Rust toolchains
        id: toolchain-lookup
        if: >-
          steps.ci-xtask-artifact.outputs.hit != 'true' ||
          steps.ci-tools-artifact.outputs.hit != 'true'
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-ci-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml') }}
          lookup-only: true
      - name: Use the minimal Rust CI profile
        if: >-
          (steps.ci-xtask-artifact.outputs.hit != 'true' ||
           steps.ci-tools-artifact.outputs.hit != 'true') &&
          steps.toolchain-lookup.outputs.cache-hit != 'true'
        run: rustup set profile minimal
      - name: Bootstrap missing Rust toolchains
        id: toolchain-cache
        if: >-
          steps.ci-xtask-artifact.outputs.hit != 'true' ||
          steps.ci-tools-artifact.outputs.hit != 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-ci-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml') }}
          restore-keys: |
            rustup-ci-v3-${{ runner.os }}-${{ runner.arch }}-
      - id: cargo-registry-cache
        if: >-
          steps.ci-xtask-artifact.outputs.hit != 'true' ||
          steps.ci-tools-artifact.outputs.hit != 'true'
        uses: ./.github/actions/cache-cargo-registry
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        if: >-
          steps.ci-xtask-artifact.outputs.hit != 'true' ||
          steps.ci-tools-artifact.outputs.hit != 'true'
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: >-
            ${{ github.ref == 'refs/heads/main' ||
                github.event_name == 'workflow_dispatch' ||
                (github.event_name == 'pull_request' &&
                 github.event.pull_request.head.repo.full_name == github.repository) }}
          install_args: >-
            rust
            rust@${{ steps.msrv.outputs.version }}
            ${{ steps.ci-tools-artifact.outputs.hit != 'true' &&
                'cargo-binstall cargo:sccache cargo:cargo-nextest cargo:cargo-deny cargo:cargo-shear cargo:cargo-audit cargo:cargo-fuzz cargo:cargo-hack' || '' }}
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - name: Prepare clippy once for crate jobs
        if: >-
          (steps.ci-xtask-artifact.outputs.hit != 'true' ||
           steps.ci-tools-artifact.outputs.hit != 'true') &&
          steps.toolchain-lookup.outputs.cache-hit != 'true'
        run: rustup component add clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.ci-xtask-artifact.outputs.hit != 'true'
        with:
          shared-key: ci-xtask-dev-v1
          cache-all-crates: "false"
          cache-workspace-crates: "false"
          env-vars: "CARGO CARGO_TARGET_DIR RUSTFLAGS RUSTDOC RUSTUP"
          save-if: >-
            ${{ github.ref == 'refs/heads/main' ||
                github.event_name == 'workflow_dispatch' ||
                (github.event_name == 'pull_request' &&
                 github.event.pull_request.head.repo.full_name == github.repository) }}
      - name: Build shared CI xtask
        if: steps.ci-xtask-artifact.outputs.hit != 'true'
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo build -p jackin-xtask --locked
      - name: Stage shared CI xtask
        run: |
          mkdir -p .ci-prebuilt-tools .ci-prebuilt-xtask target/ci-tools
          if [ "${{ steps.ci-tools-artifact.outputs.hit }}" != "true" ]; then
            for tool in sccache cargo-nextest cargo-deny cargo-shear cargo-audit cargo-fuzz cargo-hack; do
              cp "$(mise which "$tool")" ".ci-prebuilt-tools/$tool"
            done
            strip .ci-prebuilt-tools/*
          fi
          if [ "${{ steps.ci-xtask-artifact.outputs.hit }}" != "true" ]; then
            cp target/debug/jackin-xtask .ci-prebuilt-xtask/jackin-xtask
            strip .ci-prebuilt-xtask/jackin-xtask
            cargo metadata --format-version 1 --locked --offline \
              > .ci-prebuilt-xtask/workspace-metadata.json
          fi
          cp .ci-prebuilt-tools/* target/ci-tools/
          cp .ci-prebuilt-xtask/* target/ci-tools/
      - id: affected-crates
        name: Select affected crate tests
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          COMMON_CONTRACT_KEY: ${{ hashFiles('.github/workflows/rust-nextest.yml', '.config/nextest.toml', 'clippy.toml', 'flaky-tests.toml', 'ratchet.toml', 'mise.toml', 'mise.lock', 'scripts/ci/**', 'crates/jackin-xtask/Cargo.toml', 'crates/jackin-xtask/src/**') }}
          CONSTRUCT_IMAGE_CHANGED: ${{ needs.changes.outputs.construct_image }}
          DOCKER_CONTRACT_KEY: ${{ hashFiles('docker/**', 'docker-bake.hcl') }}
          DOCKER_E2E: ${{ needs.changes.outputs.docker_e2e }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          RUNNER_ARCH: ${{ runner.arch }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            selection=(--all)
          elif [ -n "$BASE_REF" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
            selection=(--base "origin/$BASE_REF")
          elif [ -n "$BEFORE_SHA" ] && ! [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            git fetch --no-tags --depth=1 origin "$BEFORE_SHA"
            selection=(--base "$BEFORE_SHA")
          else
            selection=(--all)
          fi
          packages=$(target/ci-tools/jackin-xtask affected-crates \
            --metadata target/ci-tools/workspace-metadata.json "${selection[@]}")
          cache_keys=$(target/ci-tools/jackin-xtask affected-crates \
            --metadata target/ci-tools/workspace-metadata.json "${selection[@]}" --cache-keys)
          misses=()
          hits=()
          while IFS= read -r package; do
            cache_key=$(jq -er --arg package "$package" '.[$package]' <<< "$cache_keys")
            result=$(scripts/ci/find-crate-result.sh \
              "$package" "$cache_key" true \
              "$DOCKER_E2E" "$CONSTRUCT_IMAGE_CHANGED" \
              "$COMMON_CONTRACT_KEY" "$DOCKER_CONTRACT_KEY" \
              "$RUNNER_OS" "$RUNNER_ARCH" "$GITHUB_SHA")
            if [ "$(jq -r '.hit' <<< "$result")" = "true" ]; then
              hits+=("$package")
            else
              misses+=("$package")
            fi
          done < <(jq -r '.[]' <<< "$packages")
          packages=$(printf '%s\n' "${misses[@]}" | jq -Rsc 'split("\n") | map(select(length > 0))')
          reused=$(printf '%s\n' "${hits[@]}" | jq -Rsc 'split("\n") | map(select(length > 0))')
          {
            echo "packages=$packages"
            echo "cache-keys=$cache_keys"
            echo "reused-packages=$reused"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### Crate test routing"
            echo
            echo "Reused: ${#hits[@]}; scheduled: ${#misses[@]}."
            if [ "${#hits[@]}" -gt 0 ]; then
              printf -- "- reused \`%s\`\n" "${hits[@]}"
            fi
            if [ "${#misses[@]}" -gt 0 ]; then
              printf -- "- scheduled \`%s\`\n" "${misses[@]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Publish resolved CI tool binaries
        if: >-
          steps.ci-tools-artifact.outputs.hit != 'true' &&
          matrix.config.cache_writer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', 'mise.lock') }}
          path: .ci-prebuilt-tools/*
          compression-level: 0
          retention-days: 7
          include-hidden-files: true
      - name: Publish input-identical CI xtask
        if: steps.ci-xtask-artifact.outputs.hit != 'true' && matrix.config.cache_writer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-xtask-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml', '.cargo/**', 'crates/*/Cargo.toml', 'crates/jackin-xtask/src/**', 'crates/jackin-process/src/**') }}
          path: .ci-prebuilt-xtask/*
          compression-level: 0
          retention-days: 7
          include-hidden-files: true
      - name: Upload shared CI xtask
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-xtask-${{ matrix.config.lane }}
          path: target/ci-tools/*
          compression-level: 0
          retention-days: 1

  schema-check:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true' && needs.changes.outputs.policy-reuse != 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: schema-check (${{ matrix.config.lane }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      - name: Fetch base branch
        run: git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
      - run: |
          "$CI_XTASK" schema-check --base origin/main

  file-size-gate:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true' && needs.changes.outputs.policy-reuse != 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: file-size ratchet gate (${{ matrix.config.lane }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      # Gate: codebase-health lint checks via the umbrella `lint --strict`
      # command. The file-size ratchet (file-size-budget.toml: production
      # ≤1850L production / ≤10000L tests via ratchet.toml + file-size-budget.toml) and the test-file-layout ratchet
      # (test-layout-allowlist.toml: one sibling tests.rs) are STRICT here —
      # they fail on growth above budget and on stale/missing/shrunken rows.
      # dependency-direction stays informational (exits 0) until the P2 layer
      # inversions are cleaned up. Grandfathered entries in each ratchet file
      # may only ever shrink. See `plans/codebase-health/`.
      - name: Register xtask problem matcher
        run: echo "::add-matcher::.github/problem-matchers/xtask.json"
      - run: |
          "$CI_XTASK" lint --strict

  # Plan 028: README freshness owns checkout (fetch-depth 0) so the gate can run.
  readme-freshness:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: >-
      needs.changes.outputs.rust == 'true' &&
      needs.changes.outputs.policy-reuse != 'true' &&
      github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 20
    name: README freshness (advisory) (${{ matrix.config.lane }})
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}"
      - name: README freshness gate
        run: |
          "$CI_XTASK" lint readme-freshness --base "origin/${{ github.base_ref }}"
      - name: Synthetic-diff self-test (failure path)
        run: |
          set -euo pipefail
          # Prove the CLI is wired: missing base ref must not silently no-op without output.
          set +e
          out=$("$CI_XTASK" lint readme-freshness --base "origin/does-not-exist-ref-for-probe" 2>&1)
          code=$?
          set -e
          echo "$out"
          echo "exit=$code"
          # Advisory job: either non-zero (fail-closed) or empty-diff OK message is acceptable.

  dependency-policy:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true' && needs.changes.outputs.policy-reuse != 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo dependency policy (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - run: cargo shear --deny-warnings
      - run: bash scripts/ci/check-agent-status-truthful.sh
      - run: cargo deny check licenses bans sources

  construct-e2e-image:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.construct_image == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: construct E2E image (${{ matrix.config.lane }})
    env:
      BUILDX_BUILDER: jackin-construct
      CARGO_NET_OFFLINE: "true"
      CARGO_TERM_COLOR: always
      LOCAL_REGISTRY_IMAGE: projectjackin/construct
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      # When docker/construct/** changes, the published construct:trixie image
      # on Docker Hub is stale for the lifetime of the PR — it is only
      # republished after merge to main. Build the construct image in its own
      # job and pass it to nextest as a Docker tar so the E2E tests use the
      # updated image rather than pulling the outdated one from the registry.
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          # sccache install: blank wrapper in case binstall source-falls-back
          # to cargo, which would probe rustc through a missing sccache.
          RUSTC_WRAPPER: ""
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: construct-e2e-image-workspace-v2
          cache-all-crates: "false"
          cache-workspace-crates: "false"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
      - name: Set up Docker Buildx for E2E cache
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          name: ${{ env.BUILDX_BUILDER }}
      - name: Expose GitHub Actions cache runtime
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - name: Resolve construct tool versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          source docker/construct/versions.env
          echo "shellfirm-version=${SHELLFIRM_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Restore prebuilt shellfirm
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: docker/construct/prebuilt
          key: shellfirm-${{ runner.os }}-${{ runner.arch }}-${{ steps.versions.outputs.shellfirm-version }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Build construct image for E2E
        env:
          CACHE_FROM: |
            type=registry,ref=projectjackin/construct:buildcache-amd64
            type=gha,scope=construct-ci-e2e,repository=${{ github.repository }},ghtoken=${{ github.token }}
          CACHE_TO: type=gha,scope=construct-ci-e2e,repository=${{ github.repository }},ghtoken=${{ github.token }},mode=max
        run: |
          set -euo pipefail
          "$CI_XTASK" construct build-platform amd64
          docker save --output construct-trixie.tar projectjackin/construct:trixie
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: construct-trixie-image-${{ matrix.config.lane }}
          path: construct-trixie.tar
          retention-days: 1
      - name: Capture sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats
        with:
          artifact-name: sccache-stats-ci-construct-e2e-image-${{ matrix.config.lane }}
          heading: sccache ci construct-e2e-image (${{ matrix.config.lane }})

  test:
    needs: [changes, construct-e2e-image, matrix-setup, cargo-registry-warmup]
    if: >-
      always() && needs.changes.outputs.rust == 'true' &&
      needs.cargo-registry-warmup.outputs.affected-packages != '[]' &&
      !failure() && !cancelled()
    uses: ./.github/workflows/rust-nextest.yml
    with:
      runner-configs-json: ${{ needs.matrix-setup.outputs.configs }}
      packages-json: ${{ needs.cargo-registry-warmup.outputs.affected-packages }}
      package-cache-keys-json: ${{ needs.cargo-registry-warmup.outputs.affected-cache-keys }}
      all-features: true
      construct-image-changed: ${{ needs.changes.outputs.construct_image == 'true' }}
      docker-e2e: ${{ needs.changes.outputs.docker_e2e == 'true' }}
    secrets: inherit
  audit:
    # Advisories are also covered daily by hygiene.yml (cargo deny check
    # advisories); in PR CI the audit only needs to run when the dependency
    # graph can change (the rust filter includes Cargo.lock).
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true' && needs.changes.outputs.policy-reuse != 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo audit (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/download-ci-xtask
        with:
          lane: ${{ matrix.config.lane }}
      - name: Cache Rust toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache audit indexes
        id: audit-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/advisory-db
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/audit.toml') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - name: Run cargo audit
        shell: bash
        run: |
          set -euo pipefail

          args=(--no-yanked)
          if [ "${{ steps.audit-cache.outputs.cache-hit }}" = "true" ]; then
            args+=(--no-fetch --stale)
          fi
          cargo audit "${args[@]}"

  # Single stable check name for branch-protection required-status,
  # regardless of which gated jobs skipped under it.
  ci-required:
    if: always()
    needs:
      - matrix-setup
      - changes
      - actionlint
      - audit
      - cargo-registry-warmup
      - fmt
      - dependency-policy
      - schema-check
      - file-size-gate
      - construct-e2e-image
      - test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/aggregate-needs
        with:
          needs-json: ${{ toJSON(needs) }}
          workflow-label: CI
      - name: Stage input-identical repository policy result
        if: >-
          needs.changes.outputs.rust == 'true' &&
          needs.changes.outputs.policy-reuse != 'true' &&
          (github.ref == 'refs/heads/main' ||
           github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          printf '%s\n' "source-sha=${GITHUB_SHA}" > ci-policy-result.txt
      - name: Publish input-identical repository policy result
        if: >-
          needs.changes.outputs.rust == 'true' &&
          needs.changes.outputs.policy-reuse != 'true' &&
          (github.ref == 'refs/heads/main' ||
           github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.changes.outputs.policy-result-name }}
          path: ci-policy-result.txt
          compression-level: 0
          retention-days: 1
