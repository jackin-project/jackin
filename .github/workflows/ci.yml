# NOTE: `preview.yml` triggers on `workflow_run.workflows: ["CI"]`,
# so the workflow name below is load-bearing. Renaming this file's
# `name:` field silently breaks the Homebrew preview publish chain.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      lanes:
        description: |
          Which runner(s) to run on. Default github; use both for parity runs.
        type: choice
        default: github
        options: [github, velnor, both]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  matrix-setup:
    name: Select runner lane
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.set.outputs.configs }}
    steps:
      - id: set
        env:
          LANES: ${{ github.event_name == 'workflow_dispatch' && inputs.lanes || 'github' }}
        run: |
          github='{"lane":"GitHub","runner":"\"ubuntu-24.04\""}'
          velnor='{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]"}'
          case "$LANES" in
            velnor) configs="[$velnor]" ;;
            both)   configs="[$github,$velnor]" ;;
            *)      configs="[$github]" ;;
          esac
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.dispatch.outputs.rust || steps.filter.outputs.rust }}
      construct: ${{ steps.dispatch.outputs.construct || steps.filter.outputs.construct }}
      construct_image: ${{ steps.dispatch.outputs.construct_image || steps.filter.outputs.construct_image }}
      workflows: ${{ steps.dispatch.outputs.workflows || steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Force rust=true construct=true on workflow_dispatch
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          {
            echo "rust=true"
            echo "construct=true"
            echo "construct_image=true"
            echo "workflows=true"
          } >> "$GITHUB_OUTPUT"

      # build.rs supplies compile-time version metadata and
      # docker/runtime/entrypoint.sh is include_str!'d by
      # src/derived_image.rs — both affect the produced binary even
      # though they live outside src/ and tests/.
      - name: Classify changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - '.cargo/**'
              - '.github/workflows/ci.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'mise.toml'
              - 'rust-toolchain.toml'
              - 'build.rs'
              - 'src/**'
              - 'crates/**'
              - 'tests/**'
              - 'docker/runtime/**'
            construct:
              - '.github/workflows/construct.yml'
              - 'docker-bake.hcl'
              - 'docker/construct/**'
              - 'crates/jackin-xtask/**'
              - 'mise.toml'
            construct_image:
              - 'docker/construct/**'
            workflows:
              - '.github/workflows/**'

  actionlint:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.workflows == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: actionlint (${{ matrix.config.lane }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "actionlint shellcheck"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - run: actionlint .github/workflows/*.yml

  fmt:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: cargo fmt (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: rustup component add rustfmt
      - run: cargo fmt --check

  schema-check:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: schema-check (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - name: Fetch base branch
        run: git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
      - run: cargo run -p jackin-xtask --locked -- schema-check --base origin/main

  check-all-features:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: cargo check all features (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: cargo check --workspace --all-targets --all-features --locked
  clippy:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: cargo clippy (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: rustup component add clippy
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
  dependency-policy:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: cargo dependency policy (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache mise cargo tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise/installs/cargo-*
          key: mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-deny-shear-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-deny-shear-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust cargo:cargo-deny cargo:cargo-shear"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: cargo shear
      - run: cargo deny check licenses bans sources

  check-default:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: cargo check default (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: cargo check --workspace --all-targets --locked
  construct-e2e-image:
    needs: changes
    if: needs.changes.outputs.construct_image == 'true'
    runs-on: ubuntu-latest
    name: construct E2E image
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # When docker/construct/** changes, the published construct:trixie image
      # on Docker Hub is stale for the lifetime of the PR — it is only
      # republished after merge to main. Build the construct image in its own
      # job and pass it to nextest as a Docker tar so the E2E tests use the
      # updated image rather than pulling the outdated one from the registry.
      - name: Set up Docker Buildx for E2E cache
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Expose GitHub Actions cache runtime
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - name: Build construct image for E2E
        run: |
          set -euo pipefail
          set -a && source docker/construct/versions.env && set +a
          docker buildx build \
            --cache-from type=registry,ref=projectjackin/construct:buildcache-amd64 \
            --cache-from type=gha,scope=construct-ci-e2e \
            --cache-to type=gha,scope=construct-ci-e2e,mode=max \
            --build-arg SHELLFIRM_VERSION="$SHELLFIRM_VERSION" \
            --build-arg TIRITH_VERSION="$TIRITH_VERSION" \
            --build-arg MISE_VERSION="$MISE_VERSION" \
            --output type=docker,dest=construct-trixie.tar \
            -t projectjackin/construct:trixie \
            docker/construct/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: construct-trixie-image
          path: construct-trixie.tar
          retention-days: 1

  test:
    needs: [changes, construct-e2e-image, matrix-setup]
    if: always() && needs.changes.outputs.rust == 'true' && !failure() && !cancelled()
    uses: ./.github/workflows/rust-nextest.yml
    with:
      runner-configs-json: ${{ needs.matrix-setup.outputs.configs }}
      all-features: true
      cache-shared-key: nextest-all-features-workspace-v1
      construct-image-changed: ${{ needs.changes.outputs.construct_image == 'true' }}
    secrets: inherit
  fuzz:
    needs: [changes, check-all-features, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: cargo fuzz (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache mise cargo tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise/installs/cargo-*
          key: mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-fuzz-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-fuzz-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust cargo:cargo-fuzz"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - name: Fuzz jackin-term parser path
        run: |
          cd crates/jackin-term
          cargo fuzz run --sanitizer none damage_grid_process -- -max_total_time=60
  bench-build:
    # One job builds both benches: the two matrix legs compiled the shared
    # dependency graph twice with two separate target caches (cache-quota
    # pressure -> eviction churn). bench-build also no longer waits on
    # check-all-features — they validate independently.
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: cargo bench build (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: |
          cargo build --bench console_frame -p jackin
          cargo build --bench pane_body -p jackin-capsule
  msrv:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    # Verify that the crate still builds on its declared MSRV
    # (`rust-version` in Cargo.toml). This is independent of the toolchain
    # pin in rust-toolchain.toml, which tracks the latest tested stable
    # used for day-to-day builds.
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: cargo msrv check (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "version=$(sed -n 's/^rust-version = \"\(.*\)\"/\1/p' Cargo.toml)" >> "$GITHUB_OUTPUT"
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ steps.msrv.outputs.version }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust@${{ steps.msrv.outputs.version }}"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - name: cargo check on MSRV
        run: cargo check --workspace --all-targets --locked
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}
  audit:
    # Advisories are also covered daily by hygiene.yml (cargo deny check
    # advisories); in PR CI the audit only needs to run when the dependency
    # graph can change (the rust filter includes Cargo.lock).
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    name: cargo audit (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache audit indexes
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/advisory-db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/audit.toml') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-
      - name: Cache mise cargo tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise/installs/cargo-*
          key: mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-audit-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-audit-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust cargo:cargo-audit"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: cargo audit

  build-validator:
    needs: [changes, check-all-features]
    # Run on push-to-main when Rust inputs change, and on any
    # workflow_dispatch so a maintainer can re-build the validator
    # artifacts on demand without waiting for a Rust-touching push.
    if: >-
      (github.event_name == 'push' &&
       github.ref == 'refs/heads/main' &&
       needs.changes.outputs.rust == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: cargo build validator
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            zigbuild: true
          - target: aarch64-unknown-linux-gnu
            zigbuild: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache mise cargo tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise/installs/cargo-*
          key: mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-zigbuild-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-zigbuild-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "${{ matrix.zigbuild && 'rust zig cargo:cargo-zigbuild' || 'rust' }}"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ github.job }}-${{ matrix.target }}
          cache-all-crates: "true"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: rustup target add ${{ matrix.target }}
      - name: Build validator (${{ matrix.target }})
        run: cargo zigbuild --release --locked --bin jackin-role --target ${{ matrix.target }}.2.17
      - name: Package validator
        run: |
          archive="jackin-role-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" jackin-role
          sha256sum "$archive" > "$archive.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jackin-role-${{ matrix.target }}
          path: |
            jackin-role-${{ matrix.target }}.tar.gz
            jackin-role-${{ matrix.target }}.tar.gz.sha256
          retention-days: 7

  # Single stable check name for branch-protection required-status,
  # regardless of which gated jobs skipped under it.
  ci-required:
    if: always()
    needs:
      - matrix-setup
      - changes
      - actionlint
      - audit
      - fmt
      - check-all-features
      - clippy
      - dependency-policy
      - check-default
      - construct-e2e-image
      - test
      - fuzz
      - bench-build
      - msrv
      - build-validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/aggregate-needs
        with:
          needs-json: ${{ toJSON(needs) }}
          workflow-label: CI
