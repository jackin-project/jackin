# NOTE: `preview.yml` gates its publish step on the latest successful
# push run for this workflow name and source SHA. Renaming this file's
# `name:` field silently breaks the Homebrew preview publish chain.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      lanes:
        description: |
          Which runner(s) to run on. Default github; use both for parity runs.
        type: choice
        default: github
        options: [github, velnor, both]

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  matrix-setup:
    name: Select runner lane
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      configs: ${{ steps.set.outputs.configs }}
    steps:
      - id: set
        env:
          LANES: ${{ github.event_name == 'workflow_dispatch' && inputs.lanes || 'github' }}
        run: |
          github='{"lane":"GitHub","runner":"\"ubuntu-24.04\"","runner_os":"Linux","runner_arch":"X64"}'
          velnor='{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]","runner_os":"Linux","runner_arch":"X64"}'
          case "$LANES" in
            velnor) configs="[$velnor]" ;;
            both)   configs="[$github,$velnor]" ;;
            *)      configs="[$github]" ;;
          esac
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      rust: ${{ steps.route.outputs.rust }}
      construct: ${{ steps.route.outputs.construct }}
      construct_image: ${{ steps.route.outputs.construct_image }}
      docker_e2e: ${{ steps.route.outputs.docker_e2e }}
      workflows: ${{ steps.route.outputs.workflows }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Force rust=true construct=true on workflow_dispatch
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          {
            echo "rust=true"
            echo "construct=true"
            echo "construct_image=true"
            echo "docker_e2e=true"
            echo "workflows=true"
          } >> "$GITHUB_OUTPUT"

      # build.rs supplies compile-time version metadata and
      # docker/runtime/entrypoint.sh is include_str!'d by
      # src/derived_image.rs — both affect the produced binary even
      # though they live outside src/ and tests/.
      - name: Classify changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - '.cargo/**'
              - '.github/workflows/ci.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'rust-toolchain.toml'
              - 'build.rs'
              - 'src/**'
              - 'crates/**'
              - 'tests/**'
              - 'docker/runtime/**'
            construct:
              - '.github/workflows/construct.yml'
              - 'docker-bake.hcl'
              - 'docker/construct/**'
              - 'crates/jackin-xtask/**'
            construct_image:
              - 'docker/construct/**'
            docker_e2e:
              - '.config/nextest.toml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/rust-nextest.yml'
              - 'docker/**'
              - 'crates/jackin/tests/dind_e2e.rs'
              - 'crates/jackin/tests/fixtures/**'
              - 'crates/jackin/src/runtime.rs'
              - 'crates/jackin/src/app/**'
              - 'crates/jackin/src/cli/role.rs'
              - 'crates/jackin/src/cli/prewarm.rs'
              - 'crates/jackin/src/docker_client/**'
              - 'crates/jackin/src/repo_contract/**'
              - 'crates/jackin-capsule/**'
              - 'crates/jackin-docker/**'
              - 'crates/jackin-image/**'
              - 'crates/jackin-launch/**'
              - 'crates/jackin-runtime/**'
            workflows:
              - '.github/workflows/**'
            mise:
              - 'mise.toml'

      - name: Route changed paths
        id: route
        shell: bash
        env:
          FORCE_RUST: ${{ steps.dispatch.outputs.rust }}
          FORCE_CONSTRUCT: ${{ steps.dispatch.outputs.construct }}
          FORCE_CONSTRUCT_IMAGE: ${{ steps.dispatch.outputs.construct_image }}
          FORCE_DOCKER_E2E: ${{ steps.dispatch.outputs.docker_e2e }}
          FORCE_WORKFLOWS: ${{ steps.dispatch.outputs.workflows }}
          FILTER_RUST: ${{ steps.filter.outputs.rust }}
          FILTER_CONSTRUCT: ${{ steps.filter.outputs.construct }}
          FILTER_CONSTRUCT_IMAGE: ${{ steps.filter.outputs.construct_image }}
          FILTER_DOCKER_E2E: ${{ steps.filter.outputs.docker_e2e }}
          FILTER_WORKFLOWS: ${{ steps.filter.outputs.workflows }}
          FILTER_MISE: ${{ steps.filter.outputs.mise }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          rust="${FORCE_RUST:-${FILTER_RUST:-false}}"
          construct="${FORCE_CONSTRUCT:-${FILTER_CONSTRUCT:-false}}"
          construct_image="${FORCE_CONSTRUCT_IMAGE:-${FILTER_CONSTRUCT_IMAGE:-false}}"
          docker_e2e="${FORCE_DOCKER_E2E:-${FILTER_DOCKER_E2E:-false}}"
          workflows="${FORCE_WORKFLOWS:-${FILTER_WORKFLOWS:-false}}"

          if [ "$docker_e2e" = "true" ] || [ "$construct_image" = "true" ]; then
            rust=true
            docker_e2e=true
          fi

          if [ "${FILTER_MISE:-false}" = "true" ] && [ -z "${FORCE_RUST:-}" ]; then
            base=""
            if [ -n "$BASE_REF" ]; then
              git fetch --no-tags origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
              base=$(git merge-base HEAD "refs/remotes/origin/$BASE_REF")
            elif [ -n "$BEFORE_SHA" ] && ! [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
              base="$BEFORE_SHA"
            elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              base="HEAD^"
            fi

            if [ -z "$base" ] || ! git cat-file -e "$base:mise.toml" 2>/dev/null; then
              rust=true
            else
              git show "$base:mise.toml" > "$RUNNER_TEMP/mise-base.toml"
              awk '
                function keep(name) {
                  return name == "zig" ||
                    name == "cargo-audit" ||
                    name == "cargo-deny" ||
                    name == "cargo-fuzz" ||
                    name == "cargo-hack" ||
                    name == "cargo-nextest" ||
                    name == "cargo-shear" ||
                    name == "cargo-zigbuild"
                }
                /^\[tools\]$/ { section = "tools"; next }
                /^\[tool_alias\]$/ { section = "tool_alias"; next }
                /^\[tools\./ {
                  section = $0
                  sub(/^\[tools\./, "", section)
                  sub(/\]$/, "", section)
                  next
                }
                /^\[/ { section = ""; next }
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
                {
                  key = $1
                  sub(/[[:space:]]*=.*/, "", key)
                  gsub(/"/, "", key)
                  if (section == "tools" && keep(key)) print section "." key "=" $0
                  else if (section == "tool_alias" && keep(key)) print section "." key "=" $0
                  else if (keep(section)) print "tools." section "." $0
                }
              ' "$RUNNER_TEMP/mise-base.toml" > "$RUNNER_TEMP/mise-base-rust.txt"
              awk '
                function keep(name) {
                  return name == "zig" ||
                    name == "cargo-audit" ||
                    name == "cargo-deny" ||
                    name == "cargo-fuzz" ||
                    name == "cargo-hack" ||
                    name == "cargo-nextest" ||
                    name == "cargo-shear" ||
                    name == "cargo-zigbuild"
                }
                /^\[tools\]$/ { section = "tools"; next }
                /^\[tool_alias\]$/ { section = "tool_alias"; next }
                /^\[tools\./ {
                  section = $0
                  sub(/^\[tools\./, "", section)
                  sub(/\]$/, "", section)
                  next
                }
                /^\[/ { section = ""; next }
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
                {
                  key = $1
                  sub(/[[:space:]]*=.*/, "", key)
                  gsub(/"/, "", key)
                  if (section == "tools" && keep(key)) print section "." key "=" $0
                  else if (section == "tool_alias" && keep(key)) print section "." key "=" $0
                  else if (keep(section)) print "tools." section "." $0
                }
              ' mise.toml > "$RUNNER_TEMP/mise-head-rust.txt"

              if ! cmp -s "$RUNNER_TEMP/mise-base-rust.txt" "$RUNNER_TEMP/mise-head-rust.txt"; then
                rust=true
              fi
            fi
          fi

          {
            echo "rust=$rust"
            echo "construct=$construct"
            echo "construct_image=$construct_image"
            echo "docker_e2e=$docker_e2e"
            echo "workflows=$workflows"
          } >> "$GITHUB_OUTPUT"

  actionlint:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.workflows == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: actionlint (${{ matrix.config.lane }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "actionlint shellcheck"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - run: actionlint .github/workflows/*.yml

  fmt:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo fmt (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - run: rustup component add rustfmt
      - run: cargo fmt --check

  cargo-registry-warmup:
    needs: [changes, matrix-setup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo registry warmup (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry

  schema-check:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: schema-check (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: ${{ runner.arch == 'X64' && 'rust shellfirm' || 'rust' }}
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-default-dev-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - name: Fetch base branch
        run: git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
      - run: cargo run -p jackin-xtask --locked -- schema-check --base origin/main

  clippy:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo clippy (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_OFFLINE: "true"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-all-features-dev-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: rustup component add clippy
      - run: cargo clippy --timings --workspace --all-targets --all-features --locked -- -D warnings
      - name: Upload cargo timings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-timings-clippy-${{ matrix.config.lane }}
          path: target/cargo-timings/*.html
          if-no-files-found: ignore
          retention-days: 7
  dependency-policy:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo dependency policy (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust cargo-deny cargo-shear"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - run: cargo shear
      - run: cargo deny check licenses bans sources

  check-default:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo check default (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust sccache shellfirm"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-default-dev-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: cargo check --timings --workspace --all-targets --locked
      - name: Upload cargo timings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-timings-check-default-${{ matrix.config.lane }}
          path: target/cargo-timings/*.html
          if-no-files-found: ignore
          retention-days: 7
      - name: Write sccache stats
        if: always() && matrix.config.lane == 'Velnor'
        run: |
          if ! command -v sccache >/dev/null 2>&1; then
            echo "sccache not installed; skipping stats"
            exit 0
          fi
          stats_file="sccache-stats-ci-check-default-${{ matrix.config.lane }}.txt"
          sccache --show-stats | tee "$stats_file"
          {
            echo "### sccache ci check-default (${{ matrix.config.lane }})"
            echo '```text'
            cat "$stats_file"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload sccache stats
        if: always() && matrix.config.lane == 'Velnor'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sccache-stats-ci-check-default-${{ matrix.config.lane }}
          path: sccache-stats-ci-check-default-${{ matrix.config.lane }}.txt
          if-no-files-found: ignore
          retention-days: 7
  construct-e2e-image:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.construct_image == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: construct E2E image (${{ matrix.config.lane }})
    env:
      BUILDX_BUILDER: jackin-construct
      CARGO_NET_OFFLINE: "true"
      CARGO_TERM_COLOR: always
      LOCAL_REGISTRY_IMAGE: projectjackin/construct
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_GHA_ENABLED: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # When docker/construct/** changes, the published construct:trixie image
      # on Docker Hub is stale for the lifetime of the PR — it is only
      # republished after merge to main. Build the construct image in its own
      # job and pass it to nextest as a Docker tar so the E2E tests use the
      # updated image rather than pulling the outdated one from the registry.
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust sccache"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: construct-e2e-image-${{ matrix.config.lane }}-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTC_WRAPPER RUSTFLAGS RUSTDOC RUSTUP"
      - name: Set up Docker Buildx for E2E cache
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          name: ${{ env.BUILDX_BUILDER }}
      - name: Expose GitHub Actions cache runtime
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - name: Resolve construct tool versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          source docker/construct/versions.env
          echo "shellfirm-version=${SHELLFIRM_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Restore prebuilt shellfirm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: docker/construct/prebuilt
          key: shellfirm-${{ runner.os }}-${{ runner.arch }}-${{ steps.versions.outputs.shellfirm-version }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Build construct image for E2E
        env:
          CACHE_FROM: |
            type=registry,ref=projectjackin/construct:buildcache-amd64
            type=gha,scope=construct-ci-e2e,repository=${{ github.repository }},ghtoken=${{ github.token }}
          CACHE_TO: type=gha,scope=construct-ci-e2e,repository=${{ github.repository }},ghtoken=${{ github.token }},mode=max
        run: |
          set -euo pipefail
          cargo xtask construct build-platform amd64
          docker save --output construct-trixie.tar projectjackin/construct:trixie
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: construct-trixie-image-${{ matrix.config.lane }}
          path: construct-trixie.tar
          retention-days: 1

  test:
    needs: [changes, construct-e2e-image, matrix-setup, cargo-registry-warmup]
    if: always() && needs.changes.outputs.rust == 'true' && !failure() && !cancelled()
    uses: ./.github/workflows/rust-nextest.yml
    with:
      runner-configs-json: ${{ needs.matrix-setup.outputs.configs }}
      all-features: true
      cache-shared-key: ci-all-features-dev-workspace-v2
      construct-image-changed: ${{ needs.changes.outputs.construct_image == 'true' }}
      docker-e2e: ${{ needs.changes.outputs.docker_e2e == 'true' }}
    secrets: inherit
  fuzz:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo fuzz (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust cargo-fuzz"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-fuzz-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - name: Fuzz jackin-term parser path
        run: |
          cd crates/jackin-term
          cargo fetch --locked --offline
          cargo fuzz run --sanitizer none --target x86_64-unknown-linux-gnu damage_grid_process -- -max_total_time=60
  bench-build:
    # One job builds both benches: the two matrix legs compiled the shared
    # dependency graph twice with two separate target caches (cache-quota
    # pressure -> eviction churn). bench-build validates independently
    # from the clippy-owned all-features compile gate.
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo bench build (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-all-features-dev-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - run: |
          cargo build --bench console_frame -p jackin
          cargo build --bench pane_body -p jackin-capsule
  msrv:
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    # Verify that the crate still builds on its declared MSRV
    # (`rust-version` in Cargo.toml). This is independent of the toolchain
    # pin in rust-toolchain.toml, which tracks the latest tested stable
    # used for day-to-day builds.
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo msrv check (${{ matrix.config.lane }})
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "version=$(sed -n 's/^rust-version = \"\(.*\)\"/\1/p' Cargo.toml)" >> "$GITHUB_OUTPUT"
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ steps.msrv.outputs.version }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust@${{ steps.msrv.outputs.version }}"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ci-msrv-default-dev-workspace-v2
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          env-vars: "CARGO CC CFLAGS CXX CMAKE RUSTFLAGS RUSTDOC RUSTUP"
          # No branch in the cache key: GitHub isolates branch caches, so every
          # PR/branch/release reads the default branch's warm cache via fallback,
          # and each branch also writes its own small pruned (deps-only) cache so
          # reruns skip recompiling unchanged dependencies.
      - name: cargo check on MSRV
        run: cargo check --workspace --all-targets --locked
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}
  audit:
    # Advisories are also covered daily by hygiene.yml (cargo deny check
    # advisories); in PR CI the audit only needs to run when the dependency
    # graph can change (the rust filter includes Cargo.lock).
    needs: [changes, matrix-setup, cargo-registry-warmup]
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    timeout-minutes: 60
    name: cargo audit (${{ matrix.config.lane }})
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache audit indexes
        id: audit-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/advisory-db
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/audit.toml') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.11"
          cache_key_prefix: "mise-v2"
          install_args: "rust cargo-audit"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - id: cargo-registry-cache
        uses: ./.github/actions/cache-cargo-registry
      - name: Run cargo audit
        shell: bash
        run: |
          set -euo pipefail

          args=(--no-yanked)
          if [ "${{ steps.audit-cache.outputs.cache-hit }}" = "true" ]; then
            args+=(--no-fetch --stale)
          fi
          cargo audit "${args[@]}"

  # Single stable check name for branch-protection required-status,
  # regardless of which gated jobs skipped under it.
  ci-required:
    if: always()
    needs:
      - matrix-setup
      - changes
      - actionlint
      - audit
      - cargo-registry-warmup
      - fmt
      - clippy
      - dependency-policy
      - check-default
      - construct-e2e-image
      - test
      - fuzz
      - bench-build
      - msrv
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/aggregate-needs
        with:
          needs-json: ${{ toJSON(needs) }}
          workflow-label: CI

  timing-summary:
    if: always()
    needs: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Write workflow timing summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/ci/workflow-timing-summary.sh CI
