name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'

permissions:
  contents: read

env:
  DOCS_SITE_URL: https://jackin.tailrocks.com
  JACKIN_REPO_BLOB_URL: https://github.com/jackin-project/jackin/blob/main
  JACKIN_REPO_EDIT_URL: https://github.com/jackin-project/jackin/edit/main
  # TODO(lychee-action-sha-pin): swap the lycheeverse/lychee-action SHA back
  # to a tagged release SHA once a tag at or after faea714 ships — see
  # TODO.md "Follow-ups" → "lychee-action-sha-pin".
  #
  # Pinned past lychee-action's v0.23.0 default because v0.24.x is the first
  # release that extracts <loc> URLs from XML sitemaps (lycheeverse/lychee#2071).
  # The deploy and check-deployed jobs need that to feed
  # `--files-from lychee/deployed-pages.txt`.
  LYCHEE_VERSION: 'v0.24.2'

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Schedule (cron) runs only `check-deployed` (line ~210) by design —
  # all other jobs gate themselves out on `event_name != 'schedule'`.
  # The cron path verifies live deployed-site links; it has nothing to
  # validate against the source tree at schedule time.
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.dispatch.outputs.docs || steps.filter.outputs.docs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Force docs=true on workflow_dispatch
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: echo "docs=true" >> "$GITHUB_OUTPUT"

      - name: Classify changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            docs:
              - '.github/workflows/docs.yml'
              - 'docs/**'

  # The docs site links to repository files via the <RepoFile path="…" />
  # component, which renders a `blob/main` URL that lychee remaps to the
  # PR checkout. A source-only PR that renames or deletes a referenced
  # file (for example src/runtime/launch.rs) would not match the docs
  # path filter and would silently merge with broken links. Run a cheap
  # standalone repo-link check on every non-schedule event so source
  # renames cannot bypass the docs link contract documented in
  # docs/AGENTS.md.
  repo-link-check:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          working_directory: docs
          install: true

      - name: Install dependencies
        working-directory: docs
        run: mise exec -- bun install --frozen-lockfile

      - name: Check source repository links
        working-directory: docs
        run: mise exec -- bun run check:repo-links

  docs-link-check:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          working_directory: docs
          install: true

      - name: Install dependencies
        working-directory: docs
        run: mise exec -- bun install --frozen-lockfile

      - name: Build site
        working-directory: docs
        run: mise exec -- bun run build

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ hashFiles('docs/lychee.toml') }}
          restore-keys: |
            lychee-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-
            lychee-${{ runner.os }}-${{ github.workflow }}-

      - name: Check built site links
        uses: lycheeverse/lychee-action@faea714062690f6c2e6f7f388469ec4fa6d9c4e1 # master, post-v2.8.0 (subfolder-aware install)
        with:
          lycheeVersion: ${{ env.LYCHEE_VERSION }}
          args: >-
            --config docs/lychee.toml
            --include-fragments
            --remap
            "${{ env.DOCS_SITE_URL }}/(.*) file://${{ github.workspace }}/docs/dist/\$1"
            --remap
            "${{ env.JACKIN_REPO_EDIT_URL }}/(.*) file://${{ github.workspace }}/\$1"
            --remap
            "${{ env.JACKIN_REPO_BLOB_URL }}/(.*) file://${{ github.workspace }}/\$1"
            --root-dir ${{ github.workspace }}/docs/dist
            docs/dist/**/*.html
          fail: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload artifact
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/dist

  deploy:
    # docs-link-check covers full-site lychee + Astro build; repo-link-check
    # covers <RepoFile /> path validity. Both must pass before publishing.
    needs: [docs-link-check, repo-link-check]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: lychee-deployed-${{ runner.os }}-${{ hashFiles('docs/lychee.toml') }}
          restore-keys: |
            lychee-deployed-${{ runner.os }}-
            lychee-${{ runner.os }}-${{ github.workflow }}-

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Prepare deployed link check
        run: mkdir -p lychee

      - name: Collect deployed docs URLs
        uses: lycheeverse/lychee-action@faea714062690f6c2e6f7f388469ec4fa6d9c4e1 # master, post-v2.8.0 (subfolder-aware install)
        with:
          lycheeVersion: ${{ env.LYCHEE_VERSION }}
          output: lychee/deployed-pages.txt
          args: >-
            --dump
            ${{ steps.deployment.outputs.page_url }}sitemap-0.xml
          fail: true

      - name: Check deployed docs links
        uses: lycheeverse/lychee-action@faea714062690f6c2e6f7f388469ec4fa6d9c4e1 # master, post-v2.8.0 (subfolder-aware install)
        with:
          lycheeVersion: ${{ env.LYCHEE_VERSION }}
          args: >-
            --config docs/lychee.toml
            --include-fragments
            --remap
            "${{ env.JACKIN_REPO_EDIT_URL }}/(.*) file://${{ github.workspace }}/\$1"
            --remap
            "${{ env.JACKIN_REPO_BLOB_URL }}/(.*) file://${{ github.workspace }}/\$1"
            --files-from lychee/deployed-pages.txt
          fail: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

  check-deployed:
    # Schedule fires daily; workflow_dispatch from non-main branches lets a
    # maintainer verify the live site without redeploying. Manual dispatch
    # from main is excluded because the deploy job already verifies the
    # just-deployed site, and running both in parallel would race against
    # the publish window.
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: lychee-deployed-${{ runner.os }}-${{ hashFiles('docs/lychee.toml') }}
          restore-keys: |
            lychee-deployed-${{ runner.os }}-
            lychee-${{ runner.os }}-${{ github.workflow }}-

      - name: Prepare deployed link check
        run: mkdir -p lychee

      - name: Collect deployed docs URLs
        uses: lycheeverse/lychee-action@faea714062690f6c2e6f7f388469ec4fa6d9c4e1 # master, post-v2.8.0 (subfolder-aware install)
        with:
          lycheeVersion: ${{ env.LYCHEE_VERSION }}
          output: lychee/deployed-pages.txt
          args: >-
            --dump
            ${{ env.DOCS_SITE_URL }}/sitemap-0.xml
          fail: true

      - name: Check deployed docs links
        uses: lycheeverse/lychee-action@faea714062690f6c2e6f7f388469ec4fa6d9c4e1 # master, post-v2.8.0 (subfolder-aware install)
        with:
          lycheeVersion: ${{ env.LYCHEE_VERSION }}
          args: >-
            --config docs/lychee.toml
            --include-fragments
            --remap
            "${{ env.JACKIN_REPO_EDIT_URL }}/(.*) file://${{ github.workspace }}/\$1"
            --remap
            "${{ env.JACKIN_REPO_BLOB_URL }}/(.*) file://${{ github.workspace }}/\$1"
            --files-from lychee/deployed-pages.txt
          fail: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
