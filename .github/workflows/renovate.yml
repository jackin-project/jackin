name: Renovate

on:
  merge_group:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache Renovate repository cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/renovate/cache
          key: renovate-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            renovate-${{ runner.os }}-

      - name: Prepare renovate cache dir
        # actions/cache restores /tmp/renovate owned by the runner user;
        # the renovate container user then can't mkdir /tmp/renovate/repos.
        run: |
          sudo mkdir -p /tmp/renovate/repos /tmp/renovate/cache
          sudo chmod -R 0777 /tmp/renovate

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
          RENOVATE_REPOSITORY_CACHE: enabled
          # Pin the git author identity so the DCO sign-off trailer in
          # renovate.json::commitBody always matches the commit-author
          # email. DCO-2 requires the Signed-off-by email to equal the
          # commit-author email; without this pin, a change in Renovate's
          # default author would silently break DCO on every Renovate PR.
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@whitesourcesoftware.com>"
          LOG_LEVEL: debug

      - name: Fix Renovate cache ownership for save
        if: always()
        run: sudo chown -R "$(whoami)" /tmp/renovate 2>/dev/null || true
