name: Renovate Validate

# Verify the upstream sources the Renovate `customManagers` point at
# still resolve and still list the expected package names. Renovate's
# `github-releases` datasource can otherwise look like "no updates
# available", so a renamed upstream repository would silently re-introduce
# version drift. The mise check is independent of Renovate now because the
# construct installs it unpinned from the official rolling apt repository.
#
# Schema validation is intentionally omitted here: the renovate
# config-validator npm package's behavior across versions has been
# unstable enough on `customManagers.managerFilePatterns` that running
# it in CI produced false negatives (rejecting a config the live
# Renovate bot accepts). The bot validates the file every time it
# runs against the repo, so a real schema break would still surface
# on the next Renovate dependency-dashboard cycle.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate-validate-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # No checkout: the assertion runs `curl` against an external URL and
      # reads no repo files.
      - name: Verify mise apt source resolves and lists the mise package
        shell: bash
        run: |
          set -euo pipefail
          for arch in amd64 arm64; do
            url="https://mise.en.dev/deb/dists/stable/main/binary-${arch}/Packages"
            if ! body=$(curl -fsSL --max-time 30 "$url" 2>&1); then
              echo "::error::failed to fetch ${url}: ${body}"
              exit 1
            fi
            if ! grep -q '^Package: mise$' <<<"$body"; then
              echo "::error::${url} did not list a 'Package: mise' entry"
              exit 1
            fi
          done
