name: Renovate Validate

# Verify the upstream sources the Renovate `customManagers` point at
# still resolve and still list the expected package names. Renovate's
# `github-releases` datasource can otherwise look like "no updates
# available", so a renamed upstream package would silently re-introduce
# version drift. The mise check also verifies the pinned version still exists
# for both construct architectures.
#
# Schema validation is intentionally omitted here: the renovate
# config-validator npm package's behavior across versions has been
# unstable enough on `customManagers.managerFilePatterns` that running
# it in CI produced false negatives (rejecting a config the live
# Renovate bot accepts). The bot validates the file every time it
# runs against the repo, so a real schema break would still surface
# on the next Renovate dependency-dashboard cycle.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate-validate-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ${{ fromJSON('["self-hosted","velnor-target-mvp"]') }}
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Verify the pinned mise release ships both construct architectures
        shell: bash
        run: |
          set -euo pipefail
          source docker/construct/versions.env
          if [ -z "${MISE_VERSION:-}" ]; then
            echo "::error::MISE_VERSION is empty"
            exit 1
          fi
          # The standalone installer (https://mise.run) the construct
          # Dockerfile pipes to `sh` downloads these exact release assets.
          for arch in x64 arm64; do
            url="https://github.com/jdx/mise/releases/download/v${MISE_VERSION}/mise-v${MISE_VERSION}-linux-${arch}.tar.gz"
            if ! curl -fsSLI --max-time 30 -o /dev/null "$url"; then
              echo "::error::${url} did not resolve — mise v${MISE_VERSION} is missing the linux-${arch} release asset"
              exit 1
            fi
          done
