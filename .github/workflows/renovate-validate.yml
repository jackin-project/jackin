name: Renovate Validate

# Verify the upstream sources the Renovate `customManagers` point at
# still resolve and still list the expected package names. Renovate's
# `deb` and `github-releases` datasources fail silently — they just
# return "no updates available" — so a URL that 404s or a renamed
# upstream package would silently re-introduce the version drift the
# PR's customManagers were added to prevent.
#
# Schema validation is intentionally omitted here: the renovate
# config-validator npm package's behavior across versions has been
# unstable enough on `customManagers.managerFilePatterns` that running
# it in CI produced false negatives (rejecting a config the live
# Renovate bot accepts). The bot validates the file every time it
# runs against the repo, so a real schema break would still surface
# on the next Renovate dependency-dashboard cycle.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate-validate-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # No checkout: the only assertion runs `curl` against an
      # external URL and reads no repo files.
      - name: Verify mise apt source resolves and lists the mise package
        shell: bash
        run: |
          set -euo pipefail
          url="https://mise.jdx.dev/deb/dists/stable/main/binary-amd64/Packages"
          if ! body=$(curl -fsSL --max-time 30 "$url" 2>&1); then
            echo "::error::failed to fetch ${url}: ${body}"
            exit 1
          fi
          if ! printf '%s\n' "$body" | grep -q '^Package: mise$'; then
            echo "::error::${url} did not list a 'Package: mise' entry — the MISE renovate manager will silently produce no updates"
            exit 1
          fi
