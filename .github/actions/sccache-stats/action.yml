name: sccache stats
description: Write sccache stats to the step summary and upload the raw output.

inputs:
  artifact-name:
    description: Uploaded artifact name and stats filename prefix.
    required: true
  heading:
    description: Step summary heading.
    required: false
    default: ""
  retention-days:
    description: Artifact retention in days.
    required: false
    default: "7"

runs:
  using: composite
  steps:
    - name: Write sccache stats
      shell: bash
      env:
        SCCACHE_STATS_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        SCCACHE_STATS_HEADING: ${{ inputs.heading }}
      run: |
        set -euo pipefail

        stats_file="${SCCACHE_STATS_ARTIFACT_NAME}.txt"
        if ! command -v sccache >/dev/null 2>&1; then
          echo "sccache not installed; skipping stats" | tee "$stats_file"
        else
          sccache --show-stats | tee "$stats_file"
        fi
        {
          echo "### ${SCCACHE_STATS_HEADING:-$SCCACHE_STATS_ARTIFACT_NAME}"
          echo '```text'
          cat "$stats_file"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload sccache stats
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-name }}.txt
        if-no-files-found: ignore
        retention-days: ${{ inputs.retention-days }}
