name: Configure sccache
description: Configure a scoped GitHub Actions sccache backend for a Rust build.
inputs:
  scope:
    description: Stable cache namespace for the runner and target ABI.
    required: true
  write:
    description: Whether this run may populate the cache.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Export GitHub Actions cache credentials
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Select sccache mode
      shell: bash
      env:
        SCCACHE_SCOPE: ${{ inputs.scope }}
        SCCACHE_WRITE: ${{ inputs.write }}
      run: |
        set -euo pipefail

        case "$SCCACHE_WRITE" in
          true) mode=READ_WRITE ;;
          false) mode=READ_ONLY ;;
          *)
            echo "::error::unsupported sccache write value: $SCCACHE_WRITE"
            exit 1
            ;;
        esac

        key="sccache-v1-${SCCACHE_SCOPE}"
        {
          echo "SCCACHE_GHA_ENABLED=on"
          echo "SCCACHE_GHA_CACHE_TO=$key"
          echo "SCCACHE_GHA_CACHE_FROM=$key"
          echo "SCCACHE_GHA_RW_MODE=$mode"
        } >> "$GITHUB_ENV"
