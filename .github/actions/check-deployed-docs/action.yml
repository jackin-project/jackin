name: Check deployed docs links
description: |
  Dump the live sitemap into a URL list, and run a lychee link check
  against that list with the standard remap rules for github.com
  edit/blob URLs. Used by docs.yml's `verify-deployed` job (after
  publishing to GitHub Pages) and `check-deployed` job (scheduled live
  validation) to keep a single source of truth for the deployed
  link-check contract.
  No lychee cache is restored here — deployed checks always hit live
  URLs so that stale 503s from a previous run never poison the results.
inputs:
  sitemap-url:
    description: Absolute URL of the deployed sitemap.xml to dump.
    required: true
  edit-url:
    description: Base URL for `<RepoFile />` GitHub edit links to remap.
    required: true
  blob-url:
    description: Base URL for `<RepoFile />` GitHub blob links to remap.
    required: true
  github-token:
    description: Token forwarded to lychee so it can authenticate against the GitHub API for rate-limited URL checks.
    required: true
  external-links:
    description: Whether to check third-party links from deployed pages. Disable for post-deploy gating to avoid blocking releases on unrelated external outages.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    # Validate that the URL inputs match an http(s) shape with no
    # shell-special characters before they flow into the lychee
    # `--remap "<url>/(.*) …"` quoting. Today's two callers pass
    # workflow-env constants and actions/deploy-pages output, so the
    # check is forward-looking hardening — fail loud if a future caller
    # deviates.
    - name: Validate URL inputs
      shell: bash
      env:
        SITEMAP_URL: ${{ inputs.sitemap-url }}
        EDIT_URL: ${{ inputs.edit-url }}
        BLOB_URL: ${{ inputs.blob-url }}
      run: |
        set -euo pipefail
        url_re='^https?://[A-Za-z0-9._~:/?#@!$&'"'"'()*+,;=%-]+$'
        for name in SITEMAP_URL EDIT_URL BLOB_URL; do
          val="${!name}"
          if [[ ! "$val" =~ $url_re ]]; then
            echo "::error::check-deployed-docs: ${name} is not a plain http(s) URL: ${val}"
            exit 1
          fi
        done

    - name: Setup lychee via mise
      uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
      with:
        version: "2026.7.7"
        cache_key_prefix: "mise-v2"
        working_directory: docs
        install_args: "lychee"
        github_token: ${{ inputs.github-token }}

    - name: Prepare deployed link check
      shell: bash
      run: mkdir -p lychee

    - name: Wait for CDN propagation
      shell: bash
      run: sleep 10

    - name: Collect deployed docs URLs
      shell: bash
      run: |
        MISE_CONFIG_FILE=docs/mise.toml mise exec -- lychee --dump "${{ inputs.sitemap-url }}" > lychee/deployed-pages.txt

    - name: Check deployed docs links
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SITEMAP_URL: ${{ inputs.sitemap-url }}
        EXTERNAL_LINKS: ${{ inputs.external-links }}
      run: |
        set -euo pipefail

        check_links() {
          args=(
            --config docs/lychee.toml
            --cache=false
            --include-fragments
            --remap "${{ inputs.edit-url }}/(.*) file://${{ github.workspace }}/\$1"
            --remap "${{ inputs.blob-url }}/(.*) file://${{ github.workspace }}/\$1"
            --remap "https://github.com/jackin-project/jackin/issues https://api.github.com/repos/jackin-project/jackin/issues"
            --remap "https://github.com/([^/]+)/([^/]+)/blob/([^/]+)/(.*) https://api.github.com/repos/\$1/\$2/contents/\$4?ref=\$3"
            --remap "https://github.com/([^/]+)/([^/]+)/tree/([^/]+)/(.*) https://api.github.com/repos/\$1/\$2/contents/\$4?ref=\$3"
            --files-from lychee/deployed-pages.txt
          )

          if [[ "$EXTERNAL_LINKS" != "true" ]]; then
            site_origin="${SITEMAP_URL%/sitemap.xml}"
            site_origin_re="$(printf '%s' "$site_origin" | sed 's/[][\/.^$*+?{}()|]/\\&/g')"
            args+=(--include "^${site_origin_re}(/|$)|^file://")
          fi

          MISE_CONFIG_FILE=docs/mise.toml mise exec -- lychee \
            "${args[@]}"
        }

        for attempt in 1 2 3; do
          if check_links; then
            exit 0
          fi

          if [[ "$attempt" == "3" ]]; then
            break
          fi

          echo "::notice::deployed docs link check failed on attempt ${attempt}; retrying after 30 seconds"
          sleep 30
        done

        echo "::error::deployed docs link check failed after 3 attempts"
        exit 1
