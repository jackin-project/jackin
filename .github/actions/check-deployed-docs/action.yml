name: Check deployed docs links
description: |
  Cache-restore lychee, dump the live sitemap into a URL list, and run
  a lychee link check against that list with the standard remap rules
  for github.com edit/blob URLs. Used by docs.yml's `deploy` job (after
  publishing to GitHub Pages) and `check-deployed` job (scheduled live
  validation) to keep a single source of truth for the deployed
  link-check contract.
inputs:
  lychee-version:
    description: Pinned lychee version (must match docs.yml LYCHEE_VERSION).
    required: true
  sitemap-url:
    description: Absolute URL of the deployed sitemap-0.xml to dump.
    required: true
  edit-url:
    description: Base URL for `<RepoFile />` GitHub edit links to remap.
    required: true
  blob-url:
    description: Base URL for `<RepoFile />` GitHub blob links to remap.
    required: true
  github-token:
    description: Token forwarded to lychee so it can authenticate against the GitHub API for rate-limited URL checks.
    required: true
runs:
  using: composite
  steps:
    # Validate that the URL inputs match an http(s) shape with no
    # shell-special characters before they flow into the
    # lycheeverse/lychee-action `args:` block. lychee itself treats
    # them as URL prefixes / regex remap rules, but a future caller
    # passing an attacker-controlled value containing quotes or
    # backslashes could break the embedded `--remap "<url>/(.*) …"`
    # quoting. Today's two callers pass workflow-env constants and
    # actions/deploy-pages output, so the check is forward-looking
    # hardening — fail loud if a future caller deviates.
    - name: Validate URL inputs
      shell: bash
      env:
        SITEMAP_URL: ${{ inputs.sitemap-url }}
        EDIT_URL: ${{ inputs.edit-url }}
        BLOB_URL: ${{ inputs.blob-url }}
      run: |
        set -euo pipefail
        url_re='^https?://[A-Za-z0-9._~:/?#@!$&'"'"'()*+,;=%-]+$'
        for name in SITEMAP_URL EDIT_URL BLOB_URL; do
          val="${!name}"
          if [[ ! "$val" =~ $url_re ]]; then
            echo "::error::check-deployed-docs: ${name} is not a plain http(s) URL: ${val}"
            exit 1
          fi
        done

    - name: Restore lychee cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: .lycheecache
        key: lychee-deployed-${{ runner.os }}-${{ hashFiles('docs/lychee.toml') }}
        restore-keys: |
          lychee-deployed-${{ runner.os }}-
          lychee-${{ runner.os }}-${{ github.workflow }}-

    - name: Prepare deployed link check
      shell: bash
      run: mkdir -p lychee

    - name: Collect deployed docs URLs
      uses: lycheeverse/lychee-action@faea714062690f6c2e6f7f388469ec4fa6d9c4e1 # master, post-v2.8.0 (subfolder-aware install)
      with:
        lycheeVersion: ${{ inputs.lychee-version }}
        output: lychee/deployed-pages.txt
        args: >-
          --dump
          ${{ inputs.sitemap-url }}
        fail: true

    - name: Check deployed docs links
      uses: lycheeverse/lychee-action@faea714062690f6c2e6f7f388469ec4fa6d9c4e1 # master, post-v2.8.0 (subfolder-aware install)
      with:
        lycheeVersion: ${{ inputs.lychee-version }}
        args: >-
          --config docs/lychee.toml
          --include-fragments
          --remap
          "${{ inputs.edit-url }}/(.*) file://${{ github.workspace }}/\$1"
          --remap
          "${{ inputs.blob-url }}/(.*) file://${{ github.workspace }}/\$1"
          --files-from lychee/deployed-pages.txt
        fail: true
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
