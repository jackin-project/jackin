name: Restore CI xtask
description: Restore contract-keyed CI binaries from cache or the cross-ref artifact fallback.

outputs:
  tools-hit:
    description: Whether the requested Cargo tool bundle is available.
    value: ${{ steps.restore.outputs.tools-hit }}
  xtask-hit:
    description: Whether the requested jackin-xtask binary is available.
    value: ${{ steps.restore.outputs.xtask-hit }}

inputs:
  token:
    description: Token with Actions artifact read access.
    required: true
  lane:
    description: Runner lane that produced the binary.
    required: true
  tools-contract:
    description: Runner-independent tools artifact contract computed by the metadata job.
    required: false
    default: ""
  xtask-contract:
    description: Runner-independent xtask artifact contract computed by the metadata job.
    required: false
    default: ""
  fallback-xtask-contract:
    description: Exact xtask contract used when a specialized artifact is not available yet.
    required: false
    default: ""
  include-tools:
    description: Download the Cargo tool bundle in addition to jackin-xtask.
    required: false
    default: "true"
  include-xtask:
    description: Download jackin-xtask in addition to any requested Cargo tools.
    required: false
    default: "true"
  allow-miss:
    description: Return miss outputs instead of failing when preparation must build the artifacts.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Restore cached Cargo tools
      id: tools-cache
      if: inputs.include-tools == 'true'
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/.ci-prebuilt-tools
        key: ci-prepared-tools-v1-${{ runner.os }}-${{ runner.arch }}-${{ inputs.tools-contract }}
    - name: Restore cached CI xtask
      id: xtask-cache
      if: inputs.include-xtask == 'true'
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/.ci-prebuilt-xtask
        key: ci-prepared-xtask-v1-${{ runner.os }}-${{ runner.arch }}-${{ inputs.xtask-contract }}
    - name: Restore prepared CI tools
      id: restore
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9.0.0
      env:
        JACKIN_TOKEN: ${{ inputs.token }}
        JACKIN_REPOSITORY: ${{ github.repository }}
        JACKIN_RUN_ID: ${{ github.run_id }}
        JACKIN_WORKSPACE: ${{ github.workspace }}
        JACKIN_RUNNER_OS: ${{ runner.os }}
        JACKIN_RUNNER_ARCH: ${{ runner.arch }}
        JACKIN_LANE: ${{ inputs.lane }}
        JACKIN_TOOLS_CONTRACT: ${{ inputs.tools-contract }}
        JACKIN_XTASK_CONTRACT: ${{ inputs.xtask-contract }}
        JACKIN_FALLBACK_XTASK_CONTRACT: ${{ inputs.fallback-xtask-contract }}
        JACKIN_INCLUDE_TOOLS: ${{ inputs.include-tools }}
        JACKIN_INCLUDE_XTASK: ${{ inputs.include-xtask }}
        JACKIN_TOOLS_CACHE_HIT: ${{ steps.tools-cache.outputs.cache-hit }}
        JACKIN_XTASK_CACHE_HIT: ${{ steps.xtask-cache.outputs.cache-hit }}
        JACKIN_ALLOW_MISS: ${{ inputs.allow-miss }}
        JACKIN_ACTION_RUNTIME: ${{ github.action_path }}/runtime/dist/index.js
      with:
        github-token: ${{ inputs.token }}
        script: return await import(process.env.JACKIN_ACTION_RUNTIME).then(({ main }) => main())
    - name: Cache restored Cargo tools
      if: >-
        inputs.include-tools == 'true' &&
        steps.tools-cache.outputs.cache-hit != 'true' &&
        steps.restore.outputs.tools-hit == 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/.ci-prebuilt-tools
        key: ci-prepared-tools-v1-${{ runner.os }}-${{ runner.arch }}-${{ inputs.tools-contract }}
    - name: Cache restored CI xtask
      if: >-
        inputs.include-xtask == 'true' &&
        steps.xtask-cache.outputs.cache-hit != 'true' &&
        steps.restore.outputs.xtask-hit == 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/.ci-prebuilt-xtask
        key: ci-prepared-xtask-v1-${{ runner.os }}-${{ runner.arch }}-${{ inputs.xtask-contract }}
