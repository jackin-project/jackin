name: Download CI xtask
description: Restore the lane-scoped jackin-xtask binary prepared once by CI.

inputs:
  lane:
    description: Runner lane that produced the binary.
    required: true
  tools-contract:
    description: Runner-independent tools artifact contract computed by the metadata job.
    required: false
    default: ""
  xtask-contract:
    description: Runner-independent xtask artifact contract computed by the metadata job.
    required: false
    default: ""
  include-tools:
    description: Download the Cargo tool bundle in addition to jackin-xtask.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Download prepared xtask
      shell: bash
      env:
        ARTIFACT_NAME: ci-xtask-${{ inputs.lane }}
        ARTIFACT_PATH: ${{ github.workspace }}/.ci-tools/${{ inputs.lane }}
        GH_TOKEN: ${{ github.token }}
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        TOOLS_ARTIFACT_NAME: ci-tools-${{ runner.os }}-${{ runner.arch }}-${{ inputs.tools-contract || hashFiles('mise.toml', 'mise.lock') }}
        XTASK_ARTIFACT_NAME: ci-xtask-${{ runner.os }}-${{ runner.arch }}-${{ inputs.xtask-contract || hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml', '.cargo/**', 'crates/*/Cargo.toml', 'crates/jackin-xtask/src/**', 'crates/jackin-process/src/**') }}
        XTASK_EXACT_ARTIFACT_NAME: ci-xtask-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml', '.cargo/**', 'crates/*/Cargo.toml', 'crates/jackin-xtask/src/**', 'crates/jackin-process/src/**') }}
        INCLUDE_TOOLS: ${{ inputs.include-tools }}
      run: |
        set -euo pipefail
        mkdir -p "$ARTIFACT_PATH"
        artifact_id=$(
          gh api "repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
            --paginate \
            --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\") | .id" \
            | head -n 1
        )
        if [ -n "$artifact_id" ]; then
          archive="$ARTIFACT_PATH/.artifact.zip"
          gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "$archive"
          python3 -m zipfile -e "$archive" "$ARTIFACT_PATH"
          rm "$archive"
          exit 0
        fi

        names=()
        if [ "$INCLUDE_TOOLS" = "true" ]; then
          names+=("$TOOLS_ARTIFACT_NAME")
        fi
        names+=("$XTASK_ARTIFACT_NAME")
        if [ "$XTASK_EXACT_ARTIFACT_NAME" != "$XTASK_ARTIFACT_NAME" ]; then
          names+=("$XTASK_EXACT_ARTIFACT_NAME")
        fi

        deadline=$((SECONDS + 40))
        xtask_found=false
        for name in "${names[@]}"; do
          artifact_id=
          announced=false
          while [ -z "$artifact_id" ]; do
            artifact_id=$(
              gh api "repos/${REPOSITORY}/actions/artifacts?name=${name}&per_page=10" \
                --jq '.artifacts[] | select(.expired == false) | .id' \
                | head -n 1
            ) || artifact_id=
            if [ -n "$artifact_id" ]; then
              break
            fi
            if [ "$name" = "$XTASK_ARTIFACT_NAME" ] && \
               [ "$XTASK_ARTIFACT_NAME" != "$XTASK_EXACT_ARTIFACT_NAME" ]; then
              break
            fi
            if (( SECONDS >= deadline )); then
              break
            fi
            if [ "$announced" = false ]; then
              echo "::notice::waiting up to 40 seconds for concurrent CI artifact: ${name}"
              announced=true
            fi
            sleep 2
          done
          if [ -z "$artifact_id" ]; then
            if [[ "$name" == ci-xtask-* ]] && [ "$name" != "$XTASK_EXACT_ARTIFACT_NAME" ]; then
              continue
            fi
            echo "::error::prepared CI artifact not found: ${name}"
            exit 1
          fi
          archive="$ARTIFACT_PATH/.artifact.zip"
          gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "$archive"
          python3 -m zipfile -e "$archive" "$ARTIFACT_PATH"
          rm "$archive"
          if [[ "$name" == ci-xtask-* ]]; then
            xtask_found=true
            break
          fi
        done
        if [ "$xtask_found" != "true" ]; then
          echo "::error::prepared CI xtask artifact not found"
          exit 1
        fi
    - name: Export prepared xtask path
      shell: bash
      env:
        CI_XTASK_PATH: ${{ github.workspace }}/.ci-tools/${{ inputs.lane }}/jackin-xtask
        CI_TOOLS_PATH: ${{ github.workspace }}/.ci-tools/${{ inputs.lane }}
      run: |
        set -euo pipefail
        chmod +x "$CI_XTASK_PATH"
        echo "CI_XTASK=$CI_XTASK_PATH" >> "$GITHUB_ENV"
        if [ -x "$CI_TOOLS_PATH/cargo-fuzz" ]; then
          chmod +x "$CI_TOOLS_PATH"/cargo-*
          echo "CI_CARGO_FUZZ=$CI_TOOLS_PATH/cargo-fuzz" >> "$GITHUB_ENV"
        fi
        if [ -f "$CI_TOOLS_PATH/workspace-metadata.json" ]; then
          echo "CI_METADATA=$CI_TOOLS_PATH/workspace-metadata.json" >> "$GITHUB_ENV"
        fi
        echo "$CI_TOOLS_PATH" >> "$GITHUB_PATH"
