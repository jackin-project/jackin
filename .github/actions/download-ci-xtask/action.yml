name: Download CI xtask
description: Restore the lane-scoped jackin-xtask binary prepared once by CI.

inputs:
  token:
    description: Token with Actions artifact read access.
    required: true
  lane:
    description: Runner lane that produced the binary.
    required: true
  tools-contract:
    description: Runner-independent tools artifact contract computed by the metadata job.
    required: false
    default: ""
  xtask-contract:
    description: Runner-independent xtask artifact contract computed by the metadata job.
    required: false
    default: ""
  fallback-xtask-contract:
    description: Exact xtask contract used when a specialized artifact is not available yet.
    required: false
    default: ""
  include-tools:
    description: Download the Cargo tool bundle in addition to jackin-xtask.
    required: false
    default: "true"
  allow-miss:
    description: Return miss outputs instead of failing when preparation must build the artifacts.
    required: false
    default: "false"

outputs:
  xtask-hit:
    description: Whether the prepared xtask artifact was restored.
    value: ${{ steps.restore.outputs.xtask-hit }}
  tools-hit:
    description: Whether the prepared Cargo tool artifact was restored.
    value: ${{ steps.restore.outputs.tools-hit }}

runs:
  using: composite
  steps:
    - name: Restore prepared CI tools
      id: restore
      uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9.0.0
      env:
        JACKIN_TOKEN: ${{ inputs.token }}
        JACKIN_REPOSITORY: ${{ github.repository }}
        JACKIN_RUN_ID: ${{ github.run_id }}
        JACKIN_WORKSPACE: ${{ github.workspace }}
        JACKIN_RUNNER_OS: ${{ runner.os }}
        JACKIN_RUNNER_ARCH: ${{ runner.arch }}
        JACKIN_LANE: ${{ inputs.lane }}
        JACKIN_TOOLS_CONTRACT: ${{ inputs.tools-contract }}
        JACKIN_XTASK_CONTRACT: ${{ inputs.xtask-contract }}
        JACKIN_FALLBACK_XTASK_CONTRACT: ${{ inputs.fallback-xtask-contract }}
        JACKIN_INCLUDE_TOOLS: ${{ inputs.include-tools }}
        JACKIN_ALLOW_MISS: ${{ inputs.allow-miss }}
        JACKIN_ACTION_RUNTIME: ${{ github.action_path }}/runtime/dist/index.js
      with:
        github-token: ${{ inputs.token }}
        script: await import(process.env.JACKIN_ACTION_RUNTIME).then(({ main }) => main())
