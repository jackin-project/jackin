name: Download CI xtask
description: Restore the lane-scoped jackin-xtask binary prepared once by CI.

inputs:
  lane:
    description: Runner lane that produced the binary.
    required: true

runs:
  using: composite
  steps:
    - name: Download prepared xtask
      shell: bash
      env:
        ARTIFACT_NAME: ci-xtask-${{ inputs.lane }}
        ARTIFACT_PATH: target/ci-tools/${{ inputs.lane }}
        GH_TOKEN: ${{ github.token }}
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
      run: |
        set -euo pipefail
        mkdir -p "$ARTIFACT_PATH"
        artifact_id=$(
          gh api "repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
            --paginate \
            --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\") | .id" \
            | head -n 1
        )
        if [ -z "$artifact_id" ]; then
          echo "::error::artifact not found: ${ARTIFACT_NAME}"
          exit 1
        fi

        archive="$ARTIFACT_PATH/.artifact.zip"
        gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "$archive"
        python3 -m zipfile -e "$archive" "$ARTIFACT_PATH"
        rm "$archive"
    - name: Export prepared xtask path
      shell: bash
      env:
        CI_XTASK_PATH: ${{ github.workspace }}/target/ci-tools/${{ inputs.lane }}/jackin-xtask
        CI_TOOLS_PATH: ${{ github.workspace }}/target/ci-tools/${{ inputs.lane }}
      run: |
        set -euo pipefail
        chmod +x "$CI_TOOLS_PATH"/*
        echo "CI_XTASK=$CI_XTASK_PATH" >> "$GITHUB_ENV"
        echo "$CI_TOOLS_PATH" >> "$GITHUB_PATH"
