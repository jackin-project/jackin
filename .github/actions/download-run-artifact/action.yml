name: Download current-run artifact
description: Download an artifact with an API fallback for compatible runners.

inputs:
  name:
    description: Exact artifact name.
    required: true
  path:
    description: Destination directory.
    required: true

runs:
  using: composite
  steps:
    - name: Download artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
    - name: Recover artifact through the Actions API
      shell: bash
      env:
        ARTIFACT_NAME: ${{ inputs.name }}
        ARTIFACT_PATH: ${{ inputs.path }}
        GH_TOKEN: ${{ github.token }}
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
      run: |
        set -euo pipefail
        mkdir -p "$ARTIFACT_PATH"
        if [ -n "$(find "$ARTIFACT_PATH" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
          exit 0
        fi

        artifact_id=$(
          gh api "repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
            --paginate \
            --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\") | .id" \
            | head -n 1
        )
        if [ -z "$artifact_id" ]; then
          echo "::error::artifact not found: ${ARTIFACT_NAME}"
          exit 1
        fi

        archive="$ARTIFACT_PATH/.artifact.zip"
        gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "$archive"
        unzip -oq "$archive" -d "$ARTIFACT_PATH"
        rm "$archive"

