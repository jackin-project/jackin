name: Cache Cargo registry
description: Restore the shared Cargo registry/index/git DB cache.

inputs:
  contract-key:
    description: Runner-independent registry contract computed by a metadata job.
    required: false
    default: ""

outputs:
  cache-hit:
    description: Whether the exact Cargo registry cache key was restored.
    value: ${{ steps.restore.outputs.cache-hit }}
  cache-primary-key:
    description: Primary Cargo registry cache key.
    value: ${{ steps.restore.outputs.cache-primary-key }}

runs:
  using: composite
  steps:
    - name: Restore Cargo registry
      id: restore
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git/db
        key: cargo-registry-v5-${{ inputs.contract-key || hashFiles('Cargo.lock', 'crates/**/fuzz/Cargo.lock', 'rust-toolchain.toml', '.cargo/config.toml') }}
        restore-keys: |
          cargo-registry-v5-
          cargo-registry-v4-
    - name: Verify restored Cargo registry
      id: verify
      if: steps.restore.outputs.cache-hit != 'true'
      shell: bash
      env:
        CARGO_NET_OFFLINE: "true"
        RUSTC_WRAPPER: ""
      run: |
        set -uo pipefail

        fetch_offline() {
          cargo fetch --locked --offline || return 1
          while IFS= read -r manifest; do
            cargo fetch --manifest-path "$manifest" --locked --offline || return 1
          done < <(find crates -path '*/fuzz/Cargo.toml' -type f | sort)
        }

        if fetch_offline; then
          echo "ready=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "ready=false" >> "$GITHUB_OUTPUT"
        echo "::notice::restored Cargo registry is missing dependencies for this lockfile"

    - name: Fetch missing Cargo dependencies
      if: steps.restore.outputs.cache-hit != 'true' && steps.verify.outputs.ready != 'true'
      shell: bash
      env:
        CARGO_NET_OFFLINE: "false"
        CARGO_NET_RETRY: "10"
        RUSTC_WRAPPER: ""
      run: |
        set -euo pipefail
        attempt=1
        until cargo fetch --locked; do
          if [ "$attempt" -ge 3 ]; then
            exit 1
          fi
          sleep "$((attempt * 10))"
          attempt="$((attempt + 1))"
        done

        while IFS= read -r manifest; do
          attempt=1
          until cargo fetch --manifest-path "$manifest" --locked; do
            if [ "$attempt" -ge 3 ]; then
              exit 1
            fi
            sleep "$((attempt * 10))"
            attempt="$((attempt + 1))"
          done
        done < <(find crates -path '*/fuzz/Cargo.toml' -type f | sort)
    - name: Save Cargo registry
      if: >-
        steps.restore.outputs.cache-hit != 'true' &&
        steps.verify.outputs.ready != 'true' &&
        (github.ref == 'refs/heads/main' ||
         github.event_name == 'workflow_dispatch' ||
         (github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository))
      continue-on-error: true
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git/db
        key: ${{ steps.restore.outputs.cache-primary-key }}
