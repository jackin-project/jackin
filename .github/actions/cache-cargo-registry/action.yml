name: Cache Cargo registry
description: Restore the shared Cargo registry/index/git DB cache.

outputs:
  cache-hit:
    description: Whether the exact Cargo registry cache key was restored.
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Cache Cargo registry
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
        key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', '.cargo/config.toml') }}
        restore-keys: |
          cargo-registry-${{ runner.os }}-${{ runner.arch }}-
