name: Restore package result
description: Restore an input-identical package artifact from either lane or the current run.

inputs:
  workflow:
    description: Workflow file that produced completed-run candidates.
    required: true
  primary-name:
    description: First completed-run artifact name.
    required: true
  alternate-name:
    description: Alternate-lane completed-run artifact name.
    required: true
  current-name-regexp:
    description: Regular expression matching either lane in the current run.
    required: true
  branch:
    description: Optional completed-run branch selector.
    required: false
  commit:
    description: Optional completed-run commit selector.
    required: false
  path:
    description: Artifact extraction directory.
    required: false
    default: dist

outputs:
  found:
    description: Whether an input-identical artifact was restored.
    value: ${{ steps.primary.outputs.found_artifact == 'true' || steps.alternate.outputs.found_artifact == 'true' || steps.current.outputs.found_artifact == 'true' }}

runs:
  using: composite
  steps:
    - id: primary
      uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
      with:
        workflow: ${{ inputs.workflow }}
        workflow_search: true
        workflow_conclusion: completed
        branch: ${{ inputs.branch }}
        commit: ${{ inputs.commit }}
        search_artifacts: true
        name: ${{ inputs.primary-name }}
        path: ${{ inputs.path }}
        if_no_artifact_found: ignore
    - id: alternate
      if: steps.primary.outputs.found_artifact != 'true'
      uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
      with:
        workflow: ${{ inputs.workflow }}
        workflow_search: true
        workflow_conclusion: completed
        branch: ${{ inputs.branch }}
        commit: ${{ inputs.commit }}
        search_artifacts: true
        name: ${{ inputs.alternate-name }}
        path: ${{ inputs.path }}
        if_no_artifact_found: ignore
    - id: current
      if: steps.primary.outputs.found_artifact != 'true' && steps.alternate.outputs.found_artifact != 'true'
      uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
      with:
        run_id: ${{ github.run_id }}
        name: ${{ inputs.current-name-regexp }}
        name_is_regexp: true
        path: ${{ inputs.path }}
        merge_multiple: true
        if_no_artifact_found: ignore
