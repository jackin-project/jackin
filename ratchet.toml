# ratchet.toml — unified shrink-only budgets (completed codebase-health Phase 7).
# Each entry: a metric (computed by a named provider in jackin-xtask), a bound,
# and shrink-only semantics: measured > bound fails (growth); measured < bound
# fails telling you to tighten the bound; measured == bound is steady state.
# `kind = "presence"` entries are allowlists: listed keys must still be violations,
# unlisted violations fail. Regenerate any family: cargo xtask lint ratchet --print <family>.
# deny.toml exceptions and .codebook.toml are deliberately NOT folded here:
# cargo-deny/codebook own their semantics.
#
# Single source of truth: legacy file-size-budget.toml / test-layout-allowlist.toml /
# suppression-budget.toml are gone; `lint files|tests|suppressions` are shims over
# the families below.

[[family]]
id = "file-size-production"
kind = "numeric"
provider = "file_lines_production"
cap = 1850
mode = "enforce"
[[family.entry]]
key = "crates/jackin-diagnostics/src/observability.rs"
bound = 2052

[[family]]
id = "file-size-test"
kind = "numeric"
provider = "file_lines_test"
cap = 10000
mode = "enforce"

[[family]]
id = "test-layout"
kind = "presence"
provider = "test_layout_violations"
mode = "enforce"

[[family]]
id = "bare-allow-per-crate"
kind = "numeric"
provider = "bare_allow_per_crate"
# cap = 0 → every nonzero bare-allow crate must be listed (no unlisted debt).
# 2026-07-12: production crates at measured 0. jackin-xtask keeps 1 fixture
# string in unit tests that intentionally contains bare `#[allow(...)]` for
# the bare-allow parser itself (`health::tests::parses_bare_allow`).
cap = 0
mode = "enforce"
[[family.entry]]
key = "jackin-image"
bound = 1
