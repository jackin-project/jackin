schema_version = 1
agent = "claude"
validated_versions = ">=2.1.173, <2.2.0"

[[rule]]
id = "transcript-overlay"
state = "freeze"
priority = 1000
region = "bottom:24"
strength = "strong"
requires_all = ["showing detailed transcript", "ctrl+o to toggle"]

[[rule]]
id = "permission-dialog"
state = "blocked"
priority = 900
region = "bottom_nonempty:12"
strength = "strong"
requires_all = ["enter to select", "esc to cancel"]
requires_any = ["to navigate", "↑/↓"]

[[rule]]
id = "working-interrupt"
state = "working"
priority = 700
region = "bottom:24"
strength = "strong"
requires_all = ["esc to interrupt"]

[[rule]]
id = "working-token-stats"
state = "working"
priority = 690
region = "bottom:24"
strength = "strong"
requires_all = ["tokens)"]

[[rule]]
id = "prompt-box"
state = "idle"
priority = 500
region = "bottom_nonempty:12"
strength = "strong"
requires_all = ["╭", "│ >"]
