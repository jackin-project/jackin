schema_version = 1
agent = "opencode"
validated_versions = ">=1.17.3, <1.18.0"

[[rule]]
id = "permission-ui"
state = "blocked"
priority = 900
region = "bottom_nonempty:12"
strength = "strong"
requires_all = ["permission required", "enter", "select"]

[[rule]]
id = "processing"
state = "working"
priority = 700
region = "bottom:24"
strength = "strong"
requires_all = ["processing...", "ctrl+c to cancel"]

[[rule]]
id = "ready-text"
state = "idle"
priority = 500
region = "bottom:24"
strength = "strong"
requires_all = ["opencode ready"]
