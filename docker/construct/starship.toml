format = "$env_var$directory$git_branch$git_status$character"
add_newline = false

[env_var.JACKIN_AGENT]
format = "[$env_value ](white)"

# Green-block prompt sigil: black `j`, white `❯`, on the #5CF07A logo block.
[character]
success_symbol = "[ j](bg:#5CF07A fg:#0A0A0A)[❯ ](bg:#5CF07A fg:#FFFFFF)"
error_symbol = "[ j](bg:#5CF07A fg:#0A0A0A)[❯ ](bg:#5CF07A fg:#FFFFFF)"
vimcmd_symbol = "[ j](bg:#5CF07A fg:#0A0A0A)[❯ ](bg:#5CF07A fg:#FFFFFF)"

[directory]
style = "cyan"
truncation_length = 3
truncate_to_repo = false
format = "[$path]($style) "

[git_branch]
style = "purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "[$all_status$ahead_behind]($style) "
