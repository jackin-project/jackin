# File-size ratchet budget.
#
# Owned by Workstream B of the codebase-health-enforcement roadmap item
# (`roadmap/codebase-health-enforcement`). Drives `cargo xtask lint files`.
#
# The rule (enforced by the gate, mirror of the docstring on the `LintFiles`
# subcommand):
#
#   1. Production Rust sources (every `crates/**/*.rs` except `tests.rs`) must
#      be at most `production_cap` lines long. The cap sits at 2000L (the
#      original 1500L target was relaxed for the three hot-path files whose
#      decomposition reached a safe floor above 1500L under the E0 thin-LTO
#      guardrail — see plans/codebase-health-remaining.md).
#   2. Test sources (`**/tests.rs`) must be at most `test_cap` lines long. The
#      test cap is 10000L today because the launch and daemon tests are large
#      by design — see `roadmap/test-infra-behavioral-specs/` for the
#      long-term fix.
#   3. Every file currently over its cap is grandfathered in this file with
#      its **current** line count. The recorded count is the ratchet:
#      the gate fails if a listed file grows past its recorded count, and
#      fails if any non-listed file exceeds the cap. Numbers can only
#      decrease; when a file drops under its cap, delete its entry.
#
# To refresh numbers after a decomposition:
#   cargo xtask lint files --print-budget > file-size-budget.toml
# …then prune entries whose line counts now sit under the cap, and
# commit the result.

production_cap = 2000
test_cap = 10000

