[package]
name = "jackin-usage-ffi"
version = "0.6.0-dev"
edition.workspace = true
rust-version.workspace = true
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "Synchronous UniFFI facade over jackin-usage host runtime for the macOS menu-bar app"
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "jackin_usage_ffi"
crate-type = ["lib", "staticlib", "cdylib"]
path = "src/lib.rs"

[dependencies]
jackin-usage = { workspace = true }
jackin-protocol = { workspace = true }
uniffi = { version = "=0.32.0", default-features = false }

[dev-dependencies]
tempfile = { workspace = true }

# Cannot use lints.workspace = true: UniFFI requires unsafe_code allow, and
# workspace forbids unsafe. Mirror TableRock-ffi baseline.
[lints.rust]
unsafe_code = "allow"
rust_2018_idioms = { level = "deny", priority = -1 }

[lints.clippy]
correctness = "deny"
suspicious = "deny"
perf = "deny"
todo = "deny"
unimplemented = "deny"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
print_stdout = "deny"
print_stderr = "deny"
