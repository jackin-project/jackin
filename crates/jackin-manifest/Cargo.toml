[package]
name = "jackin-manifest"
version = "0.6.0-dev"
edition = "2024"
rust-version = "1.94"
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "Role manifest loading, validation, and migration for jackin."
license = "Apache-2.0"
readme = "README.md"
publish = false

[lib]
name = "jackin_manifest"
path = "src/lib.rs"

[dependencies]
jackin-core = { path = "../jackin-core" }
jackin-config = { path = "../jackin-config" }
jackin-diagnostics = { path = "../jackin-diagnostics" }
anyhow = "1.0"
toml = "1.1"
toml_edit = "0.25"
dockerfile-parser-rs = "3.3.0"
thiserror = "2.0"

[dev-dependencies]
tempfile = "3.20"

[lints.rust]
unsafe_code = "forbid"
async_fn_in_trait = "allow"

[lints.clippy]
mod_module_files = "deny"
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
complexity = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
dbg_macro = "deny"
todo = "warn"
unimplemented = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
future_not_send = "allow"
cast_possible_truncation = "allow"
