[package]
name = "jackin-core"
version = "0.6.0-dev"
edition = "2024"
rust-version = "1.94"
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "Universal vocabulary types shared across all jackin crates: Agent, MountIsolation, AuthForwardMode, selectors, and constants."
license = "Apache-2.0"
readme = "README.md"
publish = false

[lib]
name = "jackin_core"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
directories = "6.0"
jackin-protocol = { path = "../jackin-protocol" }
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0"

[dev-dependencies]
serde_json = "1.0"
tempfile = "3.20"

[lints.rust]
unsafe_code = "forbid"
async_fn_in_trait = "allow"

[lints.clippy]
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
complexity = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
dbg_macro = "deny"
todo = "warn"
unimplemented = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
future_not_send = "allow"
cast_possible_truncation = "allow"
mod_module_files = "deny"
