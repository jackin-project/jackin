[package]
name = "jackin-image"
version = "0.6.0-dev"
edition = "2024"
rust-version = "1.94"
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "Image generation and binary artifact management for jackin'."
license = "Apache-2.0"
readme = "README.md"
publish = false

[lib]
name = "jackin_image"
path = "src/lib.rs"

[dependencies]
jackin-core = { path = "../jackin-core" }
jackin-manifest = { path = "../jackin-manifest" }
jackin-docker = { path = "../jackin-docker" }
jackin-diagnostics = { path = "../jackin-diagnostics" }
sha2 = "0.11"
tar = "0.4"
flate2 = "1.1"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tempfile = "3.20"
tokio = { version = "1", features = ["rt", "process", "io-util", "sync", "macros", "time", "fs"] }
reqwest = { version = "0.13", default-features = false }

[build-dependencies]
jackin-build-meta = { path = "../jackin-build-meta" }

[dev-dependencies]
filetime = "=0.2.29"
tokio = { version = "=1.52.3", features = ["test-util"] }

[lints.rust]
unsafe_code = "forbid"
async_fn_in_trait = "allow"

[lints.clippy]
mod_module_files = "deny"
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
complexity = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
dbg_macro = "deny"
todo = "warn"
unimplemented = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
future_not_send = "allow"
cast_possible_truncation = "allow"
