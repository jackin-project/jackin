groups:
  - { id: event.session.start, type: event, name: session.start, brief: Interactive session started., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id, requirement_level: required}, {ref: session.previous_id}] }
  - { id: event.session.end, type: event, name: session.end, brief: Interactive session ended., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id, requirement_level: required}, {ref: session.previous_id}] }
  - { id: event.ui.screen.entered, type: event, name: ui.screen.entered, brief: Screen visit entered., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: app.screen.id, requirement_level: required}, {ref: ui.screen.visit.id, requirement_level: required}, {ref: ui.navigation.sequence, requirement_level: required}] }
  - { id: event.ui.screen.exited, type: event, name: ui.screen.exited, brief: Screen visit exited., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: app.screen.id, requirement_level: required}, {ref: ui.screen.visit.id, requirement_level: required}, {ref: ui.navigation.sequence, requirement_level: required}, {ref: ui.transition.reason, requirement_level: required}] }
  - { id: event.ui.widget.focused, type: event, name: ui.widget.focused, brief: Widget gained focus., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: app.widget.id, requirement_level: required}] }
  - { id: event.ui.widget.unfocused, type: event, name: ui.widget.unfocused, brief: Widget lost focus., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: app.widget.id, requirement_level: required}] }
  - id: event.jackin.app.jank
    extends: event.app.jank
    type: event
    name: app.jank
    brief: Render jank threshold crossed.
    stability: development
    attributes: [{ref: cli.invocation.id}, {ref: session.id}]
  - id: event.jackin.app.crash
    extends: event.app.crash
    type: event
    name: app.crash
    brief: Application crashed.
    stability: development
    attributes: [{ref: cli.invocation.id}, {ref: session.id}]
  - { id: event.agent.state.changed, type: event, name: agent.state.changed, brief: Effective coding-agent state changed., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: gen_ai.agent.name, requirement_level: required}, {ref: agent.state, requirement_level: required}, {ref: agent.status.source, requirement_level: required}, {ref: agent.status.confidence, requirement_level: required}, {ref: agent.status.stuck, requirement_level: required}] }
  - { id: event.pty.spawn, type: event, name: pty.spawn, brief: PTY child process spawned., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: gen_ai.agent.name}, {ref: gen_ai.conversation.id}] }
  - { id: event.pty.exit, type: event, name: pty.exit, brief: PTY child process exited., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: pty.exit.reason, requirement_level: required}, {ref: process.exit.code}, {ref: error.type}, {ref: gen_ai.agent.name}, {ref: gen_ai.conversation.id}] }
  - { id: event.telemetry.validate, type: event, name: telemetry.validate, brief: Telemetry delivery validation marker., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}] }
  - { id: event.launch.stage.started, type: event, name: launch.stage.started, brief: Launch stage started., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: launch.stage.name, requirement_level: required}, {ref: outcome, requirement_level: required}] }
  - { id: event.launch.stage.done, type: event, name: launch.stage.done, brief: Launch stage completed., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: launch.stage.name, requirement_level: required}, {ref: outcome, requirement_level: required}] }
  - { id: event.launch.stage.failed, type: event, name: launch.stage.failed, brief: Launch stage failed., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: launch.stage.name, requirement_level: required}, {ref: outcome, requirement_level: required}, {ref: error.type}] }
  - { id: event.launch.stage.skipped, type: event, name: launch.stage.skipped, brief: Launch stage skipped., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: launch.stage.name, requirement_level: required}, {ref: outcome, requirement_level: required}] }
  - { id: event.timing.started, type: event, name: timing.started, brief: Timing interval started., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}] }
  - { id: event.timing.done, type: event, name: timing.done, brief: Timing interval completed., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}] }
  - { id: event.debug.line, type: event, name: debug.line, brief: Governed debug breadcrumb., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}] }
  - { id: event.process.subprocess.done, type: event, name: process.subprocess.done, brief: Subprocess completed., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}, {ref: error.type}] }
  - { id: event.run.summary, type: event, name: run.summary, brief: Invocation summary produced., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}] }
  - { id: event.performance.slow.foreground.wait, type: event, name: performance.slow.foreground.wait, brief: Foreground wait exceeded its threshold., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}] }
  - { id: event.capsule.session.detach, type: event, name: capsule.session.detach, brief: Operator detached from a capsule session., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}] }
  - { id: event.capsule.session.clean.shutdown, type: event, name: capsule.session.clean.shutdown, brief: Capsule session shut down cleanly., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}] }
  - { id: event.error.typed, type: event, name: error.typed, brief: Typed product error occurred., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}, {ref: error.type, requirement_level: required}] }
  - { id: event.config.operation, type: event, name: config.operation, brief: Configuration operation completed., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: config.scope, requirement_level: required}, {ref: config.operation, requirement_level: required}, {ref: config.schema.version.from}, {ref: config.schema.version.to}, {ref: config.migration.step_count}, {ref: outcome, requirement_level: required}, {ref: error.type}] }
  - { id: event.trust.decision, type: event, name: trust.decision, brief: Role-source trust decision applied., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: trust.decision, requirement_level: required}, {ref: trust.source.type, requirement_level: required}, {ref: outcome, requirement_level: required}, {ref: error.type}] }
  - { id: event.isolation.decision, type: event, name: isolation.decision, brief: Workspace isolation and network policy selected., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: workspace.isolation.mode, requirement_level: required}, {ref: network.mode, requirement_level: required}, {ref: dind.mode, requirement_level: required}, {ref: outcome, requirement_level: required}] }
  - { id: event.isolation.firewall.failed, type: event, name: isolation.firewall.failed, brief: Fail-closed firewall application failed., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: network.mode, requirement_level: required}, {ref: outcome, requirement_level: required}, {ref: error.type, requirement_level: required}] }
  - { id: event.cache.decision, type: event, name: cache.decision, brief: Product cache decision made., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: cache.name, requirement_level: required}, {ref: cache.result, requirement_level: required}] }
  - { id: event.operation.log, type: event, name: operation.log, brief: Bounded operation breadcrumb., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}] }
  - { id: event.operation.warn, type: event, name: operation.warn, brief: Bounded operation warning., stability: development, attributes: [{ref: cli.invocation.id}, {ref: session.id}, {ref: outcome, requirement_level: required}] }
