SERVICE_NAMESPACE = "service.namespace"
SERVICE_VERSION = "service.version"
SESSION_ID = "session.id"
SESSION_PREVIOUS_ID = "session.previous_id"
URL_TEMPLATE = "url.template"

# Development-status fields absent from the pinned Rust crate belong here.
# Every entry must map CONSTANT_NAME = "wire.name" and is emitted as a local
# constant carrying the exact registry schema version above.
[standard_local]
GEN_AI_AGENT_NAME = "gen_ai.agent.name"
GEN_AI_CONVERSATION_ID = "gen_ai.conversation.id"
GEN_AI_PROVIDER_NAME = "gen_ai.provider.name"

[[standard_enum]]
rust_type = "AgentName"
attribute = "gen_ai.agent.name"
values = ["claude", "codex", "amp", "kimi", "opencode", "grok"]

[[standard_enum]]
rust_type = "ProviderName"
attribute = "gen_ai.provider.name"
values = ["anthropic", "openai", "amp", "xai", "zai", "minimax", "kimi"]

[[standard_enum]]
rust_type = "DbOperationName"
attribute = "db.operation.name"
values = ["begin", "select", "insert", "upsert", "update", "delete"]

[[standard_enum]]
rust_type = "ScreenId"
attribute = "app.screen.id"
values = ["workspace.list", "workspace.editor", "settings", "workspace.create", "launch.progress", "capsule"]

[[standard_enum]]
rust_type = "ErrorType"
attribute = "error.type"
values = [
  "docker_daemon_unreachable", "docker_version_too_old", "out_of_disk_space",
  "role_manifest_invalid", "role_manifest_version_unsupported", "role_source_not_trusted",
  "workspace_not_found", "workspace_config_version_unsupported", "container_name_conflict",
  "dind_health_check_failed", "dind_port_conflict", "gh_auth_failed", "op_not_signed_in",
  "capsule_download_failed", "worktree_conflict", "unsupported_otlp_protocol",
  "timeout", "connection_refused", "rpc_error", "panic",
  "process_exit_nonzero", "process_spawn_error", "http_error", "db_error",
  "firewall_apply_failed", "config_error", "trust_error", "launch_failed",
  "launch_stage_failed", "deadline_exceeded", "dependency_cancelled",
  "telemetry_instrumentation_fault", "recovered_degradation",
]

[[scoped_enum]]
rust_type = "GlobalConfigSchemaVersionFrom"
values = ["legacy", "v1alpha1", "v1alpha2", "v1alpha3", "v1alpha4", "v1alpha5", "v1alpha6", "v1alpha7", "v1alpha8", "v1alpha9"]

[[scoped_enum]]
rust_type = "GlobalConfigSchemaVersionTo"
values = ["v1alpha1", "v1alpha2", "v1alpha3", "v1alpha4", "v1alpha5", "v1alpha6", "v1alpha7", "v1alpha8", "v1alpha9"]

[[scoped_enum]]
rust_type = "WorkspaceConfigSchemaVersionFrom"
values = ["legacy", "v1alpha1", "v1alpha2", "v1alpha3", "v1alpha4", "v1alpha5", "v1alpha6", "v1alpha7", "v1alpha8"]

[[scoped_enum]]
rust_type = "WorkspaceConfigSchemaVersionTo"
values = ["v1alpha1", "v1alpha2", "v1alpha3", "v1alpha4", "v1alpha5", "v1alpha6", "v1alpha7", "v1alpha8"]

[rust_type_overrides]
"outcome" = "OutcomeValue"
"ui.transition.reason" = "TransitionReason"

# Fixed seconds buckets for every governed duration histogram. Keeping the
# boundaries in registry metadata makes the SDK view and generated definitions
# share one source of truth.
