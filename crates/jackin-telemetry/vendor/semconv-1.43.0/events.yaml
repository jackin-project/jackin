groups:
  # Exact event definitions selected from semantic-conventions v1.43.0
  # (commit 89aae438b3b3b0a8dd33003c9d70592baf7dbd0d).
  - id: event.app.crash
    stability: development
    type: event
    name: app.crash
    brief: |
      This event represents a termination of a user-facing application due to
      unrecoverable programming errors such as exceptions or signals that
      indicate an error has happened at a lower level.
    attributes:
      - ref: app.build_id
        requirement_level:
          conditionally_required: If reporter is not the crashing application instance itself and it's available.
      - ref: app.crash.id
        requirement_level: recommended
      - ref: exception.type
        requirement_level: recommended
      - ref: exception.message
        requirement_level: recommended
      - ref: exception.stacktrace
        requirement_level: recommended
      - ref: os.name
        requirement_level:
          conditionally_required: If reporter is not the crashing application instance itself and the OS name is available.
      - ref: os.version
        requirement_level:
          conditionally_required: If reporter is not the crashing application instance itself.
      - ref: service.version
        requirement_level:
          conditionally_required: If reporter is not the crashing application instance itself.
      - ref: session.id
        requirement_level: recommended
  - id: event.app.jank
    stability: development
    type: event
    name: app.jank
    brief: >
      This event indicates that the application has detected substandard UI
      rendering performance.
    attributes:
      - ref: app.jank.frame_count
        requirement_level: recommended
      - ref: app.jank.threshold
        requirement_level: recommended
      - ref: app.jank.period
        requirement_level: recommended
