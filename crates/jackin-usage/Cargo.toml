[package]
name = "jackin-usage"
version = "0.6.0-dev"
edition.workspace = true
rust-version.workspace = true
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "Usage, pricing, telemetry, and token-monitor subsystem for the jackin-capsule in-container daemon."
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "jackin_usage"
path = "src/lib.rs"

[features]
default = []

[dependencies]
jackin-core = { workspace = true }
jackin-protocol = { workspace = true }
jackin-diagnostics = { workspace = true }
jackin-telemetry = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true, features = ["clock"] }
fs4 = { workspace = true }
nix = { workspace = true, features = ["term"] }
reqwest = { workspace = true, features = ["blocking", "json", "rustls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "macros", "time", "net"] }
tower = { workspace = true }
tracing = { workspace = true }
turso = { workspace = true }
url = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
criterion = { workspace = true, features = ["html_reports"] }
jackin-diagnostics = { workspace = true, features = ["test-support"] }
jackin-otlp-testbed = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
tracing = { workspace = true }

[[bench]]
name = "materialize_accounts"
harness = false

[lints]
workspace = true

[[bench]]
name = "token_log_reread"
harness = false

[[bench]]
name = "snapshot_upsert"
harness = false
