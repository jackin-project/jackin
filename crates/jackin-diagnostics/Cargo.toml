[package]
name = "jackin-diagnostics"
version = "0.6.0-dev"
edition.workspace = true
rust-version.workspace = true
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "Host observability substrate for jackin: structured run diagnostics, debug-mode flag, and terminal-ownership guards."
license.workspace = true
readme = "README.md"
publish = false

repository.workspace = true
[lib]
name = "jackin_diagnostics"
path = "src/lib.rs"

[features]
# Enable the OpenTelemetry (OTLP) export layer.
#
# Gated twice:
# 1. Compile-time: `--features otlp` (default build has zero opentelemetry deps)
# 2. Runtime: `JACKIN_OTLP_ENDPOINT=http://…:4318` (no-op if unset even when compiled in)
#
# Usage: cargo build --features jackin-diagnostics/otlp
# Then: JACKIN_OTLP_ENDPOINT=http://localhost:4318 cargo run --bin jackin -- console --debug
otlp = [
    "dep:opentelemetry",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry_sdk",
    "dep:tracing-opentelemetry",
]

[dependencies]
jackin-core = { version = "0.6.0-dev", path = "../jackin-core" }
jackin-tui = { version = "0.6.0-dev", path = "../jackin-tui" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.10"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
crossterm = "0.29"
# OTLP export (optional — only compiled in with `--features otlp`)
opentelemetry = { version = "0.28", optional = true }
opentelemetry-otlp = { version = "0.28", features = ["http-proto", "reqwest-client", "reqwest-blocking-client"], optional = true }
opentelemetry_sdk = { version = "0.28", features = ["rt-tokio"], optional = true }
tracing-opentelemetry = { version = "0.29", optional = true }

[dev-dependencies]
tempfile = "3.20"

[lints]
workspace = true
