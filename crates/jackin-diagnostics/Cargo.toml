required-features = ["test-support"]

[[test]]
name = "wire_failure_retryable"
required-features = ["test-support"]

[[test]]
name = "wire_failure_endpoint_loss"
required-features = ["test-support"]

[[test]]
name = "wire_shutdown"
required-features = ["test-support"]

[[test]]
name = "wire_failure_subscriber"
required-features = ["test-support"]

[[test]]
name = "wire_failure_tls"
required-features = ["test-support"]

[[test]]
name = "wire_disabled"
required-features = ["test-support"]

[[test]]
name = "wire_failure_slow"
required-features = ["test-support"]

[[test]]
name = "wire_reentry"
required-features = ["test-support"]

[[test]]
