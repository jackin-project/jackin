[package]
name = "jackin-diagnostics"
version = "0.6.0-dev"
edition.workspace = true
rust-version.workspace = true
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "Host observability substrate for jackin: structured run diagnostics, debug-mode flag, and terminal-ownership guards."
license.workspace = true
readme = "README.md"
publish = false

repository.workspace = true
[lib]
name = "jackin_diagnostics"
path = "src/lib.rs"

[features]
# Enable the OpenTelemetry (OTLP) export layer.
#
# Gated twice:
# 1. Compile-time: `--features otlp`. A build of this crate without the
#    feature (e.g. `cargo build -p jackin --no-default-features`) has zero
#    opentelemetry deps. NB the `jackin` binary enables `otlp` by default, so
#    its default build does link opentelemetry — opt out with that flag.
# 2. Runtime: `JACKIN_OTLP_ENDPOINT=http://…:4318` (or the standard
#    `OTEL_EXPORTER_OTLP_ENDPOINT`) — no-op if unset even when compiled in
#
# Usage: cargo build --features jackin-diagnostics/otlp
# Then: JACKIN_OTLP_ENDPOINT=http://localhost:4318 cargo run --bin jackin -- console --debug
otlp = [
    "dep:opentelemetry",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-appender-tracing",
    "dep:tracing-opentelemetry",
    "dep:sysinfo",
    "dep:tokio",
]

[dependencies]
jackin-core = { version = "0.6.0-dev", path = "../jackin-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.10"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
crossterm = "0.29"
# OTLP export (optional — only compiled in with `--features otlp`)
opentelemetry = { version = "0.32", optional = true }
# reqwest-blocking-client only: the batch processors run on their own
# dedicated threads (no tokio reactor), where the async client panics with
# "there is no reactor running".
opentelemetry-otlp = { version = "0.32", features = ["http-proto", "reqwest-blocking-client", "metrics"], optional = true }
# No `rt-tokio`: the batch span/log processors and the PeriodicReader all run
# on their own dedicated threads (the 0.28+ design), so the async-runtime
# integration would be dead weight.
opentelemetry_sdk = { version = "0.32", features = ["metrics"], optional = true }
opentelemetry-appender-tracing = { version = "0.32", optional = true }
tracing-opentelemetry = { version = "0.33", optional = true }
# Process metrics (CPU, memory) for the OTLP gauge callbacks.
sysinfo = { version = "0.39", optional = true, default-features = false, features = ["system"] }
# Handle::metrics() for the tokio runtime gauges; the app's runtime handle
# is captured at subscriber init and read from the exporter thread.
tokio = { version = "1", optional = true, default-features = false, features = ["rt"] }

[dev-dependencies]
tempfile = "=3.27.0"

[lints]
workspace = true
