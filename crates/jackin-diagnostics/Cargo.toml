[package]
name = "jackin-diagnostics"
version = "0.6.0-dev"
edition = "2024"
rust-version = "1.94"
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "Host observability substrate for jackin: structured run diagnostics, debug-mode flag, and terminal-ownership guards."
license = "Apache-2.0"
readme = "README.md"
publish = false

[lib]
name = "jackin_diagnostics"
path = "src/lib.rs"

[dependencies]
jackin-core = { path = "../jackin-core" }
jackin-tui = { path = "../jackin-tui" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.10"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
crossterm = "0.29"
directories = "6.0"

[dev-dependencies]
tempfile = "3.20"

[lints.rust]
unsafe_code = "forbid"
async_fn_in_trait = "allow"

[lints.clippy]
mod_module_files = "deny"
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
complexity = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
dbg_macro = "deny"
todo = "warn"
unimplemented = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
future_not_send = "allow"
cast_possible_truncation = "allow"
