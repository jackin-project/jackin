[package]
name = "jackin-xtask"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Workspace automation (construct image build/publish) for jackin, invoked via mise tasks."
publish = false

[[bin]]
name = "jackin-xtask"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
toml = "0.8"

[dev-dependencies]
tempfile = "=3.27.0"

[lints]
workspace = true
