[package]
name = "jackin-xtask"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Workspace automation (construct image build/publish) for jackin, invoked via mise tasks."
publish = false

[[bin]]
name = "jackin-xtask"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
jackin-process = { workspace = true }
portable-pty = { workspace = true }
hex = { workspace = true }
proc-macro2 = { workspace = true }
quick-xml = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["preserve_order"] }
sha2 = { workspace = true }
syn = { workspace = true, features = ["full", "visit", "parsing", "extra-traits"] }
toml = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
