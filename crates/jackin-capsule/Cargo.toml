[package]
name = "jackin-capsule"
version = "0.6.0-dev"
edition = "2024"
rust-version = "1.94"
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "In-container PID 1 control plane for Capsule-managed role containers."
homepage = "https://jackin.tailrocks.com/"
repository = "https://github.com/jackin-project/jackin"
license = "Apache-2.0"
readme = "README.md"
publish = false

[lib]
name = "jackin_capsule"
path = "src/lib.rs"

[[bin]]
name = "jackin-capsule"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
jackin-protocol = { path = "../jackin-protocol" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.1"
tokio = { version = "1", features = ["rt", "io-util", "io-std", "sync", "macros", "time", "net", "signal"] }
crossterm = "0.29"
portable-pty = "0.9"
nix = { version = "0.31", features = ["term", "signal", "process"] }
# Pinned git fork of `vt100`. Upstream (doy/vt100-rust) is the
# canonical crates.io publish but its `Callbacks` trait predates the
# OSC + unhandled-CSI surface the multiplexer needs; the fork carries
# patches that are not yet merged upstream (`set_window_title`,
# `set_window_icon_name`, `copy_to_clipboard`, `unhandled_csi`).
# Replace with the upstream crate as soon as those PRs land. Tracked
# in TODO.md under `vt100-rust-fork`.
vt100 = { git = "https://github.com/donbeave/vt100-rust", rev = "527f0715fad788cbbf9605b8d5923b519755c345" }
url = "2"
base64 = "0.22"
unicode-width = "0.2"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
jackin-tui = { path = "../jackin-tui" }

[build-dependencies]
jackin-build-meta = { path = "../jackin-build-meta" }

[dev-dependencies]
tempfile = "3"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
dbg_macro = "deny"
todo = "warn"
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_sign_loss = "allow"
