[package]
name = "jackin"
version = "0.6.0-dev"
edition.workspace = true
rust-version.workspace = true
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "CLI for orchestrating autonomous AI coding agents in isolated sandboxed environments — reproducible, scoped, and fully under your control."
homepage = "https://jackin.tailrocks.com/"
repository.workspace = true
license.workspace = true
readme = "README.md"
publish = false
build = "build.rs"

[[bin]]
name = "jackin"
path = "src/main.rs"

[[bin]]
name = "jackin-role"
path = "src/bin/role.rs"

[[bin]]
name = "build-jackin-capsule"
path = "src/bin/build_jackin_capsule/main.rs"

[dependencies]
anyhow = { workspace = true }
jackin-config = { workspace = true }
jackin-core = { workspace = true }
jackin-docker = { workspace = true }
jackin-manifest = { workspace = true }
jackin-diagnostics = { workspace = true }
jackin-env = { workspace = true }
jackin-image = { workspace = true }
jackin-runtime = { workspace = true }
jackin-tui = { workspace = true }
jackin-launch-tui = { workspace = true }
jackin-console = { workspace = true }
jackin-protocol = { workspace = true }
jackin-usage = { workspace = true }
clap = { workspace = true, features = ["derive", "color", "env"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
toml = { workspace = true }
directories = { workspace = true }
thiserror = { workspace = true }
tempfile = { workspace = true }
owo-colors = { workspace = true, features = ["supports-colors"] }
ratatui = { workspace = true }
crossterm = { workspace = true, features = ["event-stream"] }
dialoguer = { workspace = true }
tabled = { workspace = true }
clap_mangen = { workspace = true }
tokio = { workspace = true, features = ["rt", "process", "io-util", "sync", "macros", "time", "fs"] }
futures-util = { workspace = true }
fs4 = { workspace = true }
rustls = { workspace = true, features = ["aws_lc_rs"] }
reqwest = { workspace = true, features = ["blocking", "json", "rustls"] }

[build-dependencies]
jackin-build-meta = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
jackin-config = { workspace = true, features = ["test-support"] }
jackin-env = { workspace = true, features = ["test-support"] }
jackin-test-support = { workspace = true }
criterion = { workspace = true, features = ["html_reports"] }
predicates = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[[bench]]
name = "console_frame"
harness = false

[features]
# `otlp` is default so installed binaries can export runs to a local OTLP
# backend (e.g. Parallax) without a rebuild. Runtime-gated: with no standard
# OTLP endpoint env set, the export layer is never installed and runs behave
# exactly as before.
# Opt out: cargo build --no-default-features.
default = ["otlp"]
# `e2e` compiles real-Docker smoke tests. The default nextest profile excludes
# them; run the `docker-e2e` nextest profile on a prepared Docker host.
e2e = []
# `otlp` enables the OpenTelemetry OTLP span, log, and metric export layer in
# jackin-diagnostics (runtime-gated on the endpoint env vars above).
otlp = ["jackin-diagnostics/otlp"]
# Enables `crate::operator_env::test_support::*` (the shared FakeOpWriter
# fake used by rotate-cleanup tests). Mirrors the test-support features
# in jackin-config and jackin-env.
test-support = ["jackin-env/test-support"]

[lints]
workspace = true
