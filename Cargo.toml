[workspace]
members = ["crates/jackin-container"]
resolver = "2"

[package]
name = "jackin"
version = "0.6.0-dev"
edition = "2024"
rust-version = "1.94"
authors = ["Alexey Zhokhov <alexey@zhokhov.com>"]
description = "CLI for orchestrating autonomous AI coding agents in isolated sandboxed environments — reproducible, scoped, and fully under your control."
homepage = "https://jackin.tailrocks.com/"
repository = "https://github.com/jackin-project/jackin"
license = "Apache-2.0"
readme = "README.md"
publish = false

[[bin]]
name = "jackin"
path = "src/main.rs"

[[bin]]
name = "jackin-role"
path = "src/bin/role.rs"

[[bin]]
name = "build-jackin-container"
path = "src/bin/build_jackin_container.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive", "color", "env"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.1"
toml_edit = "0.25"
directories = "6.0"
fs2 = "0.4"
thiserror = "2.0"
dockerfile-parser-rs = "3.3.0"
tempfile = "3.20"
owo-colors = { version = "4", features = ["supports-colors"] }
ratatui = { version = "0.30", features = ["unstable-widget-ref"] }
crossterm = "0.29"
nix = { version = "0.31", features = ["term"] }
ratatui-textarea = "0.9"
tui-widget-list = "0.15"
dialoguer = "0.12"
tabled = "0.20.0"
open = "5.3.4"
clap_mangen = "0.3"
serde_yaml_ng = "0.10.0"
secrecy = "0.10"
portable-pty = "0.9"
sha2 = "0.11"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
rand = "0.10"
tokio = { version = "1", features = ["rt", "process", "io-util", "sync", "macros", "time"] }
bollard = "0.21"
futures-util = "0.3"

[dev-dependencies]
assert_cmd = "=2.2.2"
predicates = "=3.1.4"
tokio = { version = "=1.52.3", features = ["test-util"] }

[features]
# `e2e` gates real-Docker smoke tests. Default `cargo nextest run` skips them;
# enable with `--features e2e` on a host with a reachable Docker daemon.
e2e = []

[lints.rust]
unsafe_code = "forbid"
# DockerApi and CommandRunner are internal traits; auto-trait bounds (Send/Sync)
# are not a concern with the current_thread tokio runtime.
async_fn_in_trait = "allow"

[lints.clippy]
# Lint groups — bugs are errors, style is advisory
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
complexity = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }

# Restriction lints (opt-in best practices)
dbg_macro = "deny"
todo = "warn"
unimplemented = "deny"

# Pedantic overrides (too noisy for a CLI project)
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
# async functions in a current_thread binary do not need Send futures
future_not_send = "allow"

# Allow casting in TUI code where precision loss is acceptable
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"

[profile.dev]
# Line tables only: ~30-50% smaller artifacts, faster link, stack traces still work.
debug = 1

[profile.release]
strip = "symbols"
