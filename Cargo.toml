[workspace]
members = [
    "crates/jackin",
    "crates/jackin-build-meta",
    "crates/jackin-capsule",
    "crates/jackin-config",
    "crates/jackin-console",
    "crates/jackin-core",
    "crates/jackin-diagnostics",
    "crates/jackin-docker",
    "crates/jackin-env",
    "crates/jackin-image",
    "crates/jackin-manifest",
    "crates/jackin-protocol",
    "crates/jackin-launch",
    "crates/jackin-runtime",
    "crates/jackin-tui",
    "crates/jackin-tui-lookbook",
]
resolver = "2"

[profile.dev]
# Line tables only: ~30-50% smaller artifacts, faster link, stack traces still work.
debug = 1

[profile.release]
strip = "symbols"
