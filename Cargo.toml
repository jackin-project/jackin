[package]
name = "jackin"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive", "color"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
directories = "6.0"
thiserror = "2.0"
dockerfile-parser = "0.9.0"
tempfile = "3.20"
owo-colors = { version = "4", features = ["supports-colors"] }
ctrlc = "3"
ratatui = "0.29"
crossterm = "0.28"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.1"
