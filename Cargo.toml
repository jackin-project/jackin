[package]
name = "jackin"
version = "0.5.0-dev"
edition = "2024"
rust-version = "1.87"
description = "CLI for orchestrating AI coding agents at scale"
homepage = "https://www.zhokhov.com/jackin/"
repository = "https://github.com/donbeave/jackin"
license = "Apache-2.0"
publish = false

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive", "color"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.1"
directories = "6.0"
thiserror = "2.0"
dockerfile-parser = "0.9.0"
tempfile = "3.20"
owo-colors = { version = "4", features = ["supports-colors"] }
ratatui = "0.30"
crossterm = "0.29"
tabled = "0.20.0"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.1"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
# Lint groups — bugs are errors, style is advisory
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
complexity = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }

# Restriction lints (opt-in best practices)
dbg_macro = "deny"
todo = "warn"
unimplemented = "deny"

# Pedantic overrides (too noisy for a CLI project)
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"

# Allow casting in TUI code where precision loss is acceptable
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
