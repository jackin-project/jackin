[tools]
"github:open-telemetry/weaver" = "0.24.2"
actionlint = "1.7.12"
bun = "1.3.14"
cargo-binstall = "1.21.0"
"cargo:cargo-audit" = "0.22.2"
"cargo:cargo-deny" = "0.20.0"
"cargo:cargo-dylint" = "6.0.1"
"cargo:cargo-fuzz" = "0.13.1"
"cargo:cargo-hack" = "0.6.45"
"cargo:cargo-hakari" = "0.9.38"
"cargo:cargo-llvm-cov" = "0.8.7"
"cargo:cargo-mutants" = "27.1.0"
"cargo:cargo-nextest" = "0.9.140"
"cargo:cargo-shear" = "1.13.0"
# Provides `uniffi-bindgen`; pin matches jackin-usage-ffi UniFFI (needs cli feature).
"cargo:uniffi" = { version = "0.32.0", default-features = true, features = "cli" }
"cargo:cargo-zigbuild" = "0.23.0"
"cargo:codebook-lsp" = { version = "0.3.41", default-features = false }
"cargo:sccache" = "0.16.0"
"cargo:dylint-link" = "6.0.1"
cosign = "3.1.1"
hyperfine = "1.20.0"
shellcheck = "0.11.0"
node = "24.18.0"
syft = "1.46.0"
zig = "0.16.0"
# rust is read from `rust-toolchain.toml` via the `idiomatic_version_file`
# setting below — single source of truth for the toolchain channel and components.

[settings]
cargo.binstall = true
idiomatic_version_file_enable_tools = ["rust"]
lockfile = true

# Construct image tasks. Each delegates to the `jackin-xtask` Rust binary
# via `cargo xtask construct <sub>`; all task logic lives in Rust, not shell.
[tasks.construct-init-buildx]
description = "Create and bootstrap the construct Buildx builder"
run = "cargo xtask construct init-buildx"

[tasks.construct-doctor-buildx]
description = "Inspect the construct Buildx builder and list builders"
run = "cargo xtask construct doctor-buildx"

[tasks.construct-reset-buildx]
description = "Recreate the construct Buildx builder from scratch"
run = "cargo xtask construct reset-buildx"

[tasks.construct-build-local]
description = "Build the construct image for the host platform and load it locally"
run = "cargo xtask construct build-local"

[tasks.construct-build-platform]
description = "Build the construct image for one platform (amd64|arm64) and load it"
usage = 'arg "<platform>" help="amd64 or arm64"'
run = 'cargo xtask construct build-platform "$usage_platform"'

[tasks.construct-push-platform]
description = "Push a single-platform construct image by digest (CI)"
usage = 'arg "<platform>" help="amd64 or arm64"'
run = 'cargo xtask construct push-platform "$usage_platform"'

[tasks.construct-assert-version-unpublished]
description = "Fail when docker/construct/VERSION already exists in the registry"
run = "cargo xtask construct assert-version-unpublished"

[tasks.construct-publish-manifest]
description = "Combine per-platform digests into a multi-platform manifest (CI)"
run = "cargo xtask construct publish-manifest"

[tasks.construct-inspect]
description = "Print the resolved construct Bake configuration"
run = "cargo xtask construct inspect"

[tasks.ci]
description = "Run the local CI merge-readiness gate"
run = "cargo xtask ci"

# jackin❯ Desktop (native macOS usage menu bar). Logic lives in
# `cargo xtask desktop`; these tasks are thin operator entry points.
[tasks.desktop-bindings]
description = "Generate UniFFI Swift bindings for jackin❯ Desktop"
run = "cargo xtask desktop bindings"

[tasks.desktop-xcframework]
description = "Build the arm64 static JackinUsageFFI XCFramework"
run = "cargo xtask desktop xcframework"

[tasks.desktop-build]
description = "Assemble arm64 static JackinDesktop.app under native/dist/"
usage = '''
arg "<version>" help="CFBundleShortVersionString (e.g. 0.6.0)" default="0.6.0"
arg "<build>" help="CFBundleVersion numeric build (e.g. 1)" default="1"
'''
run = 'cargo xtask desktop build --version "$usage_version" --build "$usage_build"'

[tasks.desktop-verify]
description = "Fail-closed verify of JackinDesktop.app (pass extra args through to cargo xtask)"
usage = '''
arg "<app>" help="Path to JackinDesktop.app" default="native/dist/JackinDesktop.app"
'''
run = 'cargo xtask desktop verify "$usage_app"'

[tasks.desktop-sign-notarize]
description = "Developer ID sign + notarize + staple JackinDesktop.app (requires Apple credentials)"
usage = '''
arg "[app]" help="Path to JackinDesktop.app" default="native/dist/JackinDesktop.app"
arg "[out_zip]" help="Final post-staple ZIP path"
'''
run = '''
if [ -n "${usage_out_zip:-}" ]; then
  cargo xtask desktop sign-notarize "$usage_app" "$usage_out_zip"
else
  cargo xtask desktop sign-notarize "$usage_app"
fi
'''

[tasks.desktop-release-state]
description = "Print independent Desktop release/cask state KEY=value lines"
usage = '''
arg "<version>" help="Release version without leading v"
arg "--repo" help="GitHub owner/name" default="jackin-project/jackin"
arg "--tap" help="Homebrew tap owner/name" default="jackin-project/homebrew-tap"
'''
run = 'cargo xtask desktop release-state "$usage_version" --repo "$usage_repo" --tap "$usage_tap"'

[tasks.desktop-bootstrap-secrets]
description = "Bootstrap release-macos Apple secrets into GitHub (never prints secret values)"
run = "cargo xtask desktop bootstrap-secrets"
