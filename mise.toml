[tools]
actionlint = "1.7.12"
bun = "1.3.14"
cosign = "3.1.1"
shellcheck = "0.11.0"
node = "24.17.0"
syft = "1.45.1"
zig = "0.16.0"
# rust is read from `rust-toolchain.toml` via the `idiomatic_version_file`
# setting below — single source of truth for the toolchain channel and components.

[tool_alias]
cargo-audit = "github:rustsec/rustsec"
cargo-deny = "github:EmbarkStudios/cargo-deny"
cargo-fuzz = "github:rust-fuzz/cargo-fuzz"
cargo-hack = "github:taiki-e/cargo-hack"
cargo-nextest = "github:nextest-rs/nextest"
cargo-shear = "github:Boshen/cargo-shear"
cargo-zigbuild = "github:rust-cross/cargo-zigbuild"
codebook-lsp = "github:blopker/codebook"

[tools.cargo-audit]
version = "cargo-audit/v0.22.2"
matching = "cargo-audit"
rename_exe = "cargo-audit"

[tools.cargo-deny]
version = "0.19.8"
matching = "cargo-deny"
rename_exe = "cargo-deny"

[tools.cargo-fuzz]
version = "0.13.1"
matching = "cargo-fuzz"
rename_exe = "cargo-fuzz"

[tools.cargo-hack]
version = "0.6.45"
matching = "cargo-hack"
rename_exe = "cargo-hack"

[tools.cargo-nextest]
version = "cargo-nextest-0.9.136"
matching = "cargo-nextest"
rename_exe = "cargo-nextest"

[tools.cargo-shear]
version = "1.13.0"
matching = "cargo-shear"
rename_exe = "cargo-shear"

[tools.cargo-zigbuild]
version = "0.23.0"
matching = "cargo-zigbuild"
rename_exe = "cargo-zigbuild"

[tools.codebook-lsp]
version = "0.3.41"
matching = "codebook-lsp"
rename_exe = "codebook-lsp"

[settings]
idiomatic_version_file_enable_tools = ["rust"]

# Construct image tasks. Each delegates to the `jackin-xtask` Rust binary
# via `cargo xtask construct <sub>`; all task logic lives in Rust, not shell.
[tasks.construct-init-buildx]
description = "Create and bootstrap the construct Buildx builder"
run = "cargo xtask construct init-buildx"

[tasks.construct-doctor-buildx]
description = "Inspect the construct Buildx builder and list builders"
run = "cargo xtask construct doctor-buildx"

[tasks.construct-reset-buildx]
description = "Recreate the construct Buildx builder from scratch"
run = "cargo xtask construct reset-buildx"

[tasks.construct-build-local]
description = "Build the construct image for the host platform and load it locally"
run = "cargo xtask construct build-local"

[tasks.construct-build-platform]
description = "Build the construct image for one platform (amd64|arm64) and load it"
usage = 'arg "<platform>" help="amd64 or arm64"'
run = 'cargo xtask construct build-platform "$usage_platform"'

[tasks.construct-push-platform]
description = "Push a single-platform construct image by digest (CI)"
usage = 'arg "<platform>" help="amd64 or arm64"'
run = 'cargo xtask construct push-platform "$usage_platform"'

[tasks.construct-assert-version-unpublished]
description = "Fail when docker/construct/VERSION already exists in the registry"
run = "cargo xtask construct assert-version-unpublished"

[tasks.construct-publish-manifest]
description = "Combine per-platform digests into a multi-platform manifest (CI)"
run = "cargo xtask construct publish-manifest"

[tasks.construct-inspect]
description = "Print the resolved construct Bake configuration"
run = "cargo xtask construct inspect"
