  "AGENTS.md",
  "BRANCHING.md",
  "COMMITS.md",
  "CONTRIBUTING.md",
  "PROJECT_STRUCTURE.md",
  "PULL_REQUESTS.md",
  "README.md",
  "RULES.md",
  "TESTING.md",
  ".github/**/*.md",
  ".github/**/*.yml",
  "crates/**/*.rs",
  "crates/**/*.toml",
  "docker/**/*.fish",
  "docker/**/*.sh",
  "docker/**/*.toml",
  "docker/**/*.zsh",
  "docs/**/*.md",
  "docs/**/*.mdx",
