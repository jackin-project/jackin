# Shared lychee configuration for generated docs link checks.
#
# Local PR check:
#   cd docs
#   bun run check:links:fresh

# Cache is enabled locally and in CI. The CI workflow restores `.lycheecache`
# with actions/cache so broad PR coverage does not refetch every external URL.
cache = true

# 429 is accepted to keep CI useful under external rate limits. GitHub requests
# are also throttled below to make a 429 less likely.
accept = ["100..=103", "200..=299", "429"]
exclude = [
  "https://chatgpt\\.com/",
  # Zylos serves this public research page to browsers and search crawlers, but
  # returns HTTP 402 to lychee in CI.
  "https://zylos\\.ai/research/2026-04-01-ai-agent-input-ready-detection-cursor-vs-regex",
  # ccmux is reachable in browsers and search crawlers, but lychee reports it
  # as network-unreachable in some environments.
  "https://ccmux\\.ai/",
  # Imbue's Sculptor page is public but has failed as network-unreachable from
  # GitHub Actions while passing local link checks.
  "https://imbue\\.com/sculptor/",
  # NN/g serves this public article to browsers, but returns HTTP 403 to lychee
  # from GitHub Actions.
  "https://www\\.nngroup\\.com/articles/visibility-system-status/",
  # mise's public docs root has returned network-unreachable from lychee while
  # passing in browsers.
  "https://mise\\.jdx\\.dev/",
  # libvterm's public project page has failed with connection errors from
  # GitHub Actions while remaining browser-accessible.
  "https://www\\.leonerd\\.org\\.uk/code/libvterm/",
  # BigGo's public Ghostty/libghostty-vt article has timed out from GitHub
  # Actions while remaining browser-accessible.
  "https://biggo\\.com/news/202509240113_Ghostty_libghostty-vt_Library_Terminal_Emulation",
  # GitHub's contents API intermittently returns 403 for this public directory
  # after the docs workflow remaps the browser URL through api.github.com.
  "https://github\\.com/graemerocher/multicode/tree/main/workspace-skills",
  "https://api\\.github\\.com/repos/graemerocher/multicode/contents/workspace-skills\\?ref=main",
]
exclude_all_private = true
exclude_path = ["(^|/)404\\.html$"]

# `format` controls the final report shape. `mode` controls terminal display.
format = "compact"
index_files = ["index.html"]
max_concurrency = 32
max_redirects = 10

# GitHub issue pages occasionally return transient 5xx responses during broad
# docs checks. Prefer slower retries over accepting server errors as valid.
max_retries = 5
mode = "plain"
no_progress = true
retry_wait_time = 5
timeout = 20
user_agent = "jackin-docs-link-checker"

include_mail = true
scheme = ["https", "http", "file", "mailto"]

[hosts."github.com"]
concurrency = 4
request_interval = "500ms"
