<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="iconRain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5f87ff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7aa4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5f87ff" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Digital rain pattern (compact) -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace"
     font-size="14" fill="url(#iconRain)" filter="url(#iconGlow)">
    <text x="64" y="24" text-anchor="middle">│ │╷│ │╷│ ╷</text>
    <text x="64" y="44" text-anchor="middle">│ ╵│ │╵│ ╵ ╷</text>
    <text x="64" y="64" text-anchor="middle">╵  ╵ ╵ ╵  │</text>
    <text x="64" y="84" text-anchor="middle" xml:space="preserve">     ╵</text>
  </g>

  <!-- Title -->
  <text x="64" y="112"
    font-family="'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace"
    font-size="18" font-weight="bold" fill="#ffffff" letter-spacing="0.15em"
    text-anchor="middle">jackin'</text>
</svg>
