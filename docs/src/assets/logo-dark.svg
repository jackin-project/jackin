<svg xmlns="http://www.w3.org/2000/svg" width="680" height="260" viewBox="0 0 680 260">
  <defs>
    <linearGradient id="rainFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5f87ff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7aa4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5f87ff" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rainGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Digital rain pattern -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace"
     font-size="28" fill="url(#rainFade)" filter="url(#rainGlow)">
    <text x="340" y="45" text-anchor="middle">│ │╷│ │╷│ ╷  │╷│ │╷│ │╷│</text>
    <text x="340" y="83" text-anchor="middle">│ ╵│ │╵│ ╵ ╷ ╵│ │╵│ │╵│</text>
    <text x="340" y="121" text-anchor="middle">╵  ╵ ╵ ╵  │  ╵ ╵ ╵ ╵ ╵</text>
    <text x="340" y="159" text-anchor="middle" xml:space="preserve">           ╵</text>
  </g>

  <!-- Title -->
  <text x="340" y="207"
    font-family="'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace"
    font-size="36" font-weight="bold" fill="#ffffff" letter-spacing="0.25em"
    text-anchor="middle" filter="url(#textGlow)">j a c k i n</text>

  <!-- Subtitle -->
  <text x="340" y="245"
    font-family="'JetBrains Mono', 'Fira Code', 'DejaVu Sans Mono', monospace"
    font-size="22" fill="#5a7faf" letter-spacing="0.1em"
    text-anchor="middle" opacity="0.8">operator terminal</text>
</svg>
